            color: var(--BohrsBabyBlue);
            font-family: 'SpaceLetters';
        }

        input[type="text"], textarea {
            width: 100%;

            transition: all 0.3s ease;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--CoolGray);
            box-shadow: 0 0 0 3px rgba(103,254,189, 0.25),
                        inset 0 2px 12px rgba(0, 0, 0, 0.4);
            background: rgba(30, 15, 55, 0.8);
        }

        textarea {
            min-height: 420px;
            font-family: 'Courier New', monospace;
            line-height: 1.6;
            resize: vertical;
        }

        .small-hint {
            display: block;
            margin-top: 8px;
            color: var(--MutedGray, #a0a0cc);
            font-size: 0.9rem;
            font-family: 'SpaceLettters';
        }

        .submit-btn {
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #7b00ff75;
            padding: 0.4rem 1.6rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: background 0.2s, border-color 0.2s;
            font-family: 'SpaceLetters';
            color: var(--BohrsBabyBlue);
            transition: border-color 0.2s, box-shadow 0.2s, color 0.2s, transform 0.15s;
            box-shadow: 0 0 18px rgba(140, 60, 255, 0.15);
            -webkit-tap-highlight-color: transparent;
            margin-left: auto;
            display: block;
            width: fit-content;
        }

        .submit-btn::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
        transition: 0.2s;
        }

        .submit-btn:hover::before,
        .submit-btn:focus::before {
        left: 100%;
        }

        .submit-btn:hover,
        .submit-btn:focus {
        border-color: rgba(0, 221, 255, 0.32);
        box-shadow: 0 0 30px rgba(0, 200, 255, 0.1), 0 0 60px rgba(140, 60, 255, 0.15);
        outline: none;
        }

        .message { 
            margin-top: 1.2rem; 
            padding: 0.9rem; 
            border-radius: 8px; 
            font-weight: 500;
        }
        .success { background: rgba(0,255,100,0.15); border: 1px solid #0f0; }
        .error { background: rgba(255,50,50,0.15); border: 1px solid #f44; }

    footer a { color: var(--AlphaAqua); text-decoration: none; }

    <div class="admin-container">
            <h1>NEW POST</h1>
            <form id="postForm">
                <div class="form-group">
                    <label for="title">TITLE</label>
                    <input type="text" id="title" required maxlength="200" placeholder="Enter a neat title...">
                </div>

                <div class="form-group">
                    <label for="content">CONTENT</label>
                    <textarea id="content" required placeholder="Write post here... "></textarea>
                    <small class="small-hint">
                        Supports Markdown (auto-converted) or raw HTML.
                    </small>
                </div>

                <button type="submit" class="submit-btn">Publish Post</button>
                <div id="msg"></div>
            </form>

    <script src="/static/js/KittyCore.js"></script>

    <script>
        const ADMIN_SECRET = prompt("Enter admin secret key to continue:"); 

        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value.trim();
            const content = document.getElementById('content').value.trim();
            if (!title || !content) {
                showMsg("Both title and content are required", "error");
                return;
            }

            const submitBtn = e.target.querySelector('button');
            submitBtn.disabled = true;
            submitBtn.textContent = "Posting...";

            try {
                const res = await fetch('/api/blog-posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Admin-Secret': ADMIN_SECRET
                    },
                    body: JSON.stringify({ title, content })
                });
                const data = await res.json();
                if (data.success) {
                    showMsg("✅ Post published! You can view it on /blog", "success");
                    document.getElementById('postForm').reset();
                } else {
                    showMsg("❌ Error: " + data.error, "error");
                }
            } catch (err) {
                showMsg("Network error: " + err.message, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Publish Post";
            }
        });

        function showMsg(text, type) {
            const div = document.getElementById('msg');
            div.innerHTML = `<div class="message ${type}">${text}</div>`;
            setTimeout(() => div.innerHTML = "", 5000);
        }
    </script>
