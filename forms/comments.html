<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="/static/css/KittyStyle.css">
  <title>Comment Wall - CATastrophe 2</title>
  <meta name="description" content="Share your thoughts about CATastrophe 2!" />

<style>
    .page-content {
      margin-top: 30px;
      padding: 2rem 1rem;
      min-height: calc(100vh - 80px);
      position: relative;
      z-index: 10;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .page-title {
      text-align: center;
      margin-bottom: 3rem;
    }

    .page-title h1 {
      font-family: 'Orbitron', 'Courier New', monospace;
      font-size: 3rem;
      background: linear-gradient(45deg, var(--NuclearFuscia), #00FFFF, var(--NuclearFuscia));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 15px var(--NuclearGlow3);
      margin-bottom: 1rem;
      animation: neonPulse 2s ease-in-out infinite alternate;
    }

    .page-title p {
      color: var(--MutedGray);
      font-size: 1.3rem;
      font-family: Arial, sans-serif;
    }

    .comment-form-card {
      background: linear-gradient(135deg, 
          rgba(55, 2, 90, 0.587), 
          rgba(41, 0, 92, 0.562));
      backdrop-filter: blur(10px);
      border: 2px solid var(--VortexViolet);
      border-radius: 18px;
      padding: 30px;
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
      box-shadow: 0 8px 32px var(--VortexGlow2), inset 0 1px 0 var(--PlasmaGlow2);
      z-index: 1;
    }

    .comment-form-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, 
          rgba(131, 12, 222, 0.15) 0%, 
          transparent 70%);
      opacity: 0;
      transition: opacity 0.6s;
      pointer-events: none;
    }

    .comment-form-card:hover {
      border-color: #A55AFF;
      box-shadow: 
          0 20px 50px rgba(131,12,222, 0.3),
          0 0 40px rgba(165,90,255, 0.4);
    }

    .comment-form-card:hover::before {
      opacity: 1;
    }

    .form-group {
      margin-bottom: 1.5rem;
      position: relative;
      z-index: 1;
    }

    .form-group label {
      display: block;
      color: var(--AlphaAqua);
      font-family: 'GothNerd', sans-serif;
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      text-shadow: 0 0 10px var(--AlphaGlow1);
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.875rem;
      background: rgba(0, 0, 0, 0.4);
      border: 2px solid var(--ProtonPurple);
      border-radius: 8px;
      color: var(--White);
      font-size: 1rem;
      font-family: Arial, sans-serif;
      transition: all 0.3s ease;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--VortexViolet);
      box-shadow: 0 0 20px var(--VortexGlow2);
      background: rgba(0, 0, 0, 0.6);
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
      font-family: Arial, sans-serif;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(45deg, var(--VortexViolet), var(--NuclearFuscia));
      color: var(--White);
      border: 2px solid var(--ParticlePink);
      border-radius: 12px;
      font-family: 'GothNerd', sans-serif;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px var(--VortexGlow2);
      position: relative;
      z-index: 1;
    }

    .submit-btn:hover:not(:disabled) {
      background: linear-gradient(45deg, var(--NuclearFuscia), var(--AlphaAqua));
      transform: translateY(-2px);
      box-shadow: 0 0 40px var(--NuclearGlow3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .comments-section {
      margin-top: 3rem;
    }

    .comments-header {
      color: var(--ParticlePink);
      font-family: 'GothNerd', sans-serif;
      font-size: 2rem;
      margin-bottom: 1.5rem;
      text-align: center;
      text-shadow: 0 0 10px var(--NuclearGlow2);
    }

    .comment-card {
      background: linear-gradient(135deg, 
          rgba(55, 2, 90, 0.587), 
          rgba(41, 0, 92, 0.562));
      backdrop-filter: blur(10px);
      border: 2px solid var(--ProtonPurple);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .comment-card:hover {
      border-color: var(--VortexViolet);
      box-shadow: 0 0 20px var(--VortexGlow2);
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .comment-author {
      color: var(--AlphaAqua);
      font-family: 'GothNerd', sans-serif;
      font-size: 1.1rem;
      text-shadow: 0 0 8px var(--AlphaGlow1);
    }

    .comment-date {
      color: var(--MutedGray);
      font-family: Arial, sans-serif;
      font-size: 0.9rem;
    }

    .comment-text {
      color: var(--White);
      font-family: Arial, sans-serif;
      font-size: 1.1rem;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .loading {
      text-align: center;
      color: var(--AlphaAqua);
      font-family: 'GothNerd', sans-serif;
      font-size: 1.5rem;
      padding: 2rem;
      text-shadow: 0 0 10px var(--AlphaGlow1);
    }

    .error-message {
      background: rgba(115, 1, 50, 0.3);
      border: 2px solid var(--RadiationRed);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: var(--White);
      font-family: Arial, sans-serif;
      text-align: center;
    }

    .success-message {
      background: rgba(0, 255, 255, 0.1);
      border: 2px solid var(--AlphaAqua);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: var(--White);
      font-family: Arial, sans-serif;
      text-align: center;
      box-shadow: 0 0 20px var(--AlphaGlow2);
    }

    .no-comments {
      text-align: center;
      color: var(--MutedGray);
      font-family: Arial, sans-serif;
      font-size: 1.2rem;
      padding: 3rem;
      font-style: italic;
    }

    .char-counter {
      text-align: right;
      color: var(--MutedGray);
      font-size: 0.9rem;
      margin-top: 0.5rem;
      position: relative;
      z-index: 1;
    }

    .char-counter.warning {
      color: var(--NuclearFuscia);
    }

    @media (max-width: 768px) {
      .page-title h1 {
        font-size: 2rem;
      }

      .comment-form-card {
        padding: 1.5rem;
      }

      .comment-header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
</style>

  <div class="container">
    <div class="page-title">
      <h1>GUESTBOOK</h1>
    </div>

    <div class="comment-form-card">
      <h2 style="color: var(--ParticlePink); font-family: 'GothNerd', sans-serif; font-size: 1.5rem; margin-bottom: 1.5rem; text-shadow: 0 0 10px var(--NuclearGlow2);">
        Leave your mark!
      </h2>

      <div id="feedbackMessage"></div>

      <form id="commentForm">
        <div class="form-group">
          <label for="commenter_name">Your Name (Optional)</label>
          <input 
            type="text" 
            id="commenter_name" 
            name="commenter_name" 
            placeholder="Leave blank to post anonymously"
            maxlength="100"
          />
        </div>

        <div class="form-group">
          <label for="comment_text">Your Comment <span style="color: var(--NuclearFuscia);">*</span></label>
          <textarea 
            id="comment_text" 
            name="comment_text" 
            placeholder="Think of something cool to say..."
            maxlength="1000"
            required
          ></textarea>
          <div class="char-counter" id="charCounter">1000 characters remaining</div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">
          POST 
        </button>
      </form>
    </div>

    <div class="comments-section">
      <h2 class="comments-header">💬 </h2>
      <div id="commentsContainer">
        <div class="loading">Loading comments...</div>
      </div>
    </div>
  </div>

  <div id="stars"></div>

    ↑ 
  </button>

  <script src="/static/js/KittyCore.js"></script>

  <script>
    const button = document.getElementById('kofi-float');
    button.addEventListener('mouseenter', () => {
      document.querySelectorAll('.heart').forEach(h => {
        h.style.animation = 'none';
        h.offsetHeight; 
        h.style.animation = null;
      });
    });

    const starsDiv = document.getElementById('stars');
    for (let i = 0; i < 200; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = Math.random() * 2 + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 4 + 's';
      starsDiv.appendChild(star);
    }

    const textarea = document.getElementById('comment_text');
    const charCounter = document.getElementById('charCounter');
    const maxLength = 1000;

    textarea.addEventListener('input', () => {
      const remaining = maxLength - textarea.value.length;
      charCounter.textContent = `${remaining} characters remaining`;
      
      if (remaining < 100) {
        charCounter.classList.add('warning');
      } else {
        charCounter.classList.remove('warning');
      }
    });

    async function loadComments() {
      try {
        const response = await fetch('/api/comments');
        const data = await response.json();
        
        const container = document.getElementById('commentsContainer');
        
        if (data.success && data.comments.length > 0) {
          container.innerHTML = data.comments.map(comment => `
            <div class="comment-card">
              <div class="comment-header">
                <span class="comment-author">${escapeHtml(comment.commenter_name)}</span>
                <span class="comment-date">${formatDate(comment.created_at)}</span>
              </div>
              <p class="comment-text">${escapeHtml(comment.comment_text)}</p>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<div class="no-comments">No comments yet. Be the first to share your thoughts! 🐱</div>';
        }
      } catch (error) {
        console.error('Error loading comments:', error);
        document.getElementById('commentsContainer').innerHTML = 
          '<div class="error-message">Failed to load comments. Please refresh the page.</div>';
      }
    }

    document.getElementById('commentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      const feedbackDiv = document.getElementById('feedbackMessage');
      
      submitBtn.textContent = '📤 Posting...';
      submitBtn.disabled = true;
      feedbackDiv.innerHTML = '';
      
      const formData = {
        commenter_name: document.getElementById('commenter_name').value.trim(),
        comment_text: document.getElementById('comment_text').value.trim()
      };
      
      try {
        const response = await fetch('/api/comments', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(formData)
        });
        
        const data = await response.json();
        
        if (data.success) {
          feedbackDiv.innerHTML = '<div class="success-message">✨ Comment posted successfully!</div>';
          document.getElementById('commentForm').reset();
          charCounter.textContent = '1000 characters remaining';
          charCounter.classList.remove('warning');
          
          await loadComments();
          
          setTimeout(() => {
            feedbackDiv.innerHTML = '';
          }, 3000);
        } else {
          feedbackDiv.innerHTML = `<div class="error-message">❌ ${data.error || 'Failed to post comment'}</div>`;
        }
      } catch (error) {
        console.error('Error posting comment:', error);
        feedbackDiv.innerHTML = '<div class="error-message">❌ Network error. Please try again.</div>';
      } finally {
        submitBtn.textContent = '🐾 POST COMMENT 🐾';
        submitBtn.disabled = false;
      }
    });

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diffMs = now - date;
      const diffMins = Math.floor(diffMs / 60000);
      
      if (diffMins < 1) return 'Just now';
      if (diffMins < 60) return `${diffMins} minute${diffMins > 1 ? 's' : ''} ago`;
      
      const diffHours = Math.floor(diffMins / 60);
      if (diffHours < 24) return `${diffHours} hour${diffHours > 1 ? 's' : ''} ago`;
      
      const diffDays = Math.floor(diffHours / 24);
      if (diffDays < 7) return `${diffDays} day${diffDays > 1 ? 's' : ''} ago`;
      
      return date.toLocaleDateString();
    }

    loadComments();
  </script>
