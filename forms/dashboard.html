<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CATastrophe2</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .dashboard-container {
            margin-top: 80px;
            padding: 20px;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .dashboard-header {
            background: linear-gradient(135deg, var(--ProtonPurple), var(--BosonBlue));
            padding: 30px;
            border-radius: 15px;
            border: 3px solid var(--VortexViolet);
            box-shadow: 0 0 50px var(--VortexGlow3);
            margin-bottom: 30px;
        }

        .dashboard-title {
            font-family: 'SpaceLetters', sans-serif;
            font-size: 2.5em;
            background: linear-gradient(45deg, var(--ParticlePink), var(--NuclearFuscia), var(--AlphaAqua));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: 0 0 30px var(--ParticleGlow3);
        }

        .dashboard-subtitle {
            color: var(--EntangledEucalyptus);
            font-size: 1.1em;
            font-family: Arial, sans-serif;
        }

        .module-section {
            background: linear-gradient(135deg, var(--BosonBlue), var(--ProtonPurple));
            border: 3px solid var(--VortexViolet);
            border-radius: 15px;
            box-shadow: 0 0 30px var(--VortexGlow2);
            margin-bottom: 30px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .module-section:hover {
            box-shadow: 0 0 50px var(--NuclearGlow3);
            transform: translateY(-2px);
        }

        .module-header {
            background: linear-gradient(135deg, var(--VortexViolet), var(--NuclearFuscia));
            color: var(--White);
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--ParticlePink);
        }

        .module-title {
            font-family: 'GothNerd', sans-serif;
            font-size: 1.8em;
            color: var(--White);
            text-shadow: 0 0 20px var(--ParticleGlow3);
        }

        .module-description {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
            font-family: Arial, sans-serif;
        }

        .record-count {
            background: var(--PlasmaGlow2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
            font-family: 'GothNerd', sans-serif;
            border: 2px solid var(--PlasmaPurple);
        }

        .module-content {
            padding: 30px;
            background: var(--BosonShadow2);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--AlphaAqua);
            font-size: 1.1em;
            font-family: 'GothNerd', sans-serif;
        }

        .error {
            background: var(--RadiationRed);
            border: 2px solid var(--NuclearFuscia);
            color: var(--ParticlePink);
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            font-family: Arial, sans-serif;
        }

        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
            font-family: Arial, sans-serif;
        }

        thead {
            background: var(--ProtonPurple);
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: var(--AlphaAqua);
            border-bottom: 2px solid var(--VortexViolet);
            white-space: nowrap;
            font-family: 'GothNerd', sans-serif;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--PlasmaGlow2);
            vertical-align: top;
            color: var(--EntangledEucalyptus);
        }

        tr:hover {
            background: var(--PlasmaGlow1);
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--CoolGray);
            font-style: italic;
            font-family: Arial, sans-serif;
        }

        .timestamp {
            color: var(--AlphaAqua);
            font-size: 0.85em;
        }

        .bool-true {
            color: var(--RadioactiveGreen);
            font-weight: 600;
        }

        .bool-false {
            color: var(--NuclearFuscia);
            font-weight: 600;
        }

        .refresh-btn {
            background: var(--ProtonPurple);
            border: 2px solid var(--AlphaAqua);
            color: var(--AlphaAqua);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            font-family: 'GothNerd', sans-serif;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: var(--AlphaAqua);
            color: var(--BosonBlue);
            box-shadow: 0 0 20px var(--AlphaGlow3);
            transform: scale(1.05);
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Status dropdown styling */
        .status-dropdown {
            padding: 6px 12px;
            background: var(--ProtonPurple);
            border: 2px solid var(--VortexViolet);
            border-radius: 8px;
            color: var(--White);
            font-family: 'GothNerd', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .status-dropdown:hover {
            border-color: var(--AlphaAqua);
            box-shadow: 0 0 10px var(--VortexGlow2);
        }

        .status-dropdown:focus {
            outline: none;
            box-shadow: 0 0 15px var(--AlphaGlow3);
        }

        .status-pending {
            background: var(--ProtonPurple);
            color: var(--ParticlePink);
        }

        .status-in_progress {
            background: var(--VortexViolet);
            color: var(--AlphaAqua);
        }

        .status-completed {
            background: var(--RadioactiveGreen);
            color: var(--BosonBlue);
        }

        /* View button styling */
        .view-btn {
            padding: 6px 16px;
            background: var(--VortexViolet);
            border: 2px solid var(--AlphaAqua);
            border-radius: 8px;
            color: var(--AlphaAqua);
            font-family: 'GothNerd', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .view-btn:hover {
            background: var(--AlphaAqua);
            color: var(--BosonBlue);
            box-shadow: 0 0 15px var(--AlphaGlow3);
            transform: scale(1.05);
        }

        /* Issue modal styling */
        .issue-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .issue-modal.active {
            display: flex;
        }

        .issue-modal-content {
            background: linear-gradient(135deg, var(--BosonBlue), var(--ProtonPurple));
            border: 3px solid var(--VortexViolet);
            border-radius: 15px;
            max-width: 600px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 0 50px var(--VortexGlow3);
        }

        .issue-modal-header {
            background: linear-gradient(135deg, var(--VortexViolet), var(--NuclearFuscia));
            padding: 20px 30px;
            border-bottom: 2px solid var(--ParticlePink);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .issue-modal-title {
            font-family: 'GothNerd', sans-serif;
            font-size: 1.5rem;
            color: var(--White);
            margin: 0;
        }

        .issue-modal-close {
            background: var(--RadiationRed);
            color: var(--ParticlePink);
            border: 2px solid var(--ParticlePink);
            border-radius: 50%;
            width: 35px;
            height: 35px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .issue-modal-close:hover {
            background: var(--ParticlePink);
            color: var(--BosonBlue);
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 0 20px var(--ParticleGlow3);
        }

        .issue-modal-body {
            padding: 30px;
            color: var(--White);
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        .issue-meta {
            margin-bottom: 20px;
            padding: 15px;
            background: var(--BosonShadow2);
            border-radius: 10px;
            border-left: 4px solid var(--AlphaAqua);
        }

        .issue-meta p {
            margin: 8px 0;
            font-size: 0.95rem;
        }

        .issue-meta strong {
            color: var(--AlphaAqua);
        }

        .issue-description {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid var(--ProtonPurple);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 10px;
                margin-top: 60px;
            }

            .dashboard-title {
                font-size: 1.8em;
            }

            .module-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            table {
                font-size: 0.85em;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>

    <script>
        const starsDiv = document.getElementById('stars');
        for (let i = 0; i < 200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = star.style.height = Math.random() * 2 + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 4 + 's';
            starsDiv.appendChild(star);
        }

        const DASHBOARD_CONFIG = [
            {
                id: 'game_feedback',
                title: 'Game Tester Feedback',
                enabled: true,
                api_endpoint: '/api/feedback',
                description: 'Detailed feedback from game testers',
                highlight_columns: ['name', 'cat_name', 'game_completed', 'would_pay']
            },
            {
                id: 'support_tickets',
                title: 'Support Tickets',
                enabled: true,
                api_endpoint: '/api/support',
                description: 'User-reported issues and bugs',
                highlight_columns: ['name', 'email', 'page', 'issue_description']
            },
            {
                id: 'tester_signups',
                title: 'Tester Signups',
                enabled: true,
                api_endpoint: '/api/tester-signup',
                description: 'Users who signed up to be game testers',
                highlight_columns: ['name', 'email', 'signed_up_at']
            }
        ];

        function formatValue(value, key) {
            if (value === null || value === undefined) {
                return '<span style="color: var(--MutedGray);">—</span>';
            }
            
            if (typeof value === 'boolean') {
                return value 
                    ? '<span class="bool-true">✓ Yes</span>' 
                    : '<span class="bool-false">✗ No</span>';
            }
            
            if (key.includes('at') || key.includes('timestamp')) {
                const date = new Date(value);
                return `<span class="timestamp">${date.toLocaleString()}</span>`;
            }
            
            if (typeof value === 'string' && value.length > 100) {
                return value.substring(0, 100) + '...';
            }
            
            return value;
        }

        async function loadModuleData(module) {
            const moduleElement = document.getElementById(module.id);
            const contentElement = moduleElement.querySelector('.module-content');
            const countElement = moduleElement.querySelector('.record-count');

            try {
                contentElement.innerHTML = '<div class="loading">Loading data...</div>';
                
                const response = await fetch(module.api_endpoint);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error || 'Failed to load data');
                }

                const data = result.data || [];
                countElement.textContent = `${data.length} records`;

                if (data.length === 0) {
                    contentElement.innerHTML = '<div class="no-data">No data yet</div>';
                    return;
                }

                const columns = Object.keys(data[0]);

                let tableHTML = '<div class="table-wrapper"><table><thead><tr>';
                columns.forEach(col => {
                    tableHTML += `<th>${col.replace(/_/g, ' ').toUpperCase()}</th>`;
                });
                tableHTML += '</tr></thead><tbody>';

                data.forEach(row => {
                    tableHTML += '<tr>';
                    columns.forEach(col => {
                        tableHTML += `<td>${formatValue(row[col], col)}</td>`;
                    });
                    tableHTML += '</tr>';
                });

                tableHTML += '</tbody></table></div>';
                contentElement.innerHTML = tableHTML;

            } catch (error) {
                contentElement.innerHTML = `<div class="error">Error loading data: ${error.message}</div>`;
            }
        }

        function createModuleHTML(module) {
            return `
                <div class="module-section" id="${module.id}">
                    <div class="module-header">
                        <div>
                            <div class="module-title">${module.title}</div>
                            <div class="module-description">${module.description}</div>
                        </div>
                        <div class="controls">
                            <span class="record-count">Loading...</span>
                            <button class="refresh-btn" onclick="loadModuleData(DASHBOARD_CONFIG.find(m => m.id === '${module.id}'))">
                                ↻ Refresh
                            </button>
                        </div>
                    </div>
                    <div class="module-content">
                        <div class="loading">Initializing...</div>
                    </div>
                </div>
            `;
        }

        function initDashboard() {
            const container = document.getElementById('dashboard-modules');
            const enabledModules = DASHBOARD_CONFIG.filter(m => m.enabled);

            enabledModules.forEach(module => {
                container.innerHTML += createModuleHTML(module);
            });

            enabledModules.forEach(module => {
                loadModuleData(module);
            });
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
