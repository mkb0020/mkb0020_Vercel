    .title {

      font-family: 'GothNerd', monospace;
      margin-bottom: 2rem;
      background: linear-gradient(45deg, var(--ParticlePink), var(--OrbitalOrange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .card {
      background: rgba(30, 0, 60, 0.5);
      border: 1px solid rgba(144,144,192, 0.5);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(20px);

    }

    .card h3{
     font-family: 'SpaceLetters'; 
     color: var(--BohrsBabyBlue);
    }

    .upload-box {
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      border: 2px dashed rgba(144,144,192, 0.7);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'SpaceLetters';
      color: var(--BohrsBabyBlue);
      transition: border-color 0.2s, box-shadow 0.2s, color 0.2s, transform 0.15s;
      box-shadow: 0 0 18px rgba(140, 60, 255, 0.15);
      -webkit-tap-highlight-color: transparent;
    }

    .upload-box::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: 0.4s;
    }

    .upload-box:hover::before,
    .upload-box:focus::before {
      left: 100%;
    }

    .upload-box:hover,
    .upload-box:focus {
      border-color: rgba(0, 221, 255, 0.32);
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.1), 0 0 60px rgba(140, 60, 255, 0.15);
      outline: none;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .stat {
      text-align: center;
    }

    .stat h2 {
      margin: 0;
      color: #00ffff;
      font-family: 'SpaceLetters';
    }



    #insights p {
      margin: 0.5rem 0;
    }
  </style>
</head>

<script>
  const fileInput = document.getElementById('fileInput');
  const uploadStatus = document.getElementById('uploadStatus');

  fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

  async function uploadFiles(files) {
    let successCount = 0;

    for (const file of files) {
      try {
        const text = await file.text();
        const json = JSON.parse(text);

        const res = await fetch('/api/wormhole/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(json)
        });

        const result = await res.json();

        if (result.success) {
          successCount++;
        }
      } catch (err) {
        console.error(err);
      }
    }

    uploadStatus.textContent = `✅ Uploaded ${successCount} sessions`;
    loadDashboard();
  }


async function loadSummary() {
  const res = await fetch('/api/wormhole/summary');

  const text = await res.text();
  console.log("RAW RESPONSE:", text);

  if (!res.ok) {
    console.error("Summary API failed");
    return;
  }

  const data = JSON.parse(text);

  document.getElementById('totalSessions').textContent = data.data.total_sessions;
  document.getElementById('avgWave').textContent = data.data.avg_wave.toFixed(2);
  document.getElementById('winRate').textContent =
    (data.data.win_rate * 100).toFixed(1) + '%';
}

  async function loadInsights() {
    const res = await fetch('/api/wormhole/insights');
    const data = await res.json();

    const container = document.getElementById('insights');
    container.innerHTML = data.insights
      .map(i => `<p>✨ ${i}</p>`)
      .join('');
  }

  let chart;

  async function loadChart() {
    const res = await fetch('/api/wormhole/summary');
    const data = await res.json();

    const avgWave = data.data.avg_wave;

    const ctx = document.getElementById('waveChart').getContext('2d');

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: ['Avg Wave'],
        datasets: [{
          label: 'Wave Progression',
          data: [avgWave]
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: { color: 'white' }
          }
        },
        scales: {
          x: {
            ticks: { color: 'white' }
          },
          y: {
            ticks: { color: 'white' }
          }
        }
      }
    });
  }

  let hpChart;

  async function loadHpTimeline() {
      const res = await fetch('/api/wormhole/hp-timeline');
      const result = await res.json();

      if (!result.success) {
          console.error("HP timeline error:", result.error);
          return;
      }

      const sessions = result.sessions;
      if (!sessions.length) {
          if (hpChart) hpChart.destroy();
          return;
      }

      const datasets = sessions.map((sessionKey, idx) => {
          const hue = (idx * 72) % 360;
          const shortLabel = sessionKey.slice(0, 10); 
          return {
              label: `Session ${idx + 1} (${shortLabel})`,
              data: result.data[sessionKey],           
              borderColor: `hsl(${hue}, 70%, 60%)`,
              backgroundColor: 'transparent',
              tension: 0.3,
              pointRadius: 3,
              pointHoverRadius: 5,
              fill: false,
              showLine: true
          };
      });

      const ctx = document.getElementById('hpTimelineChart').getContext('2d');
      if (hpChart) hpChart.destroy();

      hpChart = new Chart(ctx, {
          type: 'line',
          data: { datasets },
          options: {
              responsive: true,
              maintainAspectRatio: true,
              plugins: {
                  tooltip: {
                      callbacks: {
                          label: (context) => {
                              const label = context.dataset.label || '';
                              const hp = context.raw.y;
                              const seconds = context.raw.x;
                              return `${label}: HP = ${hp}  (${seconds.toFixed(1)}s)`;
                          }
                      }
                  },
                  legend: { labels: { color: 'white' } }
              },
              scales: {
                  x: {
                      type: 'linear',              
                      title: {
                          display: true,
                          text: 'Time (seconds since session start)',
                          color: '#ccc'
                      },
                      ticks: { color: 'white' },
                      grid: { color: 'rgba(255,255,255,0.1)' }
                  },
                  y: {
                      title: { display: true, text: 'HP', color: '#ccc' },
                      ticks: { color: 'white' },
                      grid: { color: 'rgba(255,255,255,0.1)' },
                      beginAtZero: true
                  }
              }
          }
      });
  }

  async function loadDashboard() {
    await loadSummary();
    await loadInsights();
    await loadChart();
    await loadHpTimeline(); 
  }

  loadDashboard();
</script>
