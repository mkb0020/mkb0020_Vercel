  <style>
    body {
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    .title {
      text-align: center;
      font-size: 2.9rem;
      font-family: 'GothNerd', monospace;
      margin-bottom: 2rem;
      background: linear-gradient(45deg, var(--ParticlePink), var(--OrbitalOrange));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .card {
      background: linear-gradient(135deg, 
          rgba(46, 2, 75, 0.4), 
          rgba(32, 0, 71, 0.4));
      border: 1px solid rgba(144,144,192, 0.5);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      backdrop-filter: blur(50px);
      box-shadow: 
        0 20px 50px -15px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .card h3{
     font-family: 'SpaceLetters'; 
     color: var(--BohrsBabyBlue);
     font-size: 1.3rem;
     text-transform: uppercase;
    }

    .tab-bar {
      position: relative;
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
      justify-content: flex-end
    }

    .tab-btn {
      position: relative;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid #7b00ff75;
      padding: 0.4rem 1.1rem;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.2s, border-color 0.2s;
      font-family: 'SpaceLetters';
      color: var(--BohrsBabyBlue);
      transition: border-color 0.2s, box-shadow 0.2s, color 0.2s, transform 0.15s;
      box-shadow: 0 0 18px rgba(140, 60, 255, 0.15);
      -webkit-tap-highlight-color: transparent;
    }

    .tab-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: 0.4s;
    }

    .tab-btn:hover::before,
    .tab-btn:focus::before {
      left: 100%;
    }

    .tab-btn:hover,
    .tab-btn:focus {
      border-color: rgba(0, 221, 255, 0.32);
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.1), 0 0 60px rgba(140, 60, 255, 0.15);
      outline: none;
    }

    .tab-btn.active {
      background: rgba(123, 0, 255, 0.192);
      border-color: rgba(0, 255, 255, 0.45);
      color: #bcf7f7;
    }

    .header-grid {
      position: relative;
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .header-col {
      flex: 1;
}

    #scatterStatSelect {
      background: rgba(38, 0, 75, 0.8);
      border: 1px solid #7b00ff65;
      color: var(--MutedGray);
      padding: 0.4rem 0.8rem;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      width: 100%;
      position: relative;
      justify-content: flex-end
    }

    #scatterStatSelect option {
      background: #1a0030;
    }

  .upload-box {
      position: relative;
      overflow: hidden;
      text-transform: uppercase;
      border: 2px dashed rgba(144,144,192, 0.7);
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      font-family: 'SpaceLetters';
      color: var(--BohrsBabyBlue);
      transition: border-color 0.2s, box-shadow 0.2s, color 0.2s, transform 0.15s;
      box-shadow: 0 0 18px rgba(140, 60, 255, 0.15);
      -webkit-tap-highlight-color: transparent;
    }

    .upload-box::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.25), transparent);
      transition: 0.4s;
    }

    .upload-box:hover::before,
    .upload-box:focus::before {
      left: 100%;
    }

    .upload-box:hover,
    .upload-box:focus {
      border-color: rgba(0, 221, 255, 0.32);
      box-shadow: 0 0 30px rgba(0, 200, 255, 0.1), 0 0 60px rgba(140, 60, 255, 0.15);
      outline: none;
    }

    .stats {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .stat {
      text-align: center;
    }

    .stat h2 {
      margin: 0;
      color: #00ffff;
      font-family: 'SpaceLetters';
    }

    #insights p {
      margin: 0.5rem 0;
    }
  </style>
</head>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadStatus = document.getElementById('uploadStatus');

    fileInput.addEventListener('change', () => uploadFiles(fileInput.files));

    async function uploadFiles(files) {
      let successCount = 0;

      for (const file of files) {
        try {
          const text = await file.text();
          const json = JSON.parse(text);

          const res = await fetch('/api/wormhole/upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(json)
          });

          const result = await res.json();

          if (result.success) {
            successCount++;
          }
        } catch (err) {
          console.error(err);
        }
      }

      uploadStatus.textContent = `✅ Uploaded ${successCount} sessions`;
      loadDashboard();
    }


  async function loadSummary() {
    const res = await fetch('/api/wormhole/summary');

    const text = await res.text();
    console.log("RAW RESPONSE:", text);

    if (!res.ok) {
      console.error("Summary API failed");
      return;
    }

    const data = JSON.parse(text);

    document.getElementById('totalSessions').textContent = data.data.total_sessions;
    document.getElementById('avgWave').textContent = data.data.avg_wave.toFixed(2);
    document.getElementById('winRate').textContent =
      (data.data.win_rate * 100).toFixed(1) + '%';
  }

    async function loadInsights() {
      const res = await fetch('/api/wormhole/insights');
      const data = await res.json();

      const container = document.getElementById('insights');
      container.innerHTML = data.insights
        .map(i => `<p>✨ ${i}</p>`)
        .join('');
    }

    let chart;

    async function loadChart() {
      const res = await fetch('/api/wormhole/summary');
      const data = await res.json();

      const avgWave = data.data.avg_wave;

      const ctx = document.getElementById('waveChart').getContext('2d');

      if (chart) chart.destroy();

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['Avg Wave'],
          datasets: [{
            label: 'Wave Progression',
            data: [avgWave]
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: { color: 'white' }
            }
          },
          scales: {
            x: {
              ticks: { color: 'white' }
            },
            y: {
              ticks: { color: 'white' }
            }
          }
        }
      });
    }

    let hpChart;
    let activeTab = 'avg';


    function buildHpChart(datasets, maxX) {
      const ctx = document.getElementById('hpTimelineChart').getContext('2d');
      if (hpChart) hpChart.destroy();

      hpChart = new Chart(ctx, {
        type: 'line',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            tooltip: {
              callbacks: {
                label: (context) => {
                  const label = context.dataset.label || '';
                  const hp      = context.raw.y;
                  const seconds = context.raw.x;
                  return `${label}: HP = ${hp}  (${seconds.toFixed(1)}s)`;
                }
              }
            },
            legend: { labels: { color: 'white' } }
          },
          scales: {
            x: {
              type: 'linear',
              min: 0,
              max: maxX,          
              title: {
                display: true,
                text: 'Time (seconds since session start)',
                color: '#ccc'
              },
              ticks: { color: 'white' },
              grid:  { color: 'rgba(255,255,255,0.1)' }
            },
            y: {
              min: 0,
              max: 100,            
              title: { display: true, text: 'HP', color: '#ccc' },
              ticks: { color: 'white' },
              grid:  { color: 'rgba(255,255,255,0.1)' }
            }
          }
        }
      });
    }

    function getMaxX(datasets) {
      let max = 0;
      for (const ds of datasets) {
        for (const pt of ds.data) {
          if (pt.x > max) max = pt.x;
        }
      }
      return Math.ceil(max / 10) * 10 || 100;
    }


    async function loadHpAverage() {
      const res    = await fetch('/api/wormhole/hp-average?bucket=10');
      const result = await res.json();

      if (!result.success) { console.error(result.error); return; }

      const datasets = [{
        label: 'Avg HP (all sessions)',
        data: result.data,
        borderColor: '#00ffff',
        backgroundColor: 'rgba(0,255,255,0.08)',
        tension: 0.3,
        pointRadius: 3,
        pointHoverRadius: 5,
        fill: true,
        showLine: true
      }];

      buildHpChart(datasets, getMaxX(datasets));
    }


    async function loadHpTimeline(limit) {
      const res    = await fetch(`/api/wormhole/hp-timeline?limit=${limit}`);
      const result = await res.json();

      if (!result.success) { console.error(result.error); return; }

      const sessions = result.sessions;
      if (!sessions.length) { if (hpChart) hpChart.destroy(); return; }

      const datasets = sessions.map((sessionKey, idx) => {
        const hue        = (idx * 72) % 360;
        const shortLabel = sessionKey.slice(0, 10);
        return {
          label: `Session ${idx + 1} (${shortLabel})`,
          data:  result.data[sessionKey],
          borderColor:     `hsl(${hue}, 70%, 60%)`,
          backgroundColor: 'transparent',
          tension: 0.3,
          pointRadius: 3,
          pointHoverRadius: 5,
          fill: false,
          showLine: true
        };
      });

      buildHpChart(datasets, getMaxX(datasets));
    }

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab = btn.dataset.tab;
        await renderActiveTab();
      });
    });

    async function renderActiveTab() {
      if      (activeTab === 'avg')     await loadHpAverage();
      else if (activeTab === 'recent1') await loadHpTimeline(1);
      else if (activeTab === 'recent5') await loadHpTimeline(5);
    }

    async function loadDashboard() {
      await loadSummary();
      await loadInsights();
      await loadChart();
      await renderActiveTab();  
    }

    loadDashboard();
  </script>

  <script>
    let scatterChart;

    const STAT_LABELS = {
      spawn_interval:    "Avg Enemy Spawn Interval (s)",
      heal_amount:       "Cosmic Prism Heal Amount",
      avg_enemy_health:  "Avg Enemy Health",
      fractal_interval:  "Avg Fractal Cascade Interval (s)",
      slime_interval:    "Avg Slime Attack Interval (s)",
      prism_interval:    "Avg Ocular Prism Interval (s)",
      avg_time_to_kill:  "Avg Time to Kill (ms)"
    };

    async function loadScatter(stat) {
      const res    = await fetch(`/api/wormhole/scatter?stat=${stat}`);
      const result = await res.json();

      if (!result.success) {
        console.error("Scatter error:", result.error);
        return;
      }

      const label = STAT_LABELS[stat];
      const ctx   = document.getElementById('scatterChart').getContext('2d');
      if (scatterChart) scatterChart.destroy();

      const xMax = result.data.length
        ? Math.ceil(Math.max(...result.data.map(p => p.x)) * 1.1)
        : 100;

      const yValues = [...new Set(result.data.map(p => p.y))].sort((a, b) => a - b);

      scatterChart = new Chart(ctx, {
        type: 'scatter',
        data: {
          datasets: [{
            label,
            data: result.data,
            backgroundColor: 'rgba(0, 255, 255, 0.55)',
            pointRadius: 6,
            pointHoverRadius: 9
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { labels: { color: 'white' } },
            tooltip: {
              callbacks: {
                label: (ctx) =>
                  `${label}: ${ctx.raw.x}  |  Waves Cleared: ${ctx.raw.y}`
              }
            }
          },
          scales: {
            x: {
              type: 'linear',
              min: 0,
              max: xMax,
              title: { display: true, text: label, color: '#ccc' },
              ticks: { color: 'white' },
              grid:  { color: 'rgba(255,255,255,0.1)' }
            },
            y: {
              type: 'linear',
              min: 0,
              ticks: {
                color: 'white',
                stepSize: 1,
                callback: (val) => Number.isInteger(val) ? val : null
              },
              title: { display: true, text: 'Waves Cleared', color: '#ccc' },
              grid:  { color: 'rgba(255,255,255,0.1)' }
            }
          }
        }
      });
    }

    document.getElementById('scatterStatSelect').addEventListener('change', (e) => {
      loadScatter(e.target.value);
    });

    async function loadDashboard() {
      await loadSummary();
      await loadInsights();
      await loadChart();
      await renderActiveTab();
      await loadScatter('spawn_interval'); 
    }

    loadDashboard();
  </script>
