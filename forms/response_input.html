    <script>
        const API_BASE = '';  

        function setupCounter(textareaId, countId, max) {
            const ta = document.getElementById(textareaId);
            const el = document.getElementById(countId);
            ta.addEventListener('input', () => {
                const len = ta.value.length;
                el.textContent = `${len} / ${max}`;
                el.className = 'char-count' + (len > max * 0.9 ? ' warning' : '') + (len >= max ? ' danger' : '');
            });
        }
        setupCounter('prompt',     'prompt-count', 2000);
        setupCounter('response_a', 'a-count',      5000);
        setupCounter('response_b', 'b-count',      5000);

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const prompt     = document.getElementById('prompt').value.trim();
            const response_a = document.getElementById('response_a').value.trim();
            const response_b = document.getElementById('response_b').value.trim();
            const source     = document.getElementById('source').value;

            if (!prompt || !response_a || !response_b) {
                showMsg('All three fields are required.', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Submitting...';

            try {
                const res = await fetch(`${API_BASE}/api/responses`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, response_a, response_b, source })
                });
                const data = await res.json();

                if (data.success) {
                    showMsg(`✅ Submitted! Pair #${data.pair_id} is live in the Arena.`, 'success');
                    document.getElementById('prompt').value = '';
                    document.getElementById('response_a').value = '';
                    document.getElementById('response_b').value = '';
                    ['prompt-count','a-count','b-count'].forEach(id => {
                        document.getElementById(id).textContent = document.getElementById(id).textContent.replace(/^\d+/, '0');
                    });
                    loadRecent();
                } else {
                    showMsg('❌ ' + data.error, 'error');
                }
            } catch (err) {
                showMsg('Network error: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Submit to Arena';
            }
        });

        async function loadRecent() {
            try {
                const res  = await fetch(`${API_BASE}/api/responses?limit=5`);
                const data = await res.json();
                const list = document.getElementById('recent-list');

                if (!data.success || !data.data.length) {
                    list.innerHTML = `<p style="font-family:'SpaceLetters'; color:rgba(160,160,204,0.5); font-size:0.85rem;">No submissions yet. Be the first!</p>`;
                    return;
                }

                list.innerHTML = data.data.map(pair => `
                    <div class="pair-card">
                        <div class="pair-prompt">${escHtml(pair.prompt)}</div>
                        <div class="pair-meta">
                            <span>#${pair.id}</span>
                            <span class="pair-source">${escHtml(pair.source || 'manual')}</span>
                            <span>${new Date(pair.created_at).toLocaleDateString()}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('recent-list').innerHTML =
                    `<p style="font-family:'SpaceLetters'; color:rgba(255,100,100,0.6); font-size:0.85rem;">Could not load recent submissions.</p>`;
            }
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function showMsg(text, type) {
            const div = document.getElementById('msg');
            div.innerHTML = `<div class="message ${type}">${text}</div>`;
            if (type === 'success') setTimeout(() => div.innerHTML = '', 6000);
        }

        loadRecent();
    </script>
