<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Audio Training</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-deep:      #170032;
    --bg-mid:       #37025a;
    --accent-1:     #830cde;
    --accent-2:     #A55AFF;
    --accent-3:     #667eea;
    --neon-cyan:    #00ffff;
    --neon-green:   #67FEBD;
    --neon-pink:    #ff69b4;
    --neon-magenta: #dc4ce8;
    --neon-hot:     #c71585;
    --neon-amber:   #fecd39;
    --neon-orange:  #ff6200;
    --text-dim:     #9090C0;
    --text-bright:  #C4C3D0;
    --glass-bg:     rgba(55, 2, 90, 0.45);
    --glass-border: rgba(165, 90, 255, 0.28);
    --glass-shine:  rgba(196, 181, 253, 0.07);
    --shadow-glow:  0 0 24px rgba(131, 12, 222, 0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-deep);
    color: var(--text-bright);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    overflow-x: hidden;
    overflow-y: auto;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(131,12,222,0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(131,12,222,0.07) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
    animation: gridDrift 60s linear infinite;
  }
  @keyframes gridDrift {
    from { background-position: 0 0; }
    to   { background-position: 40px 40px; }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 40% at 15% 20%, rgba(131,12,222,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 50% at 85% 75%, rgba(220,76,232,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 30% 30% at 50% 100%, rgba(0,255,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .main-grid {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 32px 16px;
    gap: 20px;
    flex-wrap: wrap;
  }

  .column-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .column-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 8px;
    font-weight: 900;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent-2);
    opacity: 0.7;
    margin-bottom: 10px;
    text-align: center;
  }

  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    box-shadow: var(--shadow-glow), inset 0 1px 0 var(--glass-shine);
  }

  .training-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    width: 290px;
    padding: 20px;
  }

  .panel {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    padding: 16px;
    box-shadow: inset 0 1px 0 var(--glass-shine);
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent-2);
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid rgba(165,90,255,0.2);
  }

  .btn-primary {
    width: 100%;
    height: 52px;
    background: linear-gradient(135deg, var(--accent-1) 0%, var(--neon-magenta) 100%);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    box-shadow: 0 0 20px rgba(131,12,222,0.5), inset 0 1px 0 rgba(255,255,255,0.15);
    position: relative;
    overflow: hidden;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 0.1em;
    color: white;
  }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 0 32px rgba(220,76,232,0.7);
    transform: translateY(-1px);
  }

  .training-buttons {
    display: flex;
    gap: 12px;
    margin-top: 8px;
  }

  .rating-btn {
    flex: 1;
    height: 48px;
    border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: rgba(55, 2, 90, 0.5);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Orbitron', sans-serif;
    font-size: 12px;
    letter-spacing: 0.1em;
    color: var(--text-bright);
  }
  .rating-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .rating-btn img { width: 20px; height: 20px; }

  .like-btn:hover:not(:disabled) {
    border-color: var(--neon-green);
    box-shadow: 0 0 16px rgba(103,254,189,0.4);
    background: rgba(103,254,189,0.1);
  }
  .dislike-btn:hover:not(:disabled) {
    border-color: var(--neon-hot);
    box-shadow: 0 0 16px rgba(199,21,133,0.4);
    background: rgba(199,21,133,0.1);
  }

  .control-group {
    margin-bottom: 10px;
  }
  .control-group:last-child { margin-bottom: 0; }

  .control-group label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--text-dim);
    font-size: 11px;
    margin-bottom: 4px;
  }

  .val-display {
    color: var(--neon-cyan);
    font-size: 11px;
    min-width: 32px;
    text-align: right;
  }

  .slider-row input[type="range"] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--accent-1), var(--neon-magenta));
    outline: none;
    cursor: pointer;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px;
    height: 13px;
    border-radius: 50%;
    background: var(--neon-cyan);
    box-shadow: 0 0 8px var(--neon-cyan);
    cursor: pointer;
  }
  .slider-long   input[type="range"]::-webkit-slider-thumb { background: var(--neon-cyan); }
  .slider-medium input[type="range"]::-webkit-slider-thumb { background: var(--accent-2); }
  .slider-short  input[type="range"]::-webkit-slider-thumb { background: var(--neon-pink); }

  .bucket-badge {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 0.12em;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 600;
    vertical-align: middle;
  }
  .badge-long   { background: rgba(0,255,255,0.12);    color: var(--neon-cyan);    border: 1px solid rgba(0,255,255,0.3); }
  .badge-medium { background: rgba(165,90,255,0.12);   color: var(--accent-2);     border: 1px solid rgba(165,90,255,0.3); }
  .badge-short  { background: rgba(255,105,180,0.12);  color: var(--neon-pink);    border: 1px solid rgba(255,105,180,0.3); }

  /* ── NOTE PAIR DISPLAY ── */
  .note-display {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px 0 4px;
    min-height: 48px;
  }
  .note-chip {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.04em;
    padding: 6px 14px;
    border-radius: 8px;
    border: 1px solid var(--glass-border);
    background: rgba(55,2,90,0.6);
    color: var(--neon-cyan);
    text-shadow: 0 0 10px var(--neon-cyan);
    box-shadow: 0 0 12px rgba(0,255,255,0.2);
    min-width: 52px;
    text-align: center;
  }
  .note-chip.note-b { color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta); box-shadow: 0 0 12px rgba(220,76,232,0.2); border-color: rgba(220,76,232,0.3); }
  .note-sep {
    color: var(--text-dim);
    font-size: 14px;
    opacity: 0.6;
  }
  .note-loading { color: var(--text-dim); font-size: 11px; letter-spacing: 0.1em; opacity: 0.5; }

</style>
</head>
<body>

<main class="main-grid">

  <!-- ── COLUMN 1: PHRASE ── -->
  <div class="column-wrap">
    <div class="column-label">Phrase</div>
    <div class="training-container glass">
      <button class="btn-primary" id="playBtn" disabled>GENERATE &amp; PLAY</button>

      <div class="panel">
        <div class="panel-title">Generative Tweaks</div>
        <div class="control-group">
          <label>
            <span>Suspension Risk</span>
            <span class="val-display" id="suspVal">30%</span>
          </label>
          <div class="slider-row">
            <input type="range" id="suspWeight" min="0" max="1" step="0.05" value="0.30">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Mixer Desk</div>
        <div class="control-group slider-long">
          <label>
            <span><span class="bucket-badge badge-long">LONG</span> Pad Gain</span>
            <span class="val-display" id="longVolVal">20%</span>
          </label>
          <div class="slider-row">
            <input id="longVol" type="range" min="0" max="1" step="0.01" value="0.20">
          </div>
        </div>
        <div class="control-group slider-medium">
          <label>
            <span><span class="bucket-badge badge-medium">MED</span> Melody Gain</span>
            <span class="val-display" id="medVolVal">65%</span>
          </label>
          <div class="slider-row">
            <input id="medVol" type="range" min="0" max="1" step="0.01" value="0.65">
          </div>
        </div>
        <div class="control-group slider-short">
          <label>
            <span><span class="bucket-badge badge-short">SHORT</span> Staccato Gain</span>
            <span class="val-display" id="shortVolVal">15%</span>
          </label>
          <div class="slider-row">
            <input id="shortVol" type="range" min="0" max="1" step="0.01" value="0.15">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Training</div>
        <div class="training-buttons">
          <button class="rating-btn like-btn" id="likeBtn" disabled>
            <img src="/static/images/like.png" alt="Like"> LIKE
          </button>
          <button class="rating-btn dislike-btn" id="dislikeBtn" disabled>
            <img src="/static/images/dislike.png" alt="Dislike"> DISLIKE
          </button>
        </div>
        <div id="prefStatus" style="margin-top:10px;font-size:10px;color:var(--text-dim);text-align:center;letter-spacing:0.08em;"></div>
      </div>
    </div>
  </div>

  <!-- ── COLUMN 2: HARMONY (simultaneous notes) ── -->
  <div class="column-wrap">
    <div class="column-label">Harmony</div>
    <div class="training-container glass">
      <button class="btn-primary" id="harmPlayBtn" disabled>PLAY TOGETHER</button>

      <div class="panel">
        <div class="panel-title">Notes Played Together</div>
        <div class="note-display">
          <span class="note-chip" id="harmNoteA"><span class="note-loading">—</span></span>
          <span class="note-sep">+</span>
          <span class="note-chip note-b" id="harmNoteB"><span class="note-loading">—</span></span>
        </div>
        <div style="font-size:10px;color:var(--text-dim);text-align:center;margin-top:6px;letter-spacing:0.08em;">
          Does this sound good together?
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Mixer</div>
        <div class="control-group slider-medium">
          <label>
            <span><span class="bucket-badge badge-medium">MED</span> Volume</span>
            <span class="val-display" id="harmMedVolVal">65%</span>
          </label>
          <div class="slider-row">
            <input id="harmMedVol" type="range" min="0" max="1" step="0.01" value="0.65">
          </div>
        </div>
        <div class="control-group slider-short">
          <label>
            <span><span class="bucket-badge badge-short">SHORT</span> Volume</span>
            <span class="val-display" id="harmShortVolVal">65%</span>
          </label>
          <div class="slider-row">
            <input id="harmShortVol" type="range" min="0" max="1" step="0.01" value="0.65">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Training</div>
        <div class="training-buttons">
          <button class="rating-btn like-btn" id="harmLikeBtn" disabled>
            <img src="/static/images/like.png" alt="Like"> LIKE
          </button>
          <button class="rating-btn dislike-btn" id="harmDislikeBtn" disabled>
            <img src="/static/images/dislike.png" alt="Dislike"> DISLIKE
          </button>
        </div>
        <div id="harmStatus" style="margin-top:10px;font-size:10px;color:var(--text-dim);text-align:center;letter-spacing:0.08em;"></div>
      </div>
    </div>
  </div>

  <!-- ── COLUMN 3: SEQUENCE (consecutive notes) ── -->
  <div class="column-wrap">
    <div class="column-label">Sequence</div>
    <div class="training-container glass">
      <button class="btn-primary" id="seqPlayBtn" disabled>PLAY SEQUENCE</button>

      <div class="panel">
        <div class="panel-title">2 Consecutive Notes</div>
        <div class="note-display">
          <span class="note-chip" id="seqNoteA"><span class="note-loading">—</span></span>
          <span class="note-sep">→</span>
          <span class="note-chip note-b" id="seqNoteB"><span class="note-loading">—</span></span>
        </div>
        <div style="font-size:10px;color:var(--text-dim);text-align:center;margin-top:6px;letter-spacing:0.08em;">
          Does this transition feel right?
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Mixer</div>
        <div class="control-group slider-medium">
          <label>
            <span><span class="bucket-badge badge-medium">MED</span> Volume</span>
            <span class="val-display" id="seqMedVolVal">65%</span>
          </label>
          <div class="slider-row">
            <input id="seqMedVol" type="range" min="0" max="1" step="0.01" value="0.65">
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Training</div>
        <div class="training-buttons">
          <button class="rating-btn like-btn" id="seqLikeBtn" disabled>
            <img src="/static/images/like.png" alt="Like"> LIKE
          </button>
          <button class="rating-btn dislike-btn" id="seqDislikeBtn" disabled>
            <img src="/static/images/dislike.png" alt="Dislike"> DISLIKE
          </button>
        </div>
        <div id="seqStatus" style="margin-top:10px;font-size:10px;color:var(--text-dim);text-align:center;letter-spacing:0.08em;"></div>
      </div>
    </div>
  </div>

</main>

<script type="module">
import { musicRules, ruleLibrary } from '/api/audio/rules.js';

// ── COMPOSITION RULES ────────────────────────────────────────────────────────
const compRules = ruleLibrary?.rule_library ?? null;
const NLB = musicRules.noteLengthBuckets ?? {};
const BUCKET_WEIGHTS = NLB.bucketWeights ?? { long: 0.33, medium: 0.34, short: 0.33 };
const BUCKET_BY_PITCH = NLB.bucketByPitch ?? {};
const BUCKET_TRANSITIONS = NLB.bucketTransitions ?? {
  long:   [{next:'long',weight:0.35},{next:'medium',weight:0.50},{next:'short',weight:0.15}],
  medium: [{next:'long',weight:0.20},{next:'medium',weight:0.40},{next:'short',weight:0.40}],
  short:  [{next:'long',weight:0.10},{next:'medium',weight:0.45},{next:'short',weight:0.45}],
};
const BUCKET_RHYTHM_BIAS = NLB.bucketRhythmBias ?? {
  long:   { whole:0.35, 'dotted-half':0.30, half:0.25, 'dotted-quarter':0.10 },
  medium: { half:0.20, 'dotted-quarter':0.30, quarter:0.35, 'dotted-eighth':0.15 },
  short:  { quarter:0.15, 'dotted-eighth':0.20, eighth:0.45, sixteenth:0.20 },
};
const BUCKET_TENSION_MAP = NLB.bucketTensionMap ?? { avgTensionByBucket:{}, pitchBias:{} };
const smoothnessRules = musicRules.smoothnessRules ?? {
  transitionSmoothness:{}, rhythmFlowRules:[], smoothnessBias:0.85,
};

// ── PREFERENCE SIGNALS (from RLHF training data baked into rules.js) ─────────
const PREF = musicRules.preferenceSignals ?? {};
const PREF_TOTAL   = PREF.total_ratings ?? 0;
const PREF_LIKED   = PREF.overall_like_rate ?? null;

// Build fast lookup maps from note_transition_signals
// pref_score is +1 (always liked) to -1 (always disliked)
const LIKED_TRANS_BOOST  = {};   // "A4->B4" -> boost multiplier > 1
const DISLIKED_TRANS_PEN = {};   // "G4->F#4" -> penalty multiplier < 1
const PREF_BOOST_STRENGTH = 2.5; // how strongly to reward liked transitions
const PREF_PEN_STRENGTH   = 0.3; // how much to penalise disliked transitions

(PREF.note_transition_signals?.top_liked ?? []).forEach(t => {
  const key = `${t.from}->${t.to}`;
  // Scale boost by preference_score (0→1) so weak signals don't over-steer
  LIKED_TRANS_BOOST[key] = 1 + (PREF_BOOST_STRENGTH - 1) * t.preference_score;
});
(PREF.note_transition_signals?.top_disliked ?? []).forEach(t => {
  const key = `${t.from}->${t.to}`;
  DISLIKED_TRANS_PEN[key] = PREF_PEN_STRENGTH + (1 - PREF_PEN_STRENGTH) * (1 + t.preference_score);
});

// Liked bucket distribution — nudge bucket weights toward what got liked
const LIKED_BUCKET_DIST = PREF.liked_patterns?.avg_bucket_dist ?? null;

function preferenceBoost(fromPitch, toPitch) {
  // Returns a weight multiplier for a from->to pitch transition.
  // Strips octave numbers so "G4->A4" matches signal key "G->A".
  if (!fromPitch || !toPitch || PREF_TOTAL === 0) return 1.0;
  const from = fromPitch.replace(/\d/g, '');
  const to   = toPitch.replace(/\d/g, '');
  const key  = `${from}->${to}`;
  if (LIKED_TRANS_BOOST[key])  return LIKED_TRANS_BOOST[key];
  if (DISLIKED_TRANS_PEN[key]) return DISLIKED_TRANS_PEN[key];
  return 1.0;
}

const TENSION_MAP = {
  'G':0.0,'A':0.2,'B':0.1,'C':0.3,'D':0.1,
  'E':0.2,'F#':0.5,'G#':0.8,'A#':0.7,'C#':0.9,'D#':0.7,'F':0.6,
};

const DUR_TYPE_TO_MULT = {
  'whole':4,'half':2,'quarter':1,'eighth':0.5,'sixteenth':0.25,'thirty-second':0.125,
  'dotted-half':3,'dotted-quarter':1.5,'dotted-eighth':0.75,'other':1,
};

const BPM = 90;
const BEAT_SEC = 60 / BPM;
const HALF_QUARTER_SEC = BEAT_SEC * 2;
const MEASURE_DUR_SEC = BEAT_SEC * 4;

const AUDIO_PATHS = {
  long:   'https://uknctjnhzxedyxlioloq.supabase.co/storage/v1/object/public/meowREMIX-long',
  medium: 'https://uknctjnhzxedyxlioloq.supabase.co/storage/v1/object/public/meowREMIX-med',
  short:  'https://uknctjnhzxedyxlioloq.supabase.co/storage/v1/object/public/meowREMIX-short',
};
const SAMPLE_NAMES = ["g","a","b","c","d","e","f","g2"];

// ── AUDIO CONTEXT & BUFFERS ──────────────────────────────────────────────────
const actx = new (window.AudioContext || window.webkitAudioContext)();
let longBuffers = {}, medBuffers = {}, shortBuffers = {};
let longGain, medGain, shortGain;
let currentPhrase = null;
let phraseTimeout = null;
let engineRunning = false;
let engineStartTime = 0;               // <-- FIX: declare global

// ── UI ELEMENTS ──────────────────────────────────────────────────────────────
const playBtn   = document.getElementById('playBtn');
const likeBtn   = document.getElementById('likeBtn');
const dislikeBtn= document.getElementById('dislikeBtn');
const suspInput = document.getElementById('suspWeight');
const longVol   = document.getElementById('longVol');
const medVol    = document.getElementById('medVol');
const shortVol  = document.getElementById('shortVol');

document.getElementById('suspWeight').addEventListener('input', e => {
  document.getElementById('suspVal').innerText = Math.round(e.target.value*100)+'%';
});
document.getElementById('longVol').addEventListener('input', e => {
  document.getElementById('longVolVal').innerText = Math.round(e.target.value*100)+'%';
  if (longGain) longGain.gain.value = e.target.value;
});
document.getElementById('medVol').addEventListener('input', e => {
  document.getElementById('medVolVal').innerText = Math.round(e.target.value*100)+'%';
  if (medGain) medGain.gain.value = e.target.value;
});
document.getElementById('shortVol').addEventListener('input', e => {
  document.getElementById('shortVolVal').innerText = Math.round(e.target.value*100)+'%';
  if (shortGain) shortGain.gain.value = e.target.value;
});

// ── PROBABILITY HELPERS ──────────────────────────────────────────────────────
function weightedRandom(items) {
  const total = items.reduce((s,i) => s + (i.weight ?? 0), 0);
  if (total <= 0) return items[0]?.item ?? items[0]?.note ?? items[0]?.duration ?? null;
  let r = Math.random() * total;
  for (const i of items) {
    r -= i.weight;
    if (r <= 0) return i.item ?? i.note ?? i.duration ?? null;
  }
  const last = items[items.length-1];
  return last.item ?? last.note ?? last.duration ?? null;
}
function weightedRandomFromObj(obj) {
  const keys = Object.keys(obj);
  const total = keys.reduce((s,k) => s+obj[k],0);
  let r = Math.random()*total;
  for (const k of keys) { r-=obj[k]; if(r<=0) return k; }
  return keys[0];
}

// ── UTILITY ──────────────────────────────────────────────────────────────────
function getTension(pitch) {
  if (!pitch || pitch==='REST') return 0;
  return TENSION_MAP[pitch.replace(/\d/g,'')]??0.3;
}
function pitchToMidi(pitch) {
  if (!pitch||pitch==='REST') return null;
  const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const m=pitch.match(/^([A-G][#b]?)(\d)$/);
  if(!m)return null;
  let pc=m[1].replace('Bb','A#').replace('Eb','D#').replace('Ab','G#').replace('Db','C#').replace('Gb','F#');
  const oct=parseInt(m[2]); const idx=NOTE_NAMES.indexOf(pc);
  return idx<0?null:idx+oct*12;
}
function getTransitionSmoothness(prev,next) {
  if(!prev||!next)return 0.5;
  const map=smoothnessRules.transitionSmoothness[prev];
  if(map&&map[next]!==undefined)return map[next];
  const iv=Math.abs(pitchToMidi(prev)-pitchToMidi(next));
  if(isNaN(iv))return 0.5;
  if(iv<=2)return 0.95; if(iv<=4)return 0.70; if(iv<=7)return 0.40; return 0.20;
}
function getRhythmFlowSmoothness(from,to) {
  if(!from||!to)return 0.5;
  const r=smoothnessRules.rhythmFlowRules.find(r=>r.from===from&&r.to===to);
  return r?r.smoothness:0.6;
}
function applySmoothnessWeight(base,s){ return base*Math.pow(0.6+0.4*s,smoothnessRules.smoothnessBias??0.85); }
function durTypeSec(durType){ return HALF_QUARTER_SEC*(DUR_TYPE_TO_MULT[durType]??1); }
function getNearestBeatKey(beat){
  const rules=musicRules.beatDurationRules; if(!rules)return null;
  const keys=Object.keys(rules).map(Number); if(!keys.length)return null;
  let closest=keys[0],minDist=Math.abs(beat-closest);
  for(const k of keys){const d=Math.abs(beat-k); if(d<minDist){minDist=d;closest=k;}}
  return minDist<=0.5?String(closest):null;
}

// ── COMPOSITIONAL BIAS ───────────────────────────────────────────────────────
function applyGravityBias(note,base){
  if(!compRules?.gravity_model)return base;
  const gm=compRules.gravity_model; const pc=note.replace(/\d/g,'');
  const tonicPCs=new Set(['G','B','D']), dominantPCs=new Set(['D','F#','A']), mediantPCs=new Set(['B','D','F#']);
  let pull=1.0;
  if(tonicPCs.has(pc))pull=gm.tonic_pull; else if(dominantPCs.has(pc))pull=gm.dominant_pull; else if(mediantPCs.has(pc))pull=gm.mediant_pull;
  return base*(0.5+0.5*pull);
}
function applyTensionBias(note,base,target){
  if(target===undefined||target===null)return base;
  const dev=Math.abs(getTension(note)-target);
  return base*(0.2+0.8*(1.0-dev));
}
function applyDestinationBias(note,base){
  if(!compRules?.phrase_destination_rules)return base;
  const dests=compRules.phrase_destination_rules['4_bar_phrase']; if(!dests)return base;
  const pc=note.replace(/\d/g,'');
  const chordMap={tonic:new Set(['G','B','D']),dominant:new Set(['D','F#','A']),mediant:new Set(['B','D','F#'])};
  const dest=generationState.destinationChord||'tonic';
  return (chordMap[dest]?.has(pc))?base*1.3:base;
}
function applyBucketTensionBias(candidates,bucket){
  const biasMap=BUCKET_TENSION_MAP.pitchBias?.[bucket]??{};
  if(!Object.keys(biasMap).length)return candidates;
  return candidates.map(c=>{const pc=c.note.replace(/\d/g,''); return{...c,weight:c.weight*(biasMap[pc]??1.0)};});
}
function applyCompositionalBiases(candidates,context={}){
  const {targetTension,phraseEnd,bucket}=context;
  return candidates.map(c=>{
    let w=c.weight;
    w=applyGravityBias(c.note,w);
    if(targetTension!==undefined)w=applyTensionBias(c.note,w,targetTension);
    if(phraseEnd)w=applyDestinationBias(c.note,w);
    return {note:c.note,weight:w};
  });
}

// ── GENERATION STATE ─────────────────────────────────────────────────────────
let generationState = {
  currentStructuralRole:'setup',
  measuresSinceRoleChange:0,
  nextRoleChangeMeasure:0,
  targetTension:0.3,
  phraseMeasureCounter:0,
  destinationChord:'tonic',
  lastMotifMeasure:-100,
  expectationDelayActive:false,
  currentBucket:'medium',
};

function updateStructuralRole(measureCount){
  if(!compRules?.role_transitions)return;
  if(measureCount<generationState.nextRoleChangeMeasure)return;
  const trans=compRules.role_transitions[generationState.currentStructuralRole]; if(!trans)return;
  const roles=Object.keys(trans), weights=roles.map(r=>trans[r]), total=weights.reduce((a,b)=>a+b,0);
  let r=Math.random()*total, chosen=generationState.currentStructuralRole;
  for(let i=0;i<roles.length;i++){ r-=weights[i]; if(r<=0){ chosen=roles[i]; break; }}
  generationState.currentStructuralRole=chosen;
  generationState.measuresSinceRoleChange=0;
  generationState.nextRoleChangeMeasure=measureCount+4+Math.floor(Math.random()*4);
}
function getTargetTensionFromArc(frac){
  if(!compRules?.tension_arc_templates?.length)return 0.3;
  const arcs=compRules.tension_arc_templates;
  const arc=arcs.reduce((b,c)=>(c.frequency>b.frequency?c:b),arcs[0]);
  const peak=arc.average_peak_location||0.6;
  return frac<peak?0.1+0.9*(frac/peak):1.0-0.9*((frac-peak)/(1-peak));
}

// ── NOTE SELECTION ───────────────────────────────────────────────────────────
function pickNextBucket(currentBucket){
  const trans=BUCKET_TRANSITIONS[currentBucket];
  if(!trans?.length)return weightedRandomFromObj(BUCKET_WEIGHTS);
  return weightedRandom(trans.map(t=>({item:t.next,weight:t.weight})));
}
function getWeightedNextNote(currentNote,prevNote=null,forceDiff=false,forceNonRest=false,context={}){
  const rules=musicRules.transitionRules;
  let candidates=rules[currentNote];
  if(!candidates?.length){ const all=Object.keys(rules).filter(p=>p!=='REST'); return all[Math.floor(Math.random()*all.length)]??'G4'; }
  let filtered=[...candidates];
  if(forceDiff) filtered=filtered.filter(c=>c.note!==currentNote);
  if(forceNonRest) filtered=filtered.filter(c=>c.note!=='REST');
  if(!filtered.length) filtered=candidates;
  let biased=applyCompositionalBiases(filtered,context);
  if(context.bucket) biased=applyBucketTensionBias(biased,context.bucket);
  const prevForSmooth=prevNote||currentNote;
  const smoothed=biased.map(c=>({note:c.note,weight:applySmoothnessWeight(c.weight,getTransitionSmoothness(prevForSmooth,c.note))}));
  // Apply RLHF preference boost — nudge toward liked transitions, away from disliked
  const boosted=smoothed.map(c=>({...c,weight:c.weight*preferenceBoost(currentNote,c.note)}));
  const total=boosted.reduce((s,i)=>s+i.weight,0);
  if(total<=0) return filtered[0]?.note??currentNote;
  const norm=boosted.map(c=>({...c,weight:c.weight/total}));
  return weightedRandom(norm.map(c=>({item:c.note,weight:c.weight})))??currentNote;
}
function getSuspensionResolution(fromNote){
  const sus=musicRules.suspensionRules; if(!sus?.length)return null;
  const match=sus.filter(r=>r.from===fromNote); if(!match.length)return null;
  return weightedRandom(match.map(r=>({item:r.to,weight:r.weight})));
}
function getHarmonyNote(melodyNote,currentHarmonyNote){
  if(!melodyNote||melodyNote==='REST')return'REST';
  const melPc=melodyNote.replace(/\d/g,''), melMidi=pitchToMidi(melodyNote);
  let candidates=[];
  if(musicRules.harmonyRules?.[melodyNote]) candidates=musicRules.harmonyRules[melodyNote].map(c=>({note:c.note??c,weight:c.weight??1}));
  if(!candidates.length&&musicRules.pitchClassHarmonyRules?.[melPc]) candidates=musicRules.pitchClassHarmonyRules[melPc].map(c=>({note:c.note,weight:c.weight}));
  if(candidates.length){
    const CONSONANCE={0:0.5,1:0.05,2:0.15,3:0.95,4:1.0,5:0.85,6:0.05,7:1.0,8:0.75,9:0.80,10:0.25,11:0.10};
    const vhr=musicRules.verticalHarmonyRules?.preferredIntervals?.[melPc]??[];
    const vhrMap={}; vhr.forEach(v=>{vhrMap[v.interval]=v.weight;});
    const prevH=currentHarmonyNote||melodyNote;
    const smoothed=candidates.map(c=>{
      const hm=pitchToMidi(c.note); if(hm===null||melMidi===null)return{note:c.note,weight:c.weight*0.3};
      const ivRaw=Math.abs(melMidi-hm), ivClass=ivRaw%12;
      const consonanceMult=CONSONANCE[ivClass]??0.3;
      const vhrBoost=(vhr.length>0)?(1.0+(vhrMap[ivClass]??0)*0.8):1.0;
      const widthMult=ivRaw<=12?1.0:ivRaw<=16?0.7:0.3;
      let leapMult=1.0;
      if(prevH&&prevH!=='REST'){ const pm=pitchToMidi(prevH); const leap=pm!==null?Math.abs(hm-pm):0;
        leapMult=leap===0?0.7:leap<=2?1.0:leap<=5?0.9:leap<=7?0.75:leap<=12?0.5:0.2; }
      return {note:c.note,weight:c.weight*consonanceMult*vhrBoost*widthMult*leapMult};
    });
    const threshold=musicRules.verticalHarmonyRules?.consonanceThreshold??0.5;
    const consonanceGate=smoothed.filter(c=>{const hm=pitchToMidi(c.note); const ivClass=hm!==null&&melMidi!==null?Math.abs(melMidi-hm)%12:6; return(CONSONANCE[ivClass]??0)>=threshold;});
    const pool=consonanceGate.length?consonanceGate:smoothed;
    const total=pool.reduce((s,i)=>s+i.weight,0); if(total>0)pool.forEach(c=>c.weight/=total);
    const sel=weightedRandom(pool.map(c=>({item:c.note,weight:c.weight})));
    if(sel){
      if(sel.match(/\d$/)) return sel;
      if(melMidi!==null){ for(const oct of[3,4,2]){ const cand=`${sel}${oct}`; const cm=pitchToMidi(cand); if(cm!==null&&melMidi-cm>=3&&melMidi-cm<=12)return cand; }
        for(const oct of[3,4,2]){ const cand=`${sel}${oct}`; const cm=pitchToMidi(cand); if(cm!==null&&cm<melMidi)return cand; } }
      return `${sel}4`;
    }
  }
  return getNoteAtInterval(melodyNote,-5)??melodyNote;
}
function getNoteAtInterval(base,semitones){
  const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  try{
    const parts=base.match(/^([A-G][#b]?)(\d)$/); if(!parts)return null;
    let pc=parts[1].replace('Bb','A#').replace('Eb','D#').replace('Ab','G#').replace('Db','C#').replace('Gb','F#');
    const oct=parseInt(parts[2]), baseIdx=NOTE_NAMES.indexOf(pc); if(baseIdx<0)return null;
    const newMidi=baseIdx+oct*12+semitones;
    return `${NOTE_NAMES[((newMidi%12)+12)%12]}${Math.floor(newMidi/12)}`;
  }catch{return null;}
}
function getSmoothBarCandidate(prevBarNote,forceDifferent=false){
  if(!musicRules.barCenterRules||!Object.keys(musicRules.barCenterRules).length){
    const notes=['G3','C4','D4','E4','G4'];
    if(forceDifferent&&prevBarNote){ const others=notes.filter(n=>n!==prevBarNote); return others[Math.floor(Math.random()*others.length)]??notes[0]; }
    return notes[Math.floor(Math.random()*notes.length)];
  }
  let candidates=musicRules.barCenterRules[prevBarNote];
  if(!candidates?.length){ const all=Object.keys(musicRules.barCenterRules); candidates=musicRules.barCenterRules[all[Math.floor(Math.random()*all.length)]]??[]; if(!candidates.length)return'G3'; }
  let filtered=[...candidates];
  if(forceDifferent&&prevBarNote){ filtered=filtered.filter(c=>c.note!==prevBarNote); if(!filtered.length){ const others=Object.keys(musicRules.barCenterRules).filter(n=>n!==prevBarNote); return others.length?others[Math.floor(Math.random()*others.length)]:prevBarNote; } }
  const prevMidi=pitchToMidi(prevBarNote);
  const smoothed=filtered.map(c=>{ let smooth=0.5; if(prevMidi!==null){ const nm=pitchToMidi(c.note); if(nm!==null){ const iv=Math.abs(nm-prevMidi); smooth=iv<=2?0.95:iv<=5?0.70:iv<=7?0.40:0.20; }} return {item:c.note,weight:applySmoothnessWeight(c.weight,smooth)}; });
  const total=smoothed.reduce((s,i)=>s+i.weight,0); if(total<=0)return filtered[0]?.note??prevBarNote;
  const norm=smoothed.map(c=>({...c,weight:c.weight/total}));
  return weightedRandom(norm)??prevBarNote;
}

// ── BUCKET RHYTHM SELECTION ──────────────────────────────────────────────────
function getBucketRhythmDuration(bucket,atTime,prevDurType){
  const biasObj=BUCKET_RHYTHM_BIAS[bucket]??{};
  let entries=Object.entries(biasObj).map(([dur,w])=>({duration:dur,weight:w}));
  if(!entries.length) return getRhythmSequence(atTime,prevDurType)[0];
  if(atTime!==null&&engineStartTime>0){
    const beat=(atTime-engineStartTime)%MEASURE_DUR_SEC/BEAT_SEC+1;
    const key=getNearestBeatKey(beat);
    const beatRules=musicRules.beatDurationRules?.[key];
    if(beatRules?.length){
      const beatMap=Object.fromEntries(beatRules.map(r=>[r.duration,r.weight]));
      const blended=entries.map(e=>({duration:e.duration,weight:e.weight*(beatMap[e.duration]??0.1)}));
      const bTotal=blended.reduce((s,e)=>s+e.weight,0);
      if(bTotal>0) entries=blended.map(e=>({...e,weight:e.weight/bTotal}));
    }
  }
  if(prevDurType){
    entries=entries.map(e=>{const s=getRhythmFlowSmoothness(prevDurType,e.duration); return{...e,weight:applySmoothnessWeight(e.weight,s)};});
    const total=entries.reduce((s,e)=>s+e.weight,0); if(total>0) entries.forEach(e=>e.weight/=total);
  }
  const picked=weightedRandom(entries.map(e=>({item:e.duration,weight:e.weight})));
  return durTypeSec(picked??'quarter');
}
function getRhythmSequence(atTime=null,prevDurType=null){
  if(atTime!==null&&engineStartTime>0){
    const beat=(atTime-engineStartTime)%MEASURE_DUR_SEC/BEAT_SEC+1;
    const key=getNearestBeatKey(beat);
    const beatRules=musicRules.beatDurationRules?.[key];
    if(beatRules?.length){
      let cands=beatRules.map(r=>({...r}));
      if(prevDurType){ cands=cands.map(c=>({...c,weight:applySmoothnessWeight(c.weight,getRhythmFlowSmoothness(prevDurType,c.duration))})); const t=cands.reduce((s,c)=>s+c.weight,0); if(t>0)cands.forEach(c=>c.weight/=t); }
      const picked=weightedRandom(cands.map(c=>({item:c.duration,weight:c.weight})));
      if(picked) return [durTypeSec(picked)];
    }
  }
  const rhythms=musicRules.rhythmPatterns;
  if(rhythms?.length){
    let cands=[...rhythms];
    if(prevDurType){ cands=cands.map(p=>p.pattern?.length?{...p,weight:applySmoothnessWeight(p.weight,getRhythmFlowSmoothness(prevDurType,p.pattern[0]))}:p);
      const t=cands.reduce((s,p)=>s+p.weight,0); if(t>0)cands.forEach(p=>p.weight/=t); }
    const pat=weightedRandom(cands.map(p=>({item:p,weight:p.weight})));
    if(pat) return pat.pattern.map(durTypeSec);
  }
  const singles=musicRules.singleDurations;
  if(singles&&Object.keys(singles).length){
    let entries=Object.entries(singles).map(([dur,w])=>({item:dur,weight:w}));
    if(prevDurType){ entries=entries.map(e=>({...e,weight:applySmoothnessWeight(e.weight,getRhythmFlowSmoothness(prevDurType,e.item))})); const t=entries.reduce((s,e)=>s+e.weight,0); if(t>0)entries.forEach(e=>e.weight/=t); }
    const sel=weightedRandom(entries); if(sel) return [durTypeSec(sel)];
  }
  return [HALF_QUARTER_SEC];
}

// ── MOTIF INJECTION ──────────────────────────────────────────────────────────
function maybeInjectMotif(currentPitch){
  if(!compRules?.emotional_memory_rules)return null;
  const mem=compRules.emotional_memory_rules;
  const since=generationState.lastMotifMeasure===-100?999:generationState.phraseMeasureCounter-generationState.lastMotifMeasure;
  const dist=mem.average_motif_return_distance||8;
  const prob=(since>=dist-1&&since<=dist+2)?0.25:0.05;
  if(Math.random()>prob)return null;
  const byEntry=musicRules.motifsByEntry; if(!byEntry||!currentPitch)return null;
  const matching=byEntry[currentPitch]; if(!matching?.length)return null;
  const sel=weightedRandom(matching.map(m=>({item:m,weight:m.weight})));
  if(sel?.pattern){ generationState.lastMotifMeasure=generationState.phraseMeasureCounter; return sel.pattern.slice(1); }
  return null;
}

// ── SAMPLE MAPPING ───────────────────────────────────────────────────────────
function pitchToSampleName(pitch,bucket){
  if(!pitch||pitch==='REST')return null;
  const base=pitch.replace(/\d/g,'').replace('♯','#').replace('♭','-');
  const PC_MAP={'G':'g','G#':'g','Gb':'g','A':'a','A#':'a','Ab':'a','B':'b','B#':'b','Bb':'b','C':'c','C#':'c','Cb':'c','D':'d','D#':'d','Db':'d','E':'e','E#':'e','Eb':'e','F':'f','F#':'f','Fb':'f'};
  const pc=base; const preferred=BUCKET_BY_PITCH[pc]?.[bucket];
  if(preferred){ const buffers=bucket==='long'?longBuffers:bucket==='medium'?medBuffers:shortBuffers; if(buffers[preferred])return preferred; }
  let sample=PC_MAP[base]??'c'; if((base==='G'||base==='G#')&&pitch.includes('5'))sample='g2';
  const buffers=bucket==='long'?longBuffers:bucket==='medium'?medBuffers:shortBuffers;
  if(!buffers[sample]){ return buffers['g']?'g':null; }
  return sample;
}

// ── VOICE STATE & SIMULATION ─────────────────────────────────────────────────
function makeVoiceState(){
  return {currentNote:null,prevNote:null,consecutiveSame:0,consecutiveRest:0,motifQueue:[],pendingSuspension:null,nextNoteTime:0,lastDurationType:null,currentBucket:'medium'};
}
function tickVoiceSim(state,voiceRole,atTime,currentMelodyNote=null){
  const elapsed=atTime-engineStartTime; const totalMeasures=elapsed/MEASURE_DUR_SEC;
  generationState.phraseMeasureCounter=totalMeasures;
  updateStructuralRole(totalMeasures);
  const songFrac=(totalMeasures%64)/64; generationState.targetTension=getTargetTensionFromArc(songFrac);
  if(totalMeasures%4<0.1&&generationState.phraseMeasureCounter>0){
    const dests=compRules?.phrase_destination_rules?.['4_bar_phrase'];
    if(dests) generationState.destinationChord=weightedRandomFromObj(dests);
  }
  const isNearPhraseEnd=(totalMeasures%4)>3.5;
  const delayProb=compRules?.expectation_rules?.delay_probability??0.18;
  if(isNearPhraseEnd&&Math.random()<delayProb&&!generationState.expectationDelayActive){
    generationState.expectationDelayActive=true;
    state.nextNoteTime=atTime+(compRules?.expectation_rules?.average_delay_length??1)*BEAT_SEC;
    return {note:'REST',tension:0,bucket:state.currentBucket,durSec:BEAT_SEC,voice:voiceRole};
  }else{ generationState.expectationDelayActive=false; }
  let bucket;
  if(voiceRole==='bar') bucket='long';
  else bucket=pickNextBucket(state.currentBucket);
  state.currentBucket=bucket;
  const durSec=getBucketRhythmDuration(bucket,atTime,state.lastDurationType);
  let noteToPlay=null;
  if(state.pendingSuspension){
    noteToPlay=state.pendingSuspension; state.pendingSuspension=null;
  }else if(state.motifQueue.length>0){
    noteToPlay=state.motifQueue.shift();
  }else{
    if(!state.currentNote){ const all=Object.keys(musicRules.transitionRules).filter(p=>p!=='REST'); state.currentNote=all[Math.floor(Math.random()*all.length)]??'G4'; }
    const forceDiff=state.consecutiveSame>=4, forceNonRest=state.consecutiveRest>=3;
    if(voiceRole==='melody'){
      const suspWeight=parseFloat(suspInput.value);
      if(getTension(state.currentNote)>=0.4&&Math.random()<suspWeight){
        const res=getSuspensionResolution(state.currentNote); if(res){ noteToPlay=state.currentNote; state.pendingSuspension=res; }
      }
    }
    if(!noteToPlay){
      if(voiceRole==='harmony'&&currentMelodyNote) noteToPlay=getHarmonyNote(currentMelodyNote,state.currentNote);
      else if(voiceRole==='bar') noteToPlay=getSmoothBarCandidate(state.currentNote,false);
      else{
        const phraseEnd=(totalMeasures%4)>3.5;
        noteToPlay=getWeightedNextNote(state.currentNote,state.prevNote,forceDiff,forceNonRest,{targetTension:generationState.targetTension,phraseEnd,bucket});
      }
    }
    if(voiceRole==='melody'){ const tail=maybeInjectMotif(state.currentNote); if(tail?.length) state.motifQueue.push(...tail); }
  }
  const durType=Object.entries(DUR_TYPE_TO_MULT).find(([,m])=>Math.abs(durTypeSec(Object.keys(DUR_TYPE_TO_MULT).find(t=>DUR_TYPE_TO_MULT[t]===m)??'quarter')-durSec)<0.01)?.[0]??'quarter';
  state.lastDurationType=durType;
  if(noteToPlay==='REST'){ state.consecutiveRest++; state.consecutiveSame=0; }
  else{ state.consecutiveSame=noteToPlay===state.currentNote?state.consecutiveSame+1:0; state.consecutiveRest=0; }
  state.prevNote=state.currentNote; state.currentNote=noteToPlay;
  state.nextNoteTime=atTime+durSec;
  return {note:noteToPlay,tension:getTension(noteToPlay),bucket,durSec,voice:voiceRole};
}

// ── PHRASE GENERATION ────────────────────────────────────────────────────────
function generatePhrase(){
  const phraseId=crypto.randomUUID();
  const notes=[];
  const MEASURE_COUNT = 2;          // <-- SHORTER PHRASE: 2 bars
  const totalTime = MEASURE_COUNT * MEASURE_DUR_SEC;
  const beatSec=BEAT_SEC;
  generationState={
    currentStructuralRole:'setup', measuresSinceRoleChange:0, nextRoleChangeMeasure:4,
    targetTension:0.3, phraseMeasureCounter:0, destinationChord:'tonic', lastMotifMeasure:-100,
    expectationDelayActive:false, currentBucket:'medium',
  };
  const melState=makeVoiceState(), harState=makeVoiceState(), barState=makeVoiceState();
  const barKeys=Object.keys(musicRules.barCenterRules??{});
  barState.currentNote=barKeys.length?barKeys[Math.floor(Math.random()*barKeys.length)]:'G3';
  engineStartTime=0; // simulation time offset
  while(melState.nextNoteTime<totalTime||harState.nextNoteTime<totalTime||barState.nextNoteTime<totalTime){
    const nextTimes=[];
    if(melState.nextNoteTime<totalTime) nextTimes.push({voice:'melody',time:melState.nextNoteTime});
    if(harState.nextNoteTime<totalTime) nextTimes.push({voice:'harmony',time:harState.nextNoteTime});
    if(barState.nextNoteTime<totalTime) nextTimes.push({voice:'bar',time:barState.nextNoteTime});
    if(!nextTimes.length) break;
    nextTimes.sort((a,b)=>a.time-b.time);
    const earliest=nextTimes[0];
    const atTime=earliest.time;
    const curMel=melState.currentNote??null;
    if(earliest.voice==='melody'){
      const ev=tickVoiceSim(melState,'melody',atTime,null);
      notes.push({pitch:ev.note,bucket:ev.bucket,startBeat:atTime/beatSec,duration:ev.durSec/beatSec,voice:'melody'});
    }else if(earliest.voice==='harmony'){
      const ev=tickVoiceSim(harState,'harmony',atTime,curMel);
      notes.push({pitch:ev.note,bucket:ev.bucket,startBeat:atTime/beatSec,duration:ev.durSec/beatSec,voice:'harmony'});
    }else if(earliest.voice==='bar'){
      const ev=tickVoiceSim(barState,'bar',atTime,null);
      notes.push({pitch:ev.note,bucket:ev.bucket,startBeat:atTime/beatSec,duration:ev.durSec/beatSec,voice:'bar'});
    }
  }
  return {phraseId,generatedAt:new Date().toISOString(),bpm:BPM,measures:MEASURE_COUNT,notes};
}

// ── PLAYBACK ─────────────────────────────────────────────────────────────────
function playPhrase(phrase){
  const now=actx.currentTime+0.05;
  engineStartTime=now;
  phrase.notes.forEach(n=>{
    if(n.pitch==='REST')return;
    const gainNode=n.bucket==='long'?longGain:n.bucket==='medium'?medGain:shortGain;
    const atTime=now+(n.startBeat*BEAT_SEC);
    const durSec=n.duration*BEAT_SEC;
    const bucket=n.bucket;
    const pitch=n.pitch;
    const sample=pitchToSampleName(pitch,bucket);
    if(!sample)return;
    const buffers=bucket==='long'?longBuffers:bucket==='medium'?medBuffers:shortBuffers;
    const buffer=buffers[sample]; if(!buffer)return;
    let attack,release,legato;
    if(bucket==='long'){ attack=Math.min(0.40,durSec*0.18); release=Math.min(0.60,durSec*0.35); legato=0.50; }
    else if(bucket==='medium'){ attack=Math.min(0.12,durSec*0.08); release=Math.min(0.28,durSec*0.28); legato=0.14; }
    else{ attack=Math.min(0.04,durSec*0.04); release=Math.min(0.12,durSec*0.20); legato=0.02; }
    const holdEnd=atTime+durSec-release, stopAt=atTime+durSec+legato;
    try{
      const source=actx.createBufferSource(), noteGain=actx.createGain();
      source.buffer=buffer; source.connect(noteGain); noteGain.connect(gainNode);
      noteGain.gain.setValueAtTime(0,atTime); noteGain.gain.linearRampToValueAtTime(1,atTime+attack);
      noteGain.gain.setValueAtTime(1,Math.max(atTime+attack,holdEnd));
      noteGain.gain.exponentialRampToValueAtTime(0.0001,stopAt);
      source.start(atTime); source.stop(stopAt);
    }catch(e){}
  });
  const phraseDuration = phrase.measures * MEASURE_DUR_SEC;
  phraseTimeout=setTimeout(()=>{
    engineRunning=false;
    likeBtn.disabled=false; dislikeBtn.disabled=false;
    playBtn.disabled=false; playBtn.textContent='GENERATE & PLAY';
  },phraseDuration*1000+500);
}

// ── RATING & API ─────────────────────────────────────────────────────────────
function getCurrentSliderState(){
  return {
    suspensionRisk:parseFloat(suspInput.value),
    longVolume:parseFloat(longVol.value),
    mediumVolume:parseFloat(medVol.value),
    shortVolume:parseFloat(shortVol.value),
  };
}
async function savePreference(rating){
  if(!currentPhrase)return;
  const payload={
    phraseId:currentPhrase.phraseId,
    rating,
    bpm:currentPhrase.bpm,
    measures:currentPhrase.measures,
    phrase:currentPhrase,
    sliderState:getCurrentSliderState(),
  };
  try{
    const res=await fetch('/api/audio/preferences',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload),
    });
    if(res.ok) console.log('Rating saved');
  }catch(e){ console.error('Failed to save preference',e); }
}

// ── BUTTON HANDLERS ──────────────────────────────────────────────────────────
playBtn.addEventListener('click', async () => {
  if (engineRunning) return;

  // FIX: resume AudioContext only after a real user gesture
  if (actx.state === 'suspended') {
    await actx.resume();
  }

  engineRunning = true;
  playBtn.disabled = true;
  playBtn.textContent = 'PLAYING...';
  likeBtn.disabled = true;
  dislikeBtn.disabled = true;

  if (phraseTimeout) clearTimeout(phraseTimeout);
  currentPhrase = generatePhrase();
  playPhrase(currentPhrase);
});

likeBtn.addEventListener('click',async()=>{
  if(!currentPhrase||engineRunning)return;
  likeBtn.disabled=true; dislikeBtn.disabled=true;
  await savePreference('like');
  currentPhrase=null;
  playBtn.disabled=false; playBtn.textContent='GENERATE & PLAY';
});
dislikeBtn.addEventListener('click',async()=>{
  if(!currentPhrase||engineRunning)return;
  likeBtn.disabled=true; dislikeBtn.disabled=true;
  await savePreference('dislike');
  currentPhrase=null;
  playBtn.disabled=false; playBtn.textContent='GENERATE & PLAY';
});

// ── ASSET LOADING ────────────────────────────────────────────────────────────
async function loadSamples(bucket,bufMap){
  const root=AUDIO_PATHS[bucket];
  let loaded=0;
  await Promise.all(SAMPLE_NAMES.map(async s=>{
    const url=`${root}/${s}.m4a`;
    try{ const r=await fetch(url); if(!r.ok)throw new Error(); bufMap[s]=await actx.decodeAudioData(await r.arrayBuffer()); loaded++; }
    catch(e){}
  }));
  return loaded;
}
async function loadAllAssets(){
  await Promise.all([
    loadSamples('long',longBuffers),
    loadSamples('medium',medBuffers),
    loadSamples('short',shortBuffers),
  ]);
  // Enable all three panel play buttons
  playBtn.disabled    = false;
  document.getElementById('harmPlayBtn').disabled = false;
  document.getElementById('seqPlayBtn').disabled  = false;

  // Show how many preference ratings are baked into current rules
  const statusEl = document.getElementById('prefStatus');
  if (statusEl) {
    if (PREF_TOTAL === 0) {
      statusEl.textContent = 'NO TRAINING DATA YET';
      statusEl.style.color = 'var(--text-dim)';
    } else {
      const likeRate = PREF_LIKED !== null ? Math.round(PREF_LIKED * 100) : '?';
      statusEl.innerHTML =
        `<span style="color:var(--neon-green)">▲ ${PREF_TOTAL} ratings baked in</span>` +
        ` &nbsp;·&nbsp; ${likeRate}% liked`;
    }
  }
}
loadAllAssets();

// ── GAIN NODES (created immediately, not inside resume) ──────────────────────
longGain = actx.createGain();
longGain.gain.value = parseFloat(longVol.value);
longGain.connect(actx.destination);

medGain = actx.createGain();
medGain.gain.value = parseFloat(medVol.value);
medGain.connect(actx.destination);

shortGain = actx.createGain();
shortGain.gain.value = parseFloat(shortVol.value);
shortGain.connect(actx.destination);


longVol.oninput = e => longGain.gain.value = e.target.value;
medVol.oninput  = e => medGain.gain.value  = e.target.value;
shortVol.oninput = e => shortGain.gain.value = e.target.value;

// ── BACKGROUND RULES REBUILD ─────────────────────────────────────────────
(function pingRebuild() {
  fetch('/api/audio/rebuild-rules', { method:'POST', keepalive:true }).catch(()=>{});
})();

// ═══════════════════════════════════════════════════════════════════════════
// PANEL 2 — HARMONY (1 medium + 1 short note played simultaneously)
// ═══════════════════════════════════════════════════════════════════════════
{
  const harmPlayBtn    = document.getElementById('harmPlayBtn');
  const harmLikeBtn    = document.getElementById('harmLikeBtn');
  const harmDislikeBtn = document.getElementById('harmDislikeBtn');
  const harmNoteAEl    = document.getElementById('harmNoteA');
  const harmNoteBEl    = document.getElementById('harmNoteB');
  const harmMedVol     = document.getElementById('harmMedVol');
  const harmShortVol   = document.getElementById('harmShortVol');
  const harmStatus     = document.getElementById('harmStatus');

  const harmGainMed   = actx.createGain();
  const harmGainShort = actx.createGain();
  harmGainMed.gain.value   = parseFloat(harmMedVol.value);
  harmGainShort.gain.value = parseFloat(harmShortVol.value);
  harmGainMed.connect(actx.destination);
  harmGainShort.connect(actx.destination);

  harmMedVol.oninput   = e => { document.getElementById('harmMedVolVal').innerText   = Math.round(e.target.value*100)+'%'; harmGainMed.gain.value   = +e.target.value; };
  harmShortVol.oninput = e => { document.getElementById('harmShortVolVal').innerText = Math.round(e.target.value*100)+'%'; harmGainShort.gain.value = +e.target.value; };

  let currentHarmPair = null, harmRunning = false;

  function pickRandomNote() {
    const all = Object.keys(musicRules.transitionRules ?? {}).filter(p => p !== 'REST');
    return all[Math.floor(Math.random() * all.length)] ?? 'G4';
  }

  function pickHarmonicPair() {
    const noteA     = pickRandomNote();
    const harmRules = musicRules.harmonyRules?.[noteA];
    let noteB;
    if (harmRules?.length) {
      noteB = weightedRandom(harmRules.map(c => ({ item: c.note ?? c, weight: c.weight ?? 1 })));
    } else {
      const midiA = pitchToMidi(noteA);
      const all   = Object.keys(musicRules.transitionRules ?? {}).filter(p => p !== 'REST');
      const cons  = all.filter(p => { const iv = Math.abs(pitchToMidi(p)-midiA); return [3,4,5,7,8,9,12].includes(iv); });
      noteB = cons.length ? cons[Math.floor(Math.random()*cons.length)] : pickRandomNote();
    }
    return { noteA, noteB };
  }

  function playBufNote(pitch, buffers, gainNode, bucket, durSec, startTime) {
    const sample = pitchToSampleName(pitch, bucket); if (!sample) return;
    const buffer = buffers[sample]; if (!buffer) return;
    const attack = Math.min(bucket==='short'?0.04:0.12, durSec*0.08);
    const release= Math.min(bucket==='short'?0.12:0.28, durSec*0.28);
    const holdEnd= startTime+durSec-release, stopAt=startTime+durSec+0.1;
    try {
      const src=actx.createBufferSource(), gain=actx.createGain();
      src.buffer=buffer; src.connect(gain); gain.connect(gainNode);
      gain.gain.setValueAtTime(0,startTime);
      gain.gain.linearRampToValueAtTime(1,startTime+attack);
      gain.gain.setValueAtTime(1,Math.max(startTime+attack,holdEnd));
      gain.gain.exponentialRampToValueAtTime(0.0001,stopAt);
      src.start(startTime); src.stop(stopAt);
    } catch(e){}
  }

  harmPlayBtn.addEventListener('click', async () => {
    if (harmRunning) return;
    if (actx.state==='suspended') await actx.resume();
    harmRunning=true; harmPlayBtn.disabled=true; harmPlayBtn.textContent='PLAYING...';
    harmLikeBtn.disabled=true; harmDislikeBtn.disabled=true;
    const pair=pickHarmonicPair(); currentHarmPair=pair;
    harmNoteAEl.textContent=pair.noteA; harmNoteBEl.textContent=pair.noteB;
    const now=actx.currentTime+0.05, durSec=BEAT_SEC*2;
    playBufNote(pair.noteA, medBuffers,   harmGainMed,   'medium', durSec, now);
    playBufNote(pair.noteB, shortBuffers, harmGainShort, 'short',  durSec, now);
    setTimeout(()=>{ harmRunning=false; harmPlayBtn.disabled=false; harmPlayBtn.textContent='PLAY TOGETHER'; harmLikeBtn.disabled=false; harmDislikeBtn.disabled=false; }, durSec*1000+400);
  });

  async function saveHarmPref(rating) {
    if (!currentHarmPair) return;
    await fetch('/api/audio/preferences',{ method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ trainingType:'harmony', phraseId:crypto.randomUUID(), rating, bpm:BPM, measures:1, phrase:{},
        noteA:currentHarmPair.noteA, noteB:currentHarmPair.noteB,
        sliderState:{suspensionRisk:0,longVolume:0,mediumVolume:+harmMedVol.value,shortVolume:+harmShortVol.value},
        source:'audioTraining-harmony' }) }).catch(e=>console.error(e));
    harmStatus.innerHTML=rating==='like'?'<span style="color:var(--neon-green)">✓ liked</span>':'<span style="color:var(--neon-hot)">✗ disliked</span>';
  }

  harmLikeBtn.addEventListener('click',async()=>{ if(!currentHarmPair||harmRunning)return; harmLikeBtn.disabled=true; harmDislikeBtn.disabled=true; await saveHarmPref('like'); currentHarmPair=null; harmPlayBtn.textContent='PLAY TOGETHER'; });
  harmDislikeBtn.addEventListener('click',async()=>{ if(!currentHarmPair||harmRunning)return; harmLikeBtn.disabled=true; harmDislikeBtn.disabled=true; await saveHarmPref('dislike'); currentHarmPair=null; harmPlayBtn.textContent='PLAY TOGETHER'; });
}

// ═══════════════════════════════════════════════════════════════════════════
// PANEL 3 — SEQUENCE (2 consecutive medium notes)
// ═══════════════════════════════════════════════════════════════════════════
{
  const seqPlayBtn    = document.getElementById('seqPlayBtn');
  const seqLikeBtn    = document.getElementById('seqLikeBtn');
  const seqDislikeBtn = document.getElementById('seqDislikeBtn');
  const seqNoteAEl    = document.getElementById('seqNoteA');
  const seqNoteBEl    = document.getElementById('seqNoteB');
  const seqMedVol     = document.getElementById('seqMedVol');
  const seqStatus     = document.getElementById('seqStatus');

  const seqGainMed = actx.createGain();
  seqGainMed.gain.value = parseFloat(seqMedVol.value);
  seqGainMed.connect(actx.destination);
  seqMedVol.oninput = e => { document.getElementById('seqMedVolVal').innerText=Math.round(e.target.value*100)+'%'; seqGainMed.gain.value=+e.target.value; };

  let currentSeqPair=null, seqRunning=false;

  function pickSequencePair() {
    const all  = Object.keys(musicRules.transitionRules ?? {}).filter(p => p!=='REST');
    const noteA= all[Math.floor(Math.random()*all.length)] ?? 'G4';
    const trans= musicRules.transitionRules[noteA] ?? [];
    let noteB;
    if (trans.length) {
      const boosted=trans.map(c=>({...c, weight:c.weight*preferenceBoost(noteA,c.note)}));
      noteB=weightedRandom(boosted.map(c=>({item:c.note,weight:c.weight}))) ?? noteA;
    } else {
      noteB=all[Math.floor(Math.random()*all.length)] ?? 'A4';
    }
    return { noteA, noteB };
  }

  function playSeqNote(pitch, startTime, durSec) {
    const sample=pitchToSampleName(pitch,'medium'); if(!sample)return;
    const buffer=medBuffers[sample]; if(!buffer)return;
    const attack=Math.min(0.12,durSec*0.08), release=Math.min(0.28,durSec*0.28);
    const holdEnd=startTime+durSec-release, stopAt=startTime+durSec+0.08;
    try {
      const src=actx.createBufferSource(), gain=actx.createGain();
      src.buffer=buffer; src.connect(gain); gain.connect(seqGainMed);
      gain.gain.setValueAtTime(0,startTime);
      gain.gain.linearRampToValueAtTime(1,startTime+attack);
      gain.gain.setValueAtTime(1,Math.max(startTime+attack,holdEnd));
      gain.gain.exponentialRampToValueAtTime(0.0001,stopAt);
      src.start(startTime); src.stop(stopAt);
    } catch(e){}
  }

  seqPlayBtn.addEventListener('click', async () => {
    if (seqRunning) return;
    if (actx.state==='suspended') await actx.resume();
    seqRunning=true; seqPlayBtn.disabled=true; seqPlayBtn.textContent='PLAYING...';
    seqLikeBtn.disabled=true; seqDislikeBtn.disabled=true;
    const pair=pickSequencePair(); currentSeqPair=pair;
    seqNoteAEl.textContent=pair.noteA; seqNoteBEl.textContent=pair.noteB;
    const now=actx.currentTime+0.05, noteDur=BEAT_SEC*1.5;
    playSeqNote(pair.noteA, now,          noteDur);
    playSeqNote(pair.noteB, now+noteDur,  noteDur);
    setTimeout(()=>{ seqRunning=false; seqPlayBtn.disabled=false; seqPlayBtn.textContent='PLAY SEQUENCE'; seqLikeBtn.disabled=false; seqDislikeBtn.disabled=false; }, noteDur*2*1000+400);
  });

  async function saveSeqPref(rating) {
    if (!currentSeqPair) return;
    await fetch('/api/audio/preferences',{ method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ trainingType:'sequence', phraseId:crypto.randomUUID(), rating, bpm:BPM, measures:1, phrase:{},
        noteA:currentSeqPair.noteA, noteB:currentSeqPair.noteB,
        sliderState:{suspensionRisk:0,longVolume:0,mediumVolume:+seqMedVol.value,shortVolume:0},
        source:'audioTraining-sequence' }) }).catch(e=>console.error(e));
    seqStatus.innerHTML=rating==='like'?'<span style="color:var(--neon-green)">✓ liked</span>':'<span style="color:var(--neon-hot)">✗ disliked</span>';
  }

  seqLikeBtn.addEventListener('click',async()=>{ if(!currentSeqPair||seqRunning)return; seqLikeBtn.disabled=true; seqDislikeBtn.disabled=true; await saveSeqPref('like'); currentSeqPair=null; seqPlayBtn.textContent='PLAY SEQUENCE'; });
  seqDislikeBtn.addEventListener('click',async()=>{ if(!currentSeqPair||seqRunning)return; seqLikeBtn.disabled=true; seqDislikeBtn.disabled=true; await saveSeqPref('dislike'); currentSeqPair=null; seqPlayBtn.textContent='PLAY SEQUENCE'; });
}
