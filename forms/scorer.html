    <script src="/static/js/KittyCore.js"></script>

    <script>
        const API_BASE   = '';
        const MAX_SLOTS  = 5;
        const SLOT_COLORS = ['#67fea0', '#ff69b4', '#7b9fff', '#ffaa55', '#c084fc'];
        const SLOT_LABELS = ['A','B','C','D','E'];

        let slotCount = 0;

        async function checkStatus() {
            try {
                const res  = await fetch(`${API_BASE}/api/score/status`);
                const data = await res.json();
                const pill = document.getElementById('status-pill');
                const text = document.getElementById('status-text');

                if (data.model_ready) {
                    pill.className = 'status-pill ready';
                    text.textContent = 'Reward model loaded and ready';
                } else {
                    pill.className = 'status-pill not-ready';
                    text.textContent = 'No trained model yet — run train.py first';
                    document.getElementById('score-btn').disabled = true;
                }
            } catch (e) {
                document.getElementById('status-text').textContent = 'Could not reach API';
            }
        }

        function addSlot() {
            if (slotCount >= MAX_SLOTS) return;

            const idx   = slotCount;
            const color = SLOT_COLORS[idx];
            const label = SLOT_LABELS[idx];

            const slot = document.createElement('div');
            slot.className = 'response-slot';
            slot.id = `slot-${idx}`;
            slot.innerHTML = `
                <div class="slot-label" style="background:${color}22; border:1px solid ${color}55; color:${color}">${label}</div>
                <textarea placeholder="Paste response ${label} here..." maxlength="5000"></textarea>
                ${idx > 1 ? `<button class="remove-slot" onclick="removeSlot(${idx})" title="Remove">×</button>` : '<div style="width:24px"></div>'}
            `;

            document.getElementById('slots-container').appendChild(slot);
            slotCount++;

            if (slotCount >= MAX_SLOTS) {
                document.getElementById('add-slot-btn').style.display = 'none';
            }
        }

        function removeSlot(idx) {
            const slot = document.getElementById(`slot-${idx}`);
            if (slot) {
                slot.style.animation = 'none';
                slot.style.opacity   = '0';
                slot.style.transform = 'translateY(-6px)';
                slot.style.transition = 'all 0.15s ease';
                setTimeout(() => slot.remove(), 150);
            }
            slotCount--;
            document.getElementById('add-slot-btn').style.display = '';
        }

        async function runScorer() {
            const prompt = document.getElementById('prompt').value.trim();
            if (!prompt) { showError('Prompt is required.'); return; }

            const textareas  = document.querySelectorAll('#slots-container textarea');
            const responses  = Array.from(textareas).map(t => t.value.trim()).filter(Boolean);

            if (responses.length < 2) { showError('Add at least 2 responses to compare.'); return; }

            clearError();
            const btn = document.getElementById('score-btn');
            btn.disabled    = true;
            btn.textContent = 'Scoring...';

            try {
                const res  = await fetch(`${API_BASE}/api/score`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt, responses })
                });
                const data = await res.json();

                if (!data.success) { showError(data.error); return; }
                renderResults(data.results);

            } catch (e) {
                showError('Network error: ' + e.message);
            } finally {
                btn.disabled    = false;
                btn.textContent = 'Score Responses';
            }
        }

        function renderResults(results) {
            const section = document.getElementById('results-section');
            const list    = document.getElementById('results-list');

            const barColors = [
                'linear-gradient(90deg, #67fea0, #00c896)',
                'linear-gradient(90deg, #c71585, #ff69b4)',
                'linear-gradient(90deg, #4a7fff, #7b9fff)',
                'linear-gradient(90deg, #e67e22, #ffaa55)',
                'linear-gradient(90deg, #8b5cf6, #c084fc)',
            ];

            list.innerHTML = results.map((item, i) => `
                <div class="result-card ${item.rank === 1 ? 'rank-1' : ''}">
                    <div class="result-top-row">
                        <div style="display:flex; align-items:center; gap:0.6rem;">
                            <span class="result-rank" style="color:${SLOT_COLORS[i]}">#${item.rank}</span>
                            ${item.rank === 1 ? '<span class="winner-badge">⭐ top pick</span>' : ''}
                        </div>
                        <div class="result-score-wrap">
                            <span class="score-num" style="color:${SLOT_COLORS[i]}">${Math.round(item.score * 100)}</span>
                            <div class="score-bar-track">
                                <div class="score-bar-fill" id="bar-${i}" style="background:${barColors[i]}"></div>
                            </div>
                        </div>
                    </div>
                    <div class="result-response-text">${escHtml(item.response)}</div>
                </div>
            `).join('');

            section.classList.add('visible');

            requestAnimationFrame(() => {
                setTimeout(() => {
                    results.forEach((item, i) => {
                        const bar = document.getElementById(`bar-${i}`);
                        if (bar) bar.style.width = `${Math.round(item.score * 100)}%`;
                    });
                }, 60);
            });

            section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function showError(msg) {
            document.getElementById('error-box').innerHTML =
                `<div class="error-msg">❌ ${msg}</div>`;
        }

        function clearError() {
            document.getElementById('error-box').innerHTML = '';
        }

        function escHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        checkStatus();
        addSlot(); 
        addSlot();
    </script>
