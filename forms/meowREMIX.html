};

let longGain, medGain, shortGain, ambienceGain, beatGain;

// ── FX CHAIN NODES ────────────────────────────────────────────────────────────
// Routing overview:
//   melody notes  → melodyBus → [delay send] + [dry] → fxBus → reverb → masterGain
//   ambience/risers/crashes                           → fxBus → reverb → masterGain
//   beat                                                      → masterGain  (dry)
//
// All nodes are null until startEngine() creates them, and nulled again in stopEngine().
let masterGain   = null;   // final output trim before destination
let fxBus        = null;   // pre-reverb mix bus (melody + ambience + risers)
let reverbNode   = null;   // ConvolverNode with synthesised IR
let reverbSend   = null;   // GainNode: wet level into reverb
let reverbReturn = null;   // GainNode: reverb output level
let melodyBus    = null;   // submix for long+med+short before delay
let delayNode    = null;   // melody feedback delay
let delayWet     = null;   // GainNode: delay send level
let delayFeedback = null;  // GainNode: delay feedback level
let ambienceSource = null, beatSource = null;
let running = false;
let schedulerTimer = null, harmonySchedulerTimer = null, barSchedulerTimer = null;
let melodyState, harmonyState, barState;
let engineStartTime = 0;

// ── COMPOSITIONAL STATE ───────────────────────────────────────────────────────
let generationState = {
  currentStructuralRole:  'setup',
  measuresSinceRoleChange: 0,
  nextRoleChangeMeasure:   0,
  targetTension:           0.3,
  phraseMeasureCounter:    0,
  destinationChord:        'tonic',
  lastMotifMeasure:        -100,
  expectationDelayActive:  false,
  currentBucket:           'medium',   // NEW: TRACKS CURRENT NOTE-LENGTH BUCKET
};

// ── BUCKET SELECTION ──────────────────────────────────────────────────────────

/**
 * Selects the next note-length bucket based on transition weights from the current bucket.
 */
function pickNextBucket(currentBucket) {
  // USE BUCKETTRANSITIONS FROM RULES.JS IF AVAILABLE
  const trans = BUCKET_TRANSITIONS[currentBucket];
  if (!trans?.length) return weightedRandomFromObj(BUCKET_WEIGHTS);
  return weightedRandom(trans.map(t => ({ item: t.next, weight: t.weight })));
}

/**
 * Adjusts candidate weights by a per-bucket pitch class tension bias map.
 */
function applyBucketTensionBias(candidates, bucket) {
  // BOOST PITCH CLASSES THAT ALIGN WITH THIS BUCKET'S TENSION TARGET
  const biasMap = BUCKET_TENSION_MAP.pitchBias?.[bucket] ?? {};
  if (!Object.keys(biasMap).length) return candidates;
  return candidates.map(c => {
    const pc = c.note.replace(/\d/g, '');
    const mult = biasMap[pc] ?? 1.0;
    return { ...c, weight: c.weight * mult };
  });
}

/**
 * Chooses a note duration (in seconds) biased by the given bucket and rhythm flow smoothness.
 */
function getBucketRhythmDuration(bucket, atTime, prevDurType) {
  // DURATION-TYPE BIASED BY BUCKET, THEN SMOOTHED BY RHYTHM FLOW
  const biasObj = BUCKET_RHYTHM_BIAS[bucket] ?? {};
  let entries = Object.entries(biasObj).map(([dur, w]) => ({ duration: dur, weight: w }));
  if (!entries.length) {
    // FALLBACK TO GENERIC RHYTHM PICKER
    return getRhythmSequence(atTime, prevDurType)[0];
  }

  // BLEND WITH BEAT-POSITION RULES IF AVAILABLE
  if (atTime !== null && engineStartTime > 0) {
    const beat = getCurrentBeatPosition(atTime);
    const key  = getNearestBeatKey(beat);
    const beatRules = musicRules.beatDurationRules?.[key];
    if (beatRules?.length) {
      // INTERSECT: KEEP ONLY DURATIONS PRESENT IN BOTH BUCKET BIAS AND BEAT RULES
      const beatMap = Object.fromEntries(beatRules.map(r => [r.duration, r.weight]));
      const blended = entries.map(e => ({
        duration: e.duration,
        weight: e.weight * (beatMap[e.duration] ?? 0.1),
      }));
      const bTotal = blended.reduce((s,e) => s+e.weight, 0);
      if (bTotal > 0) entries = blended.map(e => ({ ...e, weight: e.weight / bTotal }));
    }
  }

  // RHYTHM FLOW SMOOTHNESS
  if (prevDurType) {
    entries = entries.map(e => {
      const s = getRhythmFlowSmoothness(prevDurType, e.duration);
      return { ...e, weight: applySmoothnessWeight(e.weight, s) };
    });
    const total = entries.reduce((s,e) => s+e.weight, 0);
    if (total > 0) entries.forEach(e => e.weight /= total);
  }

  const picked = weightedRandom(entries.map(e => ({ item: e.duration, weight: e.weight })));
  return durTypeSec(picked ?? 'quarter');
}

// ── RHYTHM MOTIF LOCK ─────────────────────────────────────────────────────────
// Picks a rhythmic pattern at phrase start and cycles through it for
// MOTIF_LOCK_BARS bars before selecting a new one.
// This gives the melody a consistent groove instead of per-note randomness.

const MOTIF_LOCK_BARS   = 2;    // how many bars to repeat a motif before varying
const MOTIF_VAR_CHANCE  = 0.15; // chance of a one-note deviation within the motif

// Built-in rhythm patterns as fallback if musicRules.rhythmPatterns is sparse
const FALLBACK_RHYTHMS = [
  ['quarter','quarter','quarter','quarter'],
  ['half','quarter','quarter'],
  ['quarter','quarter','half'],
  ['dotted-quarter','eighth','quarter','quarter'],
  ['quarter','eighth','eighth','quarter','quarter'],
  ['half','half'],
  ['quarter','dotted-quarter','eighth','quarter'],
  ['eighth','eighth','quarter','quarter','quarter'],
];

let rhythmMotifState = {
  pattern:      [],   // array of seconds
  pos:          0,    // current index in pattern
  barsOnMotif:  0,    // how many bars we've played this motif
  barStartTime: 0,    // engineStartTime-relative time when we entered this bar
};

/**
 * Selects a new rhythmic motif pattern from rules or built-in fallback patterns.
 */
function selectRhythmMotif() {
  // Prefer patterns from rules.js; fall back to built-ins
  const rulesPatterns = musicRules.rhythmPatterns ?? [];
  let durTypes;
  if (rulesPatterns.length) {
    const pat = weightedRandom(rulesPatterns.map(p => ({ item: p, weight: p.weight ?? 1 })));
    durTypes = pat?.pattern ?? FALLBACK_RHYTHMS[Math.floor(Math.random()*FALLBACK_RHYTHMS.length)];
  } else {
    durTypes = FALLBACK_RHYTHMS[Math.floor(Math.random()*FALLBACK_RHYTHMS.length)];
  }
  rhythmMotifState.pattern = durTypes.map(d => durTypeSec(d));
  rhythmMotifState.pos     = 0;
}

/**
 * Returns the next duration from the locked rhythm motif, with occasional variation.
 */
function getLockedRhythmDuration(bucket, atTime, prevDurType) {
  // Only lock rhythm for melody voice — bars/harmony use free rhythm
  if (!rhythmMotifState.pattern.length) selectRhythmMotif();

  // Detect bar boundary — if we've crossed into a new bar, increment counter
  const elapsed = atTime - engineStartTime;
  const currentBar = Math.floor(elapsed / MEASURE_DUR_SEC);
  if (currentBar > 0 && atTime > rhythmMotifState.barStartTime + MEASURE_DUR_SEC * 0.9) {
    rhythmMotifState.barStartTime = engineStartTime + currentBar * MEASURE_DUR_SEC;
    rhythmMotifState.barsOnMotif++;
    if (rhythmMotifState.barsOnMotif >= MOTIF_LOCK_BARS) {
      // Time to pick a new motif
      selectRhythmMotif();
      rhythmMotifState.barsOnMotif = 0;
    }
  }

  // Occasional variation — deviate from the pattern for one note
  if (Math.random() < MOTIF_VAR_CHANCE) {
    return getBucketRhythmDuration(bucket, atTime, prevDurType);
  }

  // Serve next duration from the locked pattern
  const dur = rhythmMotifState.pattern[rhythmMotifState.pos % rhythmMotifState.pattern.length];
  rhythmMotifState.pos++;
  return dur;
}
// ─────────────────────────────────────────────────────────────────────────────

// ── STACCATO BURST SYSTEM ────────────────────────────────────────────────────
//
// Instead of scattering individual short notes randomly, the burst system
// fires short notes in tight rhythmic clusters ("runs"), then enforces a
// silence gap before the next burst.  This gives the feel of a fill or
// ornamental run, and then space, rather than random sprinkling.
//
// State machine:
//   IDLE    → random chance per note triggers a burst
//   BURST   → play N short notes in rapid succession (sixteenth/eighth spacing)
//   GAP     → silence for M beats before returning to IDLE
//
// Burst notes are still run through the full note selection pipeline, so they
// follow the phrase skeleton, gravity, and tension biases.  Only the duration
// is overridden to be short and even.

const STACCATO_BURST_RHYTHMS = [
  // Each entry: array of duration-type strings for one burst run
  ['sixteenth','sixteenth','sixteenth','sixteenth'],           // 4-note fill
  ['sixteenth','sixteenth','eighth'],                          // 3-note with landing
  ['eighth','sixteenth','sixteenth','sixteenth','sixteenth'],  // pickup + 4
  ['sixteenth','sixteenth','sixteenth','eighth'],              // 3 + longer landing
  ['sixteenth','sixteenth','sixteenth','sixteenth','eighth'],  // 5-note run
];

let staccatoBurstState = {
  active:        false,   // currently in a burst?
  notesRemaining: 0,      // notes left in this burst
  pattern:       [],      // duration sequence for this burst (seconds)
  patternPos:    0,       // current index in pattern
  gapBeatsLeft:  0,       // beats of silence remaining after burst ends
  lastBurstBar:  -999,    // bar when last burst started
};

/**
 * Attempts to start a staccato burst run based on tension, phrase position, and cooldown.
 */
function maybeStartStaccatoBurst(currentBar, phrasePos, tension) {
  // Don't start mid-gap
  if (staccatoBurstState.gapBeatsLeft > 0) return false;
  if (staccatoBurstState.active) return false;

  // Minimum bars between bursts — prevents continuous rapid-fire
  const barsSince = currentBar - staccatoBurstState.lastBurstBar;
  if (barsSince < 2) return false;

  // Probability scales with tension and phrase position
  // Higher tension = more runs; middle of phrase = more activity than endings
  const tensionFactor = Math.max(0, (tension - 0.25) / 0.75);  // 0 at t=0.25, 1 at t=1.0
  const phraseFactor  = 1.0 - Math.abs(phrasePos - 0.45) * 1.4; // peak around 40% of phrase
  const prob = Math.max(0, 0.08 * tensionFactor * Math.max(0, phraseFactor));

  if (Math.random() > prob) return false;

  // Pick a burst pattern
  const pat = STACCATO_BURST_RHYTHMS[Math.floor(Math.random() * STACCATO_BURST_RHYTHMS.length)];
  staccatoBurstState.active         = true;
  staccatoBurstState.notesRemaining = pat.length;
  staccatoBurstState.pattern        = pat.map(d => durTypeSec(d));
  staccatoBurstState.patternPos     = 0;
  staccatoBurstState.lastBurstBar   = currentBar;
  // Gap after burst: 1.5–3 beats so there's clear space before next burst
  staccatoBurstState.gapBeatsLeft   = 1.5 + Math.random() * 1.5;
  return true;
}

/**
 * Returns the next duration for an active staccato burst, or null if burst is finished.
 */
function getStaccatoBurstDuration() {
  if (!staccatoBurstState.active || !staccatoBurstState.pattern.length) return null;
  const dur = staccatoBurstState.pattern[staccatoBurstState.patternPos % staccatoBurstState.pattern.length];
  staccatoBurstState.patternPos++;
  staccatoBurstState.notesRemaining--;
  if (staccatoBurstState.notesRemaining <= 0) {
    staccatoBurstState.active = false;
  }
  return dur;
}

// ── COMPOSITIONAL BIAS HELPERS ────────────────────────────────────────────────

/**
 * Modifies a weight by the gravity model's tonal pull (tonic/dominant/mediant) for the pitch class.
 */
function applyGravityBias(note, base) {
  if (!compRules?.gravity_model) return base;
  const gm = compRules.gravity_model;
  const pc = note.replace(/\d/g, '');
  const tonicPCs    = new Set(['G','B','D']);  // G MAJOR TONIC TRIAD
  const dominantPCs = new Set(['D','F#','A']);
  const mediantPCs  = new Set(['B','D','F#']);
  let pull = 1.0;
  if (tonicPCs.has(pc))    pull = gm.tonic_pull;
  else if (dominantPCs.has(pc)) pull = gm.dominant_pull;
  else if (mediantPCs.has(pc))  pull = gm.mediant_pull;
  return base * (0.5 + 0.5 * pull);
}

/**
 * Modifies a weight to favor notes whose tension is close to the target tension.
 */
function applyTensionBias(note, base, target) {
  if (target === undefined || target === null) return base;
  const dev = Math.abs(getTension(note) - target);
  return base * (0.2 + 0.8 * (1.0 - dev));
}

/**
 * Modifies a weight based on phrase position to drive the melody toward the destination chord.
 */
function applyDestinationBias(note, base, phrasePos) {
  if (!compRules?.phrase_destination_rules) return base;
  const dests = compRules.phrase_destination_rules['4_bar_phrase'];
  if (!dests) return base;
  const pc = note.replace(/\d/g, '');
  const chordMap = {
    tonic:    new Set(['G','B','D']),
    dominant: new Set(['D','F#','A']),
    mediant:  new Set(['B','D','F#']),
  };
  const dest    = generationState.destinationChord || 'tonic';
  const isTarget = chordMap[dest]?.has(pc) ?? false;
  const pos = phrasePos ?? 0;
  if (pos < 0.5) return base;                      // first half: no pull yet
  const ramp = (pos - 0.5) / 0.5;                  // 0→1 over second half
  const mult = 1.0 + ramp * ramp * 4.0;            // quadratic: 1× at 0.5, 5× at 1.0
  if (isTarget) return base * mult;
  if (pos >= 0.90) return 0;                        // final 10%: must reach destination
  return base * (1.0 - ramp * 0.7);                // soften non-targets in approach
}

/**
 * Applies gravity, tension, destination, and skeleton biases to a list of candidate notes.
 */
function applyCompositionalBiases(candidates, context = {}) {
  const { targetTension, phraseEnd, phrasePos, bucket } = context;
  return candidates.map(c => {
    let w = c.weight;
    w = applyGravityBias(c.note, w);
    if (targetTension !== undefined) w = applyTensionBias(c.note, w, targetTension);
    w = applyDestinationBias(c.note, w, phrasePos);
    // Skeleton contour bias — pulls note toward the planned phrase arc
    w *= getSkeletonBias(c.note, phraseSkeletonState.stepIndex, phraseSkeletonState.skeletonNotes);
    return { note: c.note, weight: w };
  });
}

/**
 * Updates the generation state's structural role based on measure count and role transition weights.
 */
function updateStructuralRole(measureCount) {
  if (!compRules?.role_transitions) return;
  if (measureCount < generationState.nextRoleChangeMeasure) return;
  const trans = compRules.role_transitions[generationState.currentStructuralRole];
  if (!trans) return;
  const roles   = Object.keys(trans);
  const weights = roles.map(r => trans[r]);
  const total   = weights.reduce((a,b) => a+b, 0);
  let r = Math.random() * total;
  let chosen = generationState.currentStructuralRole;
  for (let i=0; i<roles.length; i++) { r -= weights[i]; if (r <= 0) { chosen = roles[i]; break; } }
  generationState.currentStructuralRole = chosen;
  generationState.measuresSinceRoleChange = 0;
  generationState.nextRoleChangeMeasure = measureCount + 4 + Math.floor(Math.random()*4);
  logToConsole(`🎭 Structural role → ${chosen}`);
}

/**
 * Computes a target tension value from the song macro arc based on fraction completion.
 */
function getTargetTensionFromArc(frac) {
  if (!compRules?.tension_arc_templates?.length) return 0.3;
  const arcs = compRules.tension_arc_templates;
  const arc  = arcs.reduce((b,c) => (c.frequency > b.frequency ? c : b), arcs[0]);
  const peak = arc.average_peak_location || 0.6;
  return frac < peak ? 0.1 + 0.9*(frac/peak) : 1.0 - 0.9*((frac-peak)/(1-peak));
}

// ── PHRASE SHAPE ──────────────────────────────────────────────────────────────
// Tracks the current 4-bar phrase's contour arc and maps phrase position (0→1)
// to a target tension, creating rise → peak → resolve shape within each phrase.

let currentPhraseArc   = null;   // selected arc object for this phrase
let lastPhraseIndex    = -1;     // which 4-bar phrase we're in (changes = new phrase)

// Built-in arc shapes as fallback if musicRules.contourArcs is empty
const FALLBACK_ARCS = [
  { name:'arch',      points:[0.1, 0.3, 0.6, 0.8, 0.6, 0.3, 0.15] },
  { name:'rise-fall', points:[0.1, 0.4, 0.7, 0.9, 0.5, 0.2, 0.1]  },
  { name:'plateau',   points:[0.2, 0.5, 0.7, 0.7, 0.7, 0.4, 0.15] },
  { name:'late-peak', points:[0.1, 0.2, 0.3, 0.5, 0.8, 0.5, 0.15] },
  { name:'wave',      points:[0.2, 0.6, 0.3, 0.7, 0.4, 0.6, 0.15] },
];

/**
 * Selects a contour arc shape for the current 4-bar phrase from rules or fallback arcs.
 */
function selectPhraseArc() {
  // Pick from musicRules.contourArcs (MusicXML-derived) or fallback shapes
  const arcs = musicRules.contourArcs?.length
    ? musicRules.contourArcs
    : FALLBACK_ARCS;
  const idx = Math.floor(Math.random() * arcs.length);
  currentPhraseArc = arcs[idx];
}

/**
 * Returns the target tension at a given phrase position using the current phrase arc.
 */
function getPhraseTargetTension(phrasePos) {
  // phrasePos: 0.0 (phrase start) → 1.0 (phrase end)
  // Always resolve to low tension in the final 15% of the phrase
  if (phrasePos >= 0.85) return 0.08;

  if (!currentPhraseArc) return 0.3;

  // Sample the arc points array at phrasePos
  const pts = currentPhraseArc.points ?? currentPhraseArc.tension_points ?? [];
  if (!pts.length) return 0.3;

  // Map phrasePos → index in pts array, interpolate between points
  const scaledPos = phrasePos * (pts.length - 1);
  const lo  = Math.floor(scaledPos);
  const hi  = Math.min(lo + 1, pts.length - 1);
  const t   = scaledPos - lo;
  return pts[lo] + (pts[hi] - pts[lo]) * t;
}

/**
 * Computes phrase-level tension, position, and structural flags for the current 4-bar phrase.
 */
function getPhraseBias(totalMeasures) {
  // Returns { phraseTension, phrasePos, isResolution, isBuilding, isPeak }
  // so tickVoice can make richer decisions
  const PHRASE_LEN = 4; // bars
  const phraseIndex = Math.floor(totalMeasures / PHRASE_LEN);

  // New phrase — pick a fresh arc
  if (phraseIndex !== lastPhraseIndex) {
    lastPhraseIndex = phraseIndex;
    selectPhraseArc();
  }

  const phrasePos      = (totalMeasures % PHRASE_LEN) / PHRASE_LEN;
  const phraseTension  = getPhraseTargetTension(phrasePos);
  const isResolution   = phrasePos >= 0.75;   // last quarter of phrase
  const isBuilding     = phrasePos < 0.5;
  const isPeak         = phrasePos >= 0.5 && phrasePos < 0.75;

  return { phraseTension, phrasePos, isResolution, isBuilding, isPeak };
}
// ─────────────────────────────────────────────────────────────────────────────

// ── PROBABILITY HELPERS ───────────────────────────────────────────────────────

/**
 * Picks a random item from an array of objects with a 'weight' property.
 */
function weightedRandom(items) {
  // ITEMS: [{ITEM, WEIGHT}] OR [{NOTE, WEIGHT}] OR [{DURATION, WEIGHT}]
  if (!items?.length) return null;
  const total = items.reduce((s,i) => s + (i.weight ?? 0), 0);
  if (total <= 0) return items[0]?.item ?? items[0]?.note ?? items[0]?.duration ?? null;
  let r = Math.random() * total;
  for (const i of items) {
    r -= i.weight;
    if (r <= 0) return i.item ?? i.note ?? i.duration ?? null;
  }
  const last = items[items.length-1];
  return last.item ?? last.note ?? last.duration ?? null;
}

/**
 * Picks a random key from an object where values are weights.
 */
function weightedRandomFromObj(obj) {
  const keys   = Object.keys(obj);
  const total  = keys.reduce((s,k) => s + obj[k], 0);
  let r = Math.random() * total;
  for (const k of keys) { r -= obj[k]; if (r <= 0) return k; }
  return keys[0];
}

/**
 * Converts a duration type string (e.g., 'quarter') to its duration in seconds.
 */
function durTypeSec(durType) {
  return HALF_QUARTER_SEC * (DUR_TYPE_TO_MULT[durType] ?? 1);
}

// ── BEAT / RHYTHM ─────────────────────────────────────────────────────────────

/**
 * Returns the current beat position within a measure based on the given audio time.
 */
function getCurrentBeatPosition(atTime) {
  const pos  = (atTime - engineStartTime) % MEASURE_DUR_SEC;
  return Math.round(((pos / BEAT_SEC) + 1) * 100) / 100;
}

/**
 * Finds the closest defined beat position key from the beat duration rules.
 */
function getNearestBeatKey(beat) {
  const rules = musicRules.beatDurationRules;
  if (!rules) return null;
  const keys = Object.keys(rules).map(Number);
  if (!keys.length) return null;
  let closest = keys[0], minDist = Math.abs(beat - closest);
  for (const k of keys) { const d = Math.abs(beat-k); if (d < minDist) { minDist=d; closest=k; } }
  return minDist <= 0.5 ? String(closest) : null;
}

/**
 * Chooses a rhythm sequence (array of durations in seconds) based on beat position or fallback patterns.
 */
function getRhythmSequence(atTime = null, prevDurType = null) {
  if (atTime !== null && engineStartTime > 0) {
    const beat     = getCurrentBeatPosition(atTime);
    const key      = getNearestBeatKey(beat);
    const beatRules = musicRules.beatDurationRules?.[key];
    if (beatRules?.length) {
      let cands = beatRules.map(r => ({ ...r }));
      if (prevDurType) {
        cands = cands.map(c => ({
          ...c, weight: applySmoothnessWeight(c.weight, getRhythmFlowSmoothness(prevDurType, c.duration))
        }));
        const t = cands.reduce((s,c) => s+c.weight, 0);
        if (t > 0) cands.forEach(c => c.weight /= t);
      }
      const picked = weightedRandom(cands.map(c => ({ item:c.duration, weight:c.weight })));
      if (picked) return [durTypeSec(picked)];
    }
  }
  const rhythms = musicRules.rhythmPatterns;
  if (rhythms?.length) {
    let cands = [...rhythms];
    if (prevDurType) {
      cands = cands.map(p => p.pattern?.length
        ? { ...p, weight: applySmoothnessWeight(p.weight, getRhythmFlowSmoothness(prevDurType, p.pattern[0])) }
        : p
      );
      const t = cands.reduce((s,p) => s+p.weight, 0);
      if (t > 0) cands.forEach(p => p.weight /= t);
    }
    const pat = weightedRandom(cands.map(p => ({ item:p, weight:p.weight })));
    if (pat) return pat.pattern.map(durTypeSec);
  }
  const singles = musicRules.singleDurations;
  if (singles && Object.keys(singles).length) {
    let entries = Object.entries(singles).map(([dur,w]) => ({ item:dur, weight:w }));
    if (prevDurType) {
      entries = entries.map(e => ({ ...e, weight: applySmoothnessWeight(e.weight, getRhythmFlowSmoothness(prevDurType, e.item)) }));
      const t = entries.reduce((s,e) => s+e.weight, 0);
      if (t > 0) entries.forEach(e => e.weight /= t);
    }
    const sel = weightedRandom(entries);
    if (sel) return [durTypeSec(sel)];
  }
  return [HALF_QUARTER_SEC];
}

// ── MOTIF ─────────────────────────────────────────────────────────────────────

/**
 * Checks if a memorized motif should be recalled based on distance and probability.
 */
function maybeInjectMotif(currentPitch) {
  if (!compRules?.emotional_memory_rules) return null;
  const mem   = compRules.emotional_memory_rules;
  const since = generationState.lastMotifMeasure === -100
    ? 999
    : generationState.phraseMeasureCounter - generationState.lastMotifMeasure;
  const dist = mem.average_motif_return_distance || 8;
  const prob = (since >= dist-1 && since <= dist+2) ? 0.25 : 0.05;
  if (Math.random() > prob) return null;
  const byEntry = musicRules.motifsByEntry;
  if (!byEntry || !currentPitch) return null;
  const matching = byEntry[currentPitch];
  if (!matching?.length) return null;
  const sel = weightedRandom(matching.map(m => ({ item:m, weight:m.weight })));
  if (sel?.pattern) {
    generationState.lastMotifMeasure = generationState.phraseMeasureCounter;
    logToConsole('🎵 Motif recall triggered');
    return sel.pattern.slice(1);
  }
  return null;
}

// ── PITCH UTILITIES ───────────────────────────────────────────────────────────

/**
 * Converts a pitch name (e.g., 'G4') to a MIDI note number.
 */
function pitchToMidi(pitch) {
  if (!pitch || pitch === 'REST') return null;
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const m = pitch.match(/^([A-G][#b]?)(\d)$/);
  if (!m) return null;
  let pc = m[1].replace('Bb','A#').replace('Eb','D#').replace('Ab','G#')
                .replace('Db','C#').replace('Gb','F#').replace('B-','A#');
  const oct = parseInt(m[2]);
  const idx = NOTE_NAMES.indexOf(pc);
  return idx < 0 ? null : idx + oct * 12;
}

/**
 * Returns the pitch name that is a given number of semitones above or below a base pitch.
 */
function getNoteAtInterval(base, semitones) {
  const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  try {
    const parts = base.match(/^([A-G][#b]?)(\d)$/);
    if (!parts) return null;
    let pc = parts[1].replace('Bb','A#').replace('Eb','D#').replace('Ab','G#')
                     .replace('Db','C#').replace('Gb','F#');
    const oct     = parseInt(parts[2]);
    const baseIdx = NOTE_NAMES.indexOf(pc);
    if (baseIdx < 0) return null;
    const newMidi = baseIdx + oct*12 + semitones;
    return `${NOTE_NAMES[((newMidi%12)+12)%12]}${Math.floor(newMidi/12)}`;
  } catch { return null; }
}

// ── NOTE SELECTION ────────────────────────────────────────────────────────────

/**
 * Selects the next melody note using transition rules with various musical biases.
 */
function getWeightedNextNote(currentNote, prevNote=null, forceDiff=false, forceNonRest=false, context={}) {
  const rules = musicRules.transitionRules;
  let candidates = rules[currentNote];
  if (!candidates?.length) {
    const all = Object.keys(rules).filter(p => p !== 'REST');
    return all[Math.floor(Math.random()*all.length)] ?? 'G4';
  }
  let filtered = [...candidates];
  if (forceNonRest) filtered = filtered.filter(c => c.note !== 'REST');
  if (!filtered.length) filtered = candidates;

  // APPLY COMPOSITIONAL BIASES (GRAVITY, TENSION, PHRASE DESTINATION)
  let biased = applyCompositionalBiases(filtered, context);

  // APPLY BUCKET TENSION BIAS IF BUCKET IS IN CONTEXT
  if (context.bucket) biased = applyBucketTensionBias(biased, context.bucket);

  // APPLY SMOOTHNESS
  const prevForSmooth = prevNote || currentNote;
  const smoothed = biased.map(c => ({
    note: c.note,
    weight: applySmoothnessWeight(c.weight, getTransitionSmoothness(prevForSmooth, c.note)),
  }));

  // APPLY RLHF PREFERENCE BOOST
  const boosted = smoothed.map(c => ({
    ...c,
    weight: c.weight * preferenceBoost(currentNote, c.note),
  }));

  // APPLY KEY BIAS — nudge toward implied key, allow occasional chromaticism
  const keyed = boosted.map(c => ({
    ...c,
    weight: c.weight * keyBias(c.note),
  }));

  // HARD-ZERO same-note repeats when forceDiff — done after all boosts so
  // a boosted B→B can't sneak past the repeat limiter via fallback
  const final = forceDiff
    ? keyed.map(c => ({ ...c, weight: c.note === currentNote ? 0 : c.weight }))
    : keyed;

  const total = final.reduce((s,i) => s+i.weight, 0);
  if (total <= 0) {
    // All weights zeroed (e.g. only candidate was same note) — pick any different note
    const all = Object.keys(rules).filter(p => p !== currentNote && p !== 'REST');
    return all[Math.floor(Math.random()*all.length)] ?? currentNote;
  }
  const norm = final.map(c => ({ ...c, weight: c.weight/total }));
  return weightedRandom(norm.map(c => ({ item:c.note, weight:c.weight }))) ?? currentNote;
}

/**
 * Picks a suspension resolution note for the given pitch if suspension rules exist.
 */
function getSuspensionResolution(fromNote) {
  const sus = musicRules.suspensionRules;
  if (!sus?.length) return null;
  const match = sus.filter(r => r.from === fromNote);
  if (!match.length) return null;
  return weightedRandom(match.map(r => ({ item:r.to, weight:r.weight })));
}

// ── HARMONY ───────────────────────────────────────────────────────────────────

// ── MELODY NOTE LOG — shared buffer for voice leading coordination ────────────
const MELODY_LOG_SIZE = 8;
const melodyNoteLog   = [];   // [{note, midi, time}]

/**
 * Records a melody note's pitch, MIDI, and time for voice-leading coordination.
 */
function logMelodyNote(note, atTime) {
  if (!note || note === 'REST') return;
  const midi = pitchToMidi(note);
  melodyNoteLog.push({ note, midi, time: atTime });
  if (melodyNoteLog.length > MELODY_LOG_SIZE) melodyNoteLog.shift();
}

/**
 * Returns the current melody context (last note, MIDI, direction) for harmony generation.
 */
function getMelodyContext(atTime) {
  // Returns { currentNote, currentMidi, prevMidi, direction }
  // direction: -1=melody went down, 0=same, 1=melody went up
  if (!melodyNoteLog.length) return { currentNote: null, currentMidi: null, prevMidi: null, direction: 0 };
  // Find the most recent log entry at or before atTime
  let current = melodyNoteLog[melodyNoteLog.length - 1];
  for (let i = melodyNoteLog.length - 1; i >= 0; i--) {
    if (melodyNoteLog[i].time <= atTime + 0.1) { current = melodyNoteLog[i]; break; }
  }
  const prev = melodyNoteLog.length >= 2
    ? melodyNoteLog[melodyNoteLog.length - 2]
    : null;
  const direction = (current.midi !== null && prev?.midi !== null)
    ? Math.sign(current.midi - prev.midi)
    : 0;
  return { currentNote: current.note, currentMidi: current.midi, prevMidi: prev?.midi ?? null, direction };
}
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Determines the harmony note to play beneath a given melody note using voice-leading rules.
 */
function getHarmonyNote(melodyNote, currentHarmonyNote, atTime = null, phrasePos = 0) {
  if (!melodyNote || melodyNote === 'REST') return 'REST';
  const melPc   = melodyNote.replace(/\d/g, '');
  const melMidi = pitchToMidi(melodyNote);
  let candidates = [];

  // ── Candidate collection ──────────────────────────────────────────────────
  if (musicRules.harmonyRules?.[melodyNote]) {
    candidates = musicRules.harmonyRules[melodyNote];
    if (!Array.isArray(candidates) || !candidates.length || typeof candidates[0] !== 'object')
      candidates = candidates.map ? candidates.map(c => ({ note: c, weight: 1 })) : [];
  }
  if (!candidates.length && musicRules.pitchClassHarmonyRules?.[melPc])
    candidates = musicRules.pitchClassHarmonyRules[melPc].map(c => ({ note: c.note, weight: c.weight }));

  if (candidates.length) {
    const prevH = currentHarmonyNote || melodyNote;

    // Melody motion context for contrary motion
    const melCtx   = getMelodyContext(atTime ?? actx?.currentTime ?? 0);
    const melDir   = melCtx.direction;   // -1 down, 0 same, 1 up
    const isResolving = phrasePos >= 0.85;

    // ── Consonance table ──────────────────────────────────────────────────────
    const CONSONANCE = {
      0: 0.5,  1: 0.05, 2: 0.15, 3: 1.0,  4: 1.0,
      5: 0.9,  6: 0.05, 7: 1.0,  8: 0.85, 9: 0.90,
      10: 0.2, 11: 0.08,
    };
    // Intervals that are "sweet" for parallel motion (3rds and 6ths)
    const PARALLEL_SWEET = new Set([3, 4, 8, 9]);

    const vhr    = musicRules.verticalHarmonyRules?.preferredIntervals?.[melPc] ?? [];
    const vhrMap = {};
    vhr.forEach(v => { vhrMap[v.interval] = v.weight; });
    const hasVhr = vhr.length > 0;

    const prevHMidi = pitchToMidi(prevH);

    const scored = candidates.map(c => {
      const hm = pitchToMidi(c.note);
      if (hm === null || melMidi === null) return { note: c.note, weight: c.weight * 0.1 };

      const ivRaw   = Math.abs(melMidi - hm);
      const ivClass = ivRaw % 12;

      // 1. Consonance gate
      const consonanceMult = CONSONANCE[ivClass] ?? 0.2;

      // 2. Vertical harmony rules boost
      const vhrBoost = hasVhr ? (1.0 + (vhrMap[ivClass] ?? 0) * 0.8) : 1.0;

      // 3. Width — harmony should sit 3–14 semitones below melody (sweet spot)
      const diff = melMidi - hm;
      const widthMult = diff >= 3 && diff <= 7  ? 1.0   // 3rd to 5th below — ideal
                      : diff >= 1 && diff <= 14 ? 0.8   // within octave — fine
                      : diff > 14               ? 0.3   // too low — muddy
                      : diff < 0                ? 0.15  // above melody — avoid
                      : 0.5;

      // 4. Voice leading — leap from previous harmony note
      let leapMult = 1.0;
      if (prevHMidi !== null) {
        const leap = Math.abs(hm - prevHMidi);
        leapMult = leap === 0 ? 0.6   // unison repeat — slightly boring
                 : leap <= 2  ? 1.0   // step — ideal
                 : leap <= 4  ? 0.95  // small leap — fine
                 : leap <= 7  ? 0.7   // leap — ok
                 : leap <= 9  ? 0.35  // large leap — penalise strongly
                 : 0.05;              // very large — almost never
      }

      // 5. Contrary motion — strongly prefer moving opposite to melody
      let contraryMult = 1.0;
      if (prevHMidi !== null && melDir !== 0) {
        const harmDir = Math.sign(hm - prevHMidi);
        if (harmDir === 0) {
          contraryMult = 0.7;           // harmony holds while melody moves — ok
        } else if (harmDir === -melDir) {
          contraryMult = 1.5;           // contrary motion — strongly prefer
        } else {
          // Parallel motion — only sweet if interval is a 3rd or 6th
          contraryMult = PARALLEL_SWEET.has(ivClass) ? 1.1 : 0.5;
        }
      }

      // 6. Resolution bias — phrase ending, push toward tonic intervals (3rd, 5th, octave)
      const resolveMult = isResolving
        ? ([0, 3, 4, 7].includes(ivClass) ? 1.8 : 0.3)
        : 1.0;

      const finalWeight = c.weight * consonanceMult * vhrBoost * widthMult
                        * leapMult * contraryMult * resolveMult;
      return { note: c.note, weight: Math.max(0, finalWeight) };
    });

    // Consonance gate
    const threshold = musicRules.verticalHarmonyRules?.consonanceThreshold ?? 0.4;
    const gated = scored.filter(c => {
      const hm      = pitchToMidi(c.note);
      const ivClass = hm !== null && melMidi !== null ? Math.abs(melMidi - hm) % 12 : 6;
      return (CONSONANCE[ivClass] ?? 0) >= threshold;
    });
    const pool  = gated.length ? gated : scored;
    const total = pool.reduce((s, i) => s + i.weight, 0);
    if (total > 0) pool.forEach(c => c.weight /= total);

    const sel = weightedRandom(pool.map(c => ({ item: c.note, weight: c.weight })));
    if (sel) {
      if (sel.match(/\d$/)) return sel;
      if (melMidi !== null) {
        // Prefer landing 3–7 semitones below melody (3rd to 5th)
        for (const oct of [3, 4, 2, 5]) {
          const cand = `${sel}${oct}`;
          const cm   = pitchToMidi(cand);
          if (cm !== null && melMidi - cm >= 3 && melMidi - cm <= 7) return cand;
        }
        // Fallback: within octave below
        for (const oct of [3, 4, 2, 5]) {
          const cand = `${sel}${oct}`;
          const cm   = pitchToMidi(cand);
          if (cm !== null && cm < melMidi) return cand;
        }
      }
      return `${sel}4`;
    }
  }

  // Last resort — a perfect third below
  return getNoteAtInterval(melodyNote, -4) ?? getNoteAtInterval(melodyNote, -5) ?? melodyNote;
}
// ── SAMPLE MAPPING → BUCKET-BASED ────────────────────────────────────────────
// OLD: PITCHTOSAMPLENAME(PITCH, VOICE) USING LOWBUFFERS/HIGHBUFFERS/BARBUFFERS
// NEW: PITCHTOSAMPLENAME(PITCH, BUCKET) USING LONGBUFFERS/MEDBUFFERS/SHORTBUFFERS

const missingSampleWarned = new Set();

/**
 * Maps a pitch and bucket to a sample name (e.g., 'g') for audio playback.
 */
function pitchToSampleName(pitch, bucket) {
  if (!pitch || pitch === 'REST') return null;
  return pitch;
}
// ── VELOCITY LAYER SYSTEM ────────────────────────────────────────────────────
//
// "Velocity" here is a 0.0→1.0 value derived at note-play time from:
//   • tension        — high tension = louder, brighter
//   • metrical strength — beat 1 > beat 3 > beat 2/4 (natural musical accent)
//   • bucket         — long pads sit back, short staccato punches forward
//   • a small random humanisation offset so nothing sounds perfectly uniform
//
// Velocity drives two things:
//   1. Per-note gain multiplier (soft notes are quieter)
//   2. A low-pass filter cutoff (soft notes are darker/warmer)
//
// This simulates multi-velocity sample layers without needing multiple files.

/**
 * Calculates a velocity value (0-1) based on bucket, tension, metrical strength, and humanisation.
 */
function computeVelocity(bucket, tension, atTime) {
  // ── Metrical accent: which beat of the bar are we on? ─────────────────────
  // Beat 1 gets the strongest accent, beat 3 medium, 2 & 4 lightest.
  // We derive beat position from audio clock relative to engine start.
  let metricalStrength = 0.5;   // default: unaccented
  if (actx && engineStartTime != null) {
    const beatPos = ((atTime - engineStartTime) / BEAT_SEC) % 4;  // 0–4 within bar
    if      (beatPos < 0.25)                 metricalStrength = 1.0;  // beat 1
    else if (beatPos >= 1.75 && beatPos < 2.25) metricalStrength = 0.72; // beat 2
    else if (beatPos >= 2.0  && beatPos < 2.5)  metricalStrength = 0.80; // beat 3
    else if (beatPos >= 3.75)                metricalStrength = 0.65; // beat 4
  }

  // ── Bucket base level ─────────────────────────────────────────────────────
  // Pads sit back in the mix, melody in the middle, staccato punches forward
  const bucketBase = bucket === 'long' ? 0.55 : bucket === 'medium' ? 0.72 : 0.82;

  // ── Tension contribution ──────────────────────────────────────────────────
  // Map tension 0→1 to a 0.6→1.0 velocity boost
  const tensionBoost = 0.60 + (tension ?? 0.4) * 0.40;

  // ── Combine and humanise ──────────────────────────────────────────────────
  const humanise = 0.92 + Math.random() * 0.08;   // ±4% random per note
  const velocity = Math.min(1.0, bucketBase * tensionBoost * metricalStrength * humanise);

  return velocity;
}

/**
 * Converts a velocity value to a low-pass filter cutoff frequency for brightness control.
 */
function velocityToFilterCutoff(velocity) {
  // Map velocity 0→1 to filter cutoff frequency
  // Soft (0.0) → 900 Hz  (dark, warm)
  // Loud (1.0) → 18000 Hz (fully open, bright)
  // Uses exponential curve — matches how ears perceive brightness
  const minHz = 900, maxHz = 18000;
  return minHz * Math.pow(maxHz / minHz, velocity);
}

// ── PLAY NOTE ─────────────────────────────────────────────────────────────────
// ENVELOPE SHAPE IS NOW DERIVED FROM THE BUCKET:
//   LONG   → PAD-STYLE: SLOW ATTACK, LONG RELEASE, LEGATO OVERLAP
//   MEDIUM → MELODIC:   MEDIUM ATTACK/RELEASE
//   SHORT  → STACCATO:  SHARP ATTACK, VERY SHORT RELEASE, TIGHT CUTOFF


function pitchToFreq(pitch) {
  const NOTE_MAP = {C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};
  const m = pitch.match(/([A-G]#?)(\d)/);
  if (!m) return 440;
  return 440 * Math.pow(2, (parseInt(m[2]) * 12 + 12 + NOTE_MAP[m[1]] - 69) / 12);
}

/**
 * Schedules a bucket-specific note with envelope, filter, and gain curve for playback.
 */
function playNote(bucket, pitch, durationSec, gainNode, atTime, tension = 0.4) {
  // UPDATE TELEMETRY
  const delay = Math.max(0, (atTime - actx.currentTime) * 1000);
  setTimeout(() => {
    if (!pitch || pitch === 'REST') {
      if (bucket === 'long')   telemetryLong.innerText   = '—';
      if (bucket === 'medium') telemetryMedium.innerText = '—';
      if (bucket === 'short')  telemetryShort.innerText  = '—';
      return;
    }
    const label = pitch.toUpperCase();
    if (bucket === 'long')   { telemetryLong.innerText = label; telemetryTension.innerText = getTension(pitch).toFixed(2); }
    if (bucket === 'medium') telemetryMedium.innerText = label;
    if (bucket === 'short')  telemetryShort.innerText  = label;
  }, delay);

  if (!pitch || pitch === 'REST') return;
  const sample = pitchToSampleName(pitch, bucket);
  if (!sample) return;

  // ── VELOCITY ───────────────────────────────────────────────────────────────
  // Computed from tension, metrical position, bucket, and humanisation.
  // Drives both the gain peak and the filter cutoff brightness.
  const velocity   = computeVelocity(bucket, tension, atTime);
  const filterHz   = velocityToFilterCutoff(velocity);

  // ── ENVELOPE PARAMETERS BY BUCKET ─────────────────────────────────────────
  // attack scales with velocity — soft notes attack slower (more pad-like),
  // loud notes attack faster (more percussive presence).
  let attack, release, tail;
  if (bucket === 'long') {
    attack  = Math.min(0.40, durationSec * 0.18) * (1.4 - velocity * 0.4);
    release = Math.min(0.70, durationSec * 0.40);
    tail    = Math.min(0.60, durationSec * 0.30);
  } else if (bucket === 'medium') {
    attack  = Math.min(0.10, durationSec * 0.08) * (1.2 - velocity * 0.2);
    release = Math.min(0.32, durationSec * 0.30);
    tail    = Math.min(0.22, durationSec * 0.20);
  } else {
    attack  = Math.min(0.03, durationSec * 0.04);
    release = Math.min(0.10, durationSec * 0.18);
    tail    = 0.03;
  }

  const holdEnd = atTime + durationSec - release;
  const stopAt  = atTime + durationSec + tail;

  try {
    const freq = pitchToFreq(pitch);
    const noteGain = actx.createGain();

    // ── LOW-PASS FILTER (velocity → brightness) ───────────────────────────
    const filter = actx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(filterHz, atTime);
    if (bucket === 'long') {
      const openHz = Math.min(filterHz * 2.2, 20000);
      filter.frequency.linearRampToValueAtTime(openHz, atTime + durationSec * 0.7);
    }
    filter.Q.value = 0.8;

    filter.connect(noteGain);
    noteGain.connect(gainNode);

    // ── GAIN CURVE (velocity-scaled peak) ────────────────────────────────
    const peakGain = Math.max(0.0001, velocity);
    noteGain.gain.setValueAtTime(0.0001, atTime);
    noteGain.gain.linearRampToValueAtTime(peakGain, atTime + attack);
    noteGain.gain.setValueAtTime(peakGain, Math.max(atTime + attack + 0.001, holdEnd));
    noteGain.gain.exponentialRampToValueAtTime(0.0001, stopAt);

    // ── SYNTHESIS ENGINE ──────────────────────────────────────────────────
    const oscillators = [];

    if (bucket === 'long') {
      const osc1 = actx.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.value = freq;
      osc1.detune.value = -4;

      const osc2 = actx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = freq;
      osc2.detune.value = 4;

      osc1.connect(filter);
      osc2.connect(filter);
      oscillators.push(osc1, osc2);
      
    } else if (bucket === 'medium') {
      const osc1 = actx.createOscillator();
      osc1.type = 'triangle';
      osc1.frequency.value = freq;

      const osc2 = actx.createOscillator();
      osc2.type = 'sine';
      osc2.frequency.value = freq * 2;

      const osc2Gain = actx.createGain();
      osc2Gain.gain.value = 0.2;
      osc2.connect(osc2Gain);
      osc2Gain.connect(filter);

      osc1.connect(filter);
      oscillators.push(osc1, osc2);

    } else if (bucket === 'short') {
      const osc1 = actx.createOscillator();
      osc1.type = 'sawtooth';
      osc1.frequency.value = freq;           // ← existing line
      osc1.frequency.setValueAtTime(freq * 1.08, atTime);          // ← add here
      osc1.frequency.exponentialRampToValueAtTime(freq, atTime + 0.04); // ← and here

      const hpFilter = actx.createBiquadFilter();
      hpFilter.type = 'highpass';
      hpFilter.frequency.value = 200;

      osc1.connect(hpFilter);
      hpFilter.connect(filter);
      oscillators.push(osc1);
    }

    // Replace the oscillators.forEach at the bottom with:
    oscillators.forEach(osc => {
      osc.start(atTime);
      osc.stop(stopAt + 0.05);
      osc.onended = () => {
        try { osc.disconnect(); } catch(e) {}
      };
    });
    // Also add for osc2Gain in medium branch:
    osc2.onended = () => { try { osc2Gain.disconnect(); } catch(e) {} };

  } catch(err) {
    console.warn(`playNote error [${bucket}] ${pitch}:`, err);
  }
}
// ── VOICE STATE ───────────────────────────────────────────────────────────────

// ── 8-BAR LOOP ALIGNMENT ─────────────────────────────────────────────────────
// The beat track is exactly 8 bars long. All phrase boundaries, resyncs,
// and structural resets snap to multiples of 8 bars so the melodic phrases
// stay phase-locked with the beat loop forever.
const BEAT_LOOP_BARS        = 8;
const RESYNC_EVERY_MEASURES = BEAT_LOOP_BARS;   // resync on every beat-loop boundary

/**
 * Creates a fresh voice state object with initial default values.
 */
function makeVoiceState() {
  return {
    currentNote: null, prevNote: null,
    consecutiveSame: 0, consecutiveRest: 0,
    motifQueue: [], rhythmQueue: [],
    pendingSuspension: null, nextNoteTime: 0,
    measuresSinceSync: 0, lastDurationType: null,
    currentBucket: 'medium',
  };
}

/**
 * Advances a voice (melody/harmony/bar) by one scheduled note, returning the played note and tension.
 */
function tickVoice(state, voiceRole, atTime, currentMelodyNote=null) {
  const elapsed       = atTime - engineStartTime;
  const totalMeasures = elapsed / MEASURE_DUR_SEC;
  generationState.phraseMeasureCounter = totalMeasures;

  updateStructuralRole(totalMeasures);

  // Song fraction cycles over 8-bar loops (matching beat track), then over
  // a longer 64-bar macro arc for structural role changes.
  const loopFrac = (totalMeasures % BEAT_LOOP_BARS) / BEAT_LOOP_BARS;
  const songFrac = (totalMeasures % 64) / 64;
  generationState.targetTension = getTargetTensionFromArc(songFrac);

  // PHRASE-LEVEL SHAPE — overrides song-level tension for melody voice
  const { phraseTension, phrasePos, isResolution } = getPhraseBias(totalMeasures);
  if (voiceRole === 'melody') {
    generationState.targetTension = phraseTension;
  }

  // ── 4-BAR PHRASE BOUNDARY: destination + skeleton ────────────────────────
  if (totalMeasures % 4 < 0.1 && generationState.phraseMeasureCounter > 0) {
    const dests = compRules?.phrase_destination_rules?.['4_bar_phrase'];
    if (dests) generationState.destinationChord = weightedRandomFromObj(dests);

    if (voiceRole === 'melody') {
      const phraseBarIndex = Math.floor(totalMeasures / 4);
      if (phraseSkeletonState.phraseStartBar !== phraseBarIndex) {
        phraseSkeletonState.phraseStartBar = phraseBarIndex;
        phraseSkeletonState.stepIndex      = 0;
        phraseSkeletonState.skeletonNotes  = buildPhraseSkeleton(
          state.currentNote ?? 'G4',
          generationState.destinationChord ?? 'tonic',
          generationState.currentStructuralRole ?? 'development',
          6
        );
        logToConsole(`📐 Phrase skeleton → ${generationState.destinationChord} [${generationState.currentStructuralRole}]`);
      }
    }
  }

  // ── 8-BAR LOOP BOUNDARY: hard sync with beat track ───────────────────────
  // Every 8 bars we are back at the start of the beat loop. Use this to:
  //   1. Force a phrase skeleton rebuild (guarantees fresh contour at loop start)
  //   2. Log a sync event so we can verify alignment in the console
  //   3. Bias the staccato burst system to reset (no mid-burst carry-over across loops)
  if (totalMeasures % BEAT_LOOP_BARS < 0.1 && totalMeasures > 0.5 && voiceRole === 'melody') {
    phraseSkeletonState.phraseStartBar = -1;   // force rebuild on next 4-bar boundary
    if (staccatoBurstState.active) {
      staccatoBurstState.active        = false;
      staccatoBurstState.notesRemaining = 0;
    }
    logToConsole(`🔁 8-bar loop sync @ bar ${Math.round(totalMeasures)}`);
  }

  // EXPECTATION DELAY
  const isNearPhraseEnd = (totalMeasures % 4) > 3.5;
  const delayProb = compRules?.expectation_rules?.delay_probability ?? 0.18;
  if (isNearPhraseEnd && Math.random() < delayProb && !generationState.expectationDelayActive) {
    generationState.expectationDelayActive = true;
    logToConsole('⏳ Expectation delay — holding');
    state.nextNoteTime = atTime + (compRules?.expectation_rules?.average_delay_length ?? 1) * BEAT_SEC;
    return { note:'REST', tension:0, bucket: state.currentBucket };
  } else {
    generationState.expectationDelayActive = false;
  }

  // ── PICK BUCKET FOR THIS NOTE ──────────────────────────────────────────────
  // FOR THE BAR VOICE (LONG PADS), ALWAYS USE 'LONG'.
  // FOR MELODY/HARMONY, USE BUCKET TRANSITIONS FROM RULES.
  let bucket;
  if (voiceRole === 'bar') {
    bucket = 'long';
  } else {
    bucket = pickNextBucket(state.currentBucket);
  }
  state.currentBucket = bucket;

  // ── DURATION — BIASED BY BUCKET ────────────────────────────────────────────
  let durSec;
  if (voiceRole === 'melody' && bucket === 'short') {
    // ── STACCATO BURST LOGIC ──────────────────────────────────────────────
    // Tick the gap counter first (consumes silence time between bursts)
    if (!staccatoBurstState.active && staccatoBurstState.gapBeatsLeft > 0) {
      // Still in gap — play a rest for one beat slice and count it down
      const sliceSec = Math.min(BEAT_SEC, staccatoBurstState.gapBeatsLeft * BEAT_SEC);
      staccatoBurstState.gapBeatsLeft -= sliceSec / BEAT_SEC;
      if (staccatoBurstState.gapBeatsLeft < 0.05) staccatoBurstState.gapBeatsLeft = 0;
      state.nextNoteTime = atTime + sliceSec;
      return { note: 'REST', tension: generationState.targetTension, bucket };
    }

    // Try to start a new burst if idle
    const currentBar = Math.floor((atTime - engineStartTime) / MEASURE_DUR_SEC);
    maybeStartStaccatoBurst(currentBar, phrasePos, generationState.targetTension);

    // Serve burst duration if active, otherwise fall back to locked rhythm
    const burstDur = getStaccatoBurstDuration();
    durSec = burstDur ?? getLockedRhythmDuration(bucket, atTime, state.lastDurationType);
  } else if (voiceRole === 'melody') {
    durSec = getLockedRhythmDuration(bucket, atTime, state.lastDurationType);
  } else {
    durSec = getBucketRhythmDuration(bucket, atTime, state.lastDurationType);
  }

  // ── NOTE SELECTION ─────────────────────────────────────────────────────────
  let noteToPlay = null;

  if (state.pendingSuspension) {
    noteToPlay = state.pendingSuspension;
    state.pendingSuspension = null;
  } else if (state.motifQueue.length > 0) {
    noteToPlay = state.motifQueue.shift();
  } else {
    if (!state.currentNote) {
      const all = Object.keys(musicRules.transitionRules).filter(p => p !== 'REST');
      state.currentNote = all[Math.floor(Math.random()*all.length)] ?? 'G4';
    }
    const forceDiff    = state.consecutiveSame >= 4;
    const forceNonRest = state.consecutiveRest >= 3;

    // SUSPENSION (MELODY ONLY)
    if (voiceRole === 'melody') {
      const suspWeight = parseFloat(document.getElementById('suspWeight').value);
      if (getTension(state.currentNote) >= 0.4 && Math.random() < suspWeight) {
        const res = getSuspensionResolution(state.currentNote);
        if (res) {
          noteToPlay = state.currentNote;
          state.pendingSuspension = res;
        }
      }
    }

    if (!noteToPlay) {
      if (voiceRole === 'harmony' && currentMelodyNote) {
        noteToPlay = getHarmonyNote(currentMelodyNote, state.currentNote, atTime, phrasePos);
      } else if (voiceRole === 'bar') {
        noteToPlay = getSmoothBarCandidate(state.currentNote, false);
      } else {
        const phraseEnd = isResolution || (totalMeasures % 4) > 3.0;
        noteToPlay = getWeightedNextNote(
          state.currentNote, state.prevNote, forceDiff, forceNonRest,
          { targetTension: generationState.targetTension, phraseEnd, phrasePos, bucket }
        );
      }
    }

    // MOTIF INJECTION (MELODY ONLY)
    if (voiceRole === 'melody') {
      const tail = maybeInjectMotif(state.currentNote);
      if (tail?.length) state.motifQueue.push(...tail);
    }
  }

  // DURATION TYPE FOR RHYTHM FLOW
  const durType = Object.entries(DUR_TYPE_TO_MULT).find(([,m]) => Math.abs(durTypeSec(Object.keys(DUR_TYPE_TO_MULT).find(t => DUR_TYPE_TO_MULT[t]===m) ?? 'quarter') - durSec) < 0.01)?.[0] ?? 'quarter';
  state.lastDurationType = durType;

  // GAIN NODE SELECTED BY BUCKET
  const gainNode = bucket === 'long' ? longGain : bucket === 'medium' ? medGain : shortGain;
  playNote(bucket, noteToPlay, durSec, gainNode, atTime, generationState.targetTension);

  // UPDATE STATE
  if (noteToPlay === 'REST') {
    state.consecutiveRest++;
    state.consecutiveSame = 0;
  } else {
    state.consecutiveSame  = noteToPlay === state.currentNote ? state.consecutiveSame+1 : 0;
    state.consecutiveRest  = 0;
  }
  state.prevNote     = state.currentNote;
  state.currentNote  = noteToPlay;
  state.nextNoteTime = atTime + durSec;

  // ADVANCE SKELETON STEP (melody only, non-rest notes)
  if (voiceRole === 'melody' && noteToPlay !== 'REST') {
    phraseSkeletonState.stepIndex = Math.min(
      phraseSkeletonState.stepIndex + 1,
      (phraseSkeletonState.skeletonNotes?.length ?? 1) - 1
    );
  }

  // KEY DETECTION — update on melody voice only, every N notes
  if (voiceRole === 'melody' && noteToPlay !== 'REST') {
    addToNoteHistory(noteToPlay);
    logMelodyNote(noteToPlay, atTime);   // for harmony voice leading
    keyUpdateCounter++;
    if (keyUpdateCounter >= KEY_UPDATE_EVERY) {
      keyUpdateCounter = 0;
      const key = detectImpliedKey();
      if (key) {
        const keyEl  = document.getElementById('telemetryKeyVal');
        const arcName = currentPhraseArc?.name ?? '—';
        if (keyEl) keyEl.innerText = `${key.root} ${key.mode === 'major' ? 'maj' : 'min'} · ${arcName}`;
      }
    }
  }

  // RESYNC SNAP
  const measIdx    = (state.nextNoteTime - engineStartTime) / MEASURE_DUR_SEC;
  const fractional = measIdx % RESYNC_EVERY_MEASURES;
  const nearBound  = fractional < 0.5 || fractional > (RESYNC_EVERY_MEASURES - 0.5);
  if (nearBound) {
    const snapped = engineStartTime + Math.round(measIdx/RESYNC_EVERY_MEASURES)*RESYNC_EVERY_MEASURES*MEASURE_DUR_SEC;
    const drift   = Math.abs(snapped - state.nextNoteTime);
    if (drift > 0.001 && drift < BEAT_SEC * 0.5) {
      state.nextNoteTime = snapped;
      state.rhythmQueue  = [];
      logToConsole(`↺ ${voiceRole} resynced — drift ${(drift*1000).toFixed(1)}ms`);
    }
  }

  return { note: noteToPlay, tension: getTension(noteToPlay), bucket };
}

// ── BAR CENTER LAYER ──────────────────────────────────────────────────────────
// UNCHANGED LOGIC — USES THE FIXED FULL-PITCH-KEY BARCENTERRULES FROM RULES.JS V6.0

/**
 * Selects a bar center note based on bar transition rules and smoothness.
 */
function getSmoothBarCandidate(prevBarNote, forceDifferent=false) {
  if (!musicRules.barCenterRules || !Object.keys(musicRules.barCenterRules).length) {
    const notes = ['G3','C4','D4','E4','G4'];
    if (forceDifferent && prevBarNote) {
      const others = notes.filter(n => n !== prevBarNote);
      return others[Math.floor(Math.random()*others.length)] ?? notes[0];
    }
    return notes[Math.floor(Math.random()*notes.length)];
  }
  let candidates = musicRules.barCenterRules[prevBarNote];
  if (!candidates?.length) {
    const all    = Object.keys(musicRules.barCenterRules);
    candidates   = musicRules.barCenterRules[all[Math.floor(Math.random()*all.length)]] ?? [];
    if (!candidates.length) return 'G3';
  }
  let filtered = [...candidates];
  if (forceDifferent && prevBarNote) {
    filtered = filtered.filter(c => c.note !== prevBarNote);
    if (!filtered.length) {
      const others = Object.keys(musicRules.barCenterRules).filter(n => n !== prevBarNote);
      return others.length ? others[Math.floor(Math.random()*others.length)] : prevBarNote;
    }
  }
  const prevMidi = pitchToMidi(prevBarNote);
  const smoothed = filtered.map(c => {
    let smooth = 0.5;
    if (prevMidi !== null) {
      const nm = pitchToMidi(c.note);
      if (nm !== null) {
        const iv = Math.abs(nm - prevMidi);
        smooth = iv<=2 ? 0.95 : iv<=5 ? 0.70 : iv<=7 ? 0.40 : 0.20;
      }
    }
    return { item:c.note, weight: applySmoothnessWeight(c.weight, smooth) };
  });
  const total = smoothed.reduce((s,i) => s+i.weight, 0);
  if (total <= 0) return filtered[0]?.note ?? prevBarNote;
  const norm = smoothed.map(c => ({ ...c, weight: c.weight/total }));
  return weightedRandom(norm) ?? prevBarNote;
}

// ── LOOKAHEAD PHRASE PLANNER ──────────────────────────────────────────────────
//
// Problem the planner solves
// --------------------------
// Picking notes one at a time produces random-walk melody: each note only
// knows its predecessor, so there's no directional arc.  The phrase destination
// system helps at the end, but the approach to the destination is still a drift.
//
// Solution
// --------
// At the start of each 4-bar phrase we plan a complete skeleton of TARGET
// SCALE DEGREES for the whole phrase — a curve from the current pitch toward
// the phrase destination, shaped by the structural role tension profile.
// tickVoice then uses this skeleton as a soft constraint on note selection,
// strongly biasing candidates that match the planned degree at each phrase step.
//
// The skeleton is NOT a rigid sequence — the engine still does weighted
// selection, so the RLHF preferences, motif rules, and tension biases all
// still apply.  The skeleton just adds a "planned direction" multiplier.
//
// Skeleton format
// ---------------
// An array of { step, targetMidi, targetPc, influence } objects, one per
// scheduled note position within the 4-bar phrase.  `influence` is how strongly
// this position is constrained (higher near phrase end).

const SEMITONES_IN_SCALE = [0,2,4,5,7,9,11];   // major scale steps

let phraseSkeletonState = {
  skeletonNotes:  [],    // planned MIDI targets for this phrase
  phraseStartBar: -1,    // which 4-bar phrase this skeleton covers
  stepIndex:      0,     // which skeleton step we're on
};

/**
 * Returns the pitch class (0-11) for a given MIDI note number.
 */
function midiToPc(midi) { return midi % 12; }

/**
 * Finds the nearest scale pitch (in MIDI) to a target MIDI within a given scale.
 */
function nearestScaleMidi(targetMidi, rootMidi, scaleSteps) {
  // Find the scale pitch closest to targetMidi (within ±1 octave)
  let best = null, bestDist = Infinity;
  for (let oct = -1; oct <= 1; oct++) {
    for (const step of scaleSteps) {
      const candidate = rootMidi + oct * 12 + step;
      const dist = Math.abs(candidate - targetMidi);
      if (dist < bestDist) { bestDist = dist; best = candidate; }
    }
  }
  return best;
}

/**
 * Builds a skeleton of target MIDI pitches for a phrase shaped by role and destination chord.
 */
function buildPhraseSkeleton(startNote, destinationChord, role, phraseLen = 6) {
  // ── 1. resolve start and end MIDI ─────────────────────────────────────────
  const startMidi = pitchToMidi(startNote) ?? 64;

  // Map destination chord name → target MIDI offset from tonic
  const ROOT_MIDI  = 67;   // G4 as tonic reference
  const DEST_OFFSETS = { tonic: 0, dominant: 7, mediant: 4 };
  const destOffset = DEST_OFFSETS[destinationChord] ?? 0;
  // Keep destination in the same register as start (±6 semitones)
  let endMidi = ROOT_MIDI + destOffset;
  while (endMidi < startMidi - 6) endMidi += 12;
  while (endMidi > startMidi + 6) endMidi -= 12;

  // ── 2. shape the contour by role ──────────────────────────────────────────
  // setup:       gentle rise (don't go too far)
  // development: arc — rise then fall, or fall then rise
  // climax:      push high, land on destination
  // resolution:  fall toward tonic, stepwise
  const midMidi = (() => {
    if (role === 'climax')      return Math.min(startMidi + 7, 84);   // push up
    if (role === 'resolution')  return Math.max(startMidi - 3, 52);   // step down
    if (role === 'setup')       return startMidi + 2;                  // gentle
    // development: arch — peak at midpoint
    return Math.round((startMidi + endMidi) / 2) + (Math.random() < 0.5 ? 3 : -2);
  })();

  // ── 3. interpolate skeleton steps ─────────────────────────────────────────
  // Quadratic bezier through start → mid → end
  const skeleton = [];
  for (let i = 0; i < phraseLen; i++) {
    const t  = i / (phraseLen - 1);
    // Bezier: B(t) = (1-t)²·start + 2(1-t)t·mid + t²·end
    const rawMidi = Math.round(
      (1-t)*(1-t)*startMidi + 2*(1-t)*t*midMidi + t*t*endMidi
    );
    // Snap to nearest scale pitch
    const snapped = nearestScaleMidi(rawMidi, ROOT_MIDI, SEMITONES_IN_SCALE) ?? rawMidi;
    // Influence: low in the middle (engine has freedom), high at endpoints
    const influence = i === 0 ? 0.0          // first note: no constraint (already played)
      : i >= phraseLen - 2 ? 2.8             // final 2 notes: strongly constrained
      : 0.4 + 0.8 * Math.abs(t - 0.5) * 2;  // mid-phrase: gentle curve
    skeleton.push({ step: i, targetMidi: snapped, influence });
  }
  return skeleton;
}

/**
 * Returns a weight multiplier that biases a candidate note toward the phrase skeleton target.
 */
function getSkeletonBias(candidateNote, stepIndex, skeleton) {
  if (!skeleton?.length || stepIndex >= skeleton.length) return 1.0;
  const target = skeleton[stepIndex];
  if (!target || target.influence <= 0) return 1.0;
  const candMidi = pitchToMidi(candidateNote);
  if (candMidi === null) return 1.0;
  const semitonesDist = Math.abs(candMidi - target.targetMidi);
  // Gaussian-style falloff: exact match = full influence boost, falls off with distance
  const proximity = Math.exp(-semitonesDist * semitonesDist / 8.0);  // σ≈2.8 semitones
  // At influence=2.8, an exact match multiplies weight by e^2.8≈16×, 2 semitones away ≈4×
  return Math.exp(target.influence * (proximity - 0.5));
}

// ── RISER / CRASH SYSTEM ─────────────────────────────────────────────────────
//
// Design
// ------
// We track a smoothed tension value (exponential moving average over the
// tensionArc buffer) to get a stable reading that doesn't jitter on every note.
//
// RISER triggers when:
//   • no riser is currently active
//   • smoothed tension crosses RISER_TENSION_THRESHOLD (going upward)
//   • we haven't crashed within the last MIN_BARS_BETWEEN_RISERS bars
//
// CRASH (+ riser fade-out) triggers when:
//   • a riser IS active
//   • smoothed tension drops below CRASH_TENSION_THRESHOLD after the rise
//   • we are at a bar boundary (so the crash lands on the beat)
//   • the riser has been playing for at least MIN_RISER_BARS bars
//
// Both events are scheduled to the nearest upcoming bar boundary for
// rhythmic precision.

const RISER_TENSION_THRESHOLD = 0.52;   // smoothed tension to start a riser
const CRASH_TENSION_THRESHOLD = 0.35;   // smoothed tension to trigger the drop
const MIN_RISER_BARS          = 2;      // riser must play at least this many bars
const MAX_RISER_BARS          = 8;     // hard ceiling — riser always released by bar 8
const MIN_BARS_BETWEEN_RISERS = 8;      // don't re-trigger too soon after a crash
const RISER_FADE_SEC          = 0.4;    // how long to fade the riser out on crash

let lastCrashBar   = -999;             // bar number of the last crash event
let smoothedTension = 0;              // EMA tension value
let prevSmoothedTension = 0;          // for rise/fall detection

/**
 * Computes an exponential moving average tension from the tension arc buffer.
 */
function getSmoothedTension() {
  if (!tensionArc.length) return 0;
  // EMA over the arc buffer — alpha 0.12 gives ~8-note smoothing
  let ema = tensionArc[0];
  for (let i = 1; i < tensionArc.length; i++) {
    ema = 0.12 * tensionArc[i] + 0.88 * ema;
  }
  return ema;
}

/**
 * Returns the current bar number based on engine start time and measure duration.
 */
function getCurrentBar() {
  if (!engineStartTime || !actx) return 0;
  return Math.floor((actx.currentTime - engineStartTime) / MEASURE_DUR_SEC);
}

/**
 * Calculates the absolute time of a future bar boundary offset by a given number of bars.
 */
function nextBarBoundaryTime(barsAhead = 1) {
  const currentBar = getCurrentBar();
  return engineStartTime + (currentBar + barsAhead) * MEASURE_DUR_SEC;
}

/**
 * Starts playback of a random riser sound at the specified time with fade-in.
 */
function triggerRiser(atTime) {
  const available = riserBuffers.map((b,i) => b ? i : -1).filter(i => i >= 0);
  if (!available.length || !riserGain || !actx) return;

  const idx = available[Math.floor(Math.random() * available.length)];
  const src = actx.createBufferSource();
  src.buffer = riserBuffers[idx];
  src.loop   = false;
  src.connect(riserGain);

  // Fade in gently so it doesn't click
  riserGain.gain.cancelScheduledValues(atTime);
  riserGain.gain.setValueAtTime(0, atTime);
  riserGain.gain.linearRampToValueAtTime(0.3, atTime + 1.5);

  src.start(atTime);

  riserState.active        = true;
  riserState.source        = src;
  riserState.riserIdx      = idx;
  riserState.startBar      = getCurrentBar();
  riserState.peakTension   = smoothedTension;
  riserState.releaseQueued = false;

  logToConsole(`🚀 Riser ${idx} → bar ${riserState.startBar}`);
}

/**
 * Fades out the active riser and triggers a crash one-shot at the specified time.
 */
function triggerCrash(atTime) {
  // Fade out the riser
  if (riserState.source && riserGain) {
    riserGain.gain.cancelScheduledValues(atTime);
    riserGain.gain.setValueAtTime(riserGain.gain.value, atTime);
    riserGain.gain.linearRampToValueAtTime(0, atTime + RISER_FADE_SEC);
    const srcToStop = riserState.source;
    setTimeout(() => {
      try { srcToStop.stop(); srcToStop.disconnect(); } catch {}
    }, (atTime - actx.currentTime + RISER_FADE_SEC + 0.1) * 1000);
  }
  riserState.active        = false;
  riserState.source        = null;
  riserState.releaseQueued = true;

  // Fire a crash one-shot
  const available = crashBuffers.map((b,i) => b ? i : -1).filter(i => i >= 0);
  if (available.length && crashGain && actx) {
    const idx = available[Math.floor(Math.random() * available.length)];
    const src = actx.createBufferSource();
    src.buffer = crashBuffers[idx];
    src.loop   = false;
    src.connect(crashGain);
    crashGain.gain.cancelScheduledValues(atTime);
    crashGain.gain.setValueAtTime(0.3, atTime);
    src.start(atTime);
    logToConsole(`💥 Crash ${idx} @ bar ${getCurrentBar()}`);
  }

  lastCrashBar = getCurrentBar();
}

/**
 * Evaluates tension to decide whether to trigger a riser or crash based on thresholds.
 */
function tickRiserSystem() {
  if (!running || !actx) return;

  prevSmoothedTension = smoothedTension;
  smoothedTension     = getSmoothedTension();

  const currentBar   = getCurrentBar();
  const barFrac      = ((actx.currentTime - engineStartTime) % MEASURE_DUR_SEC) / MEASURE_DUR_SEC;
  const nearBarStart = barFrac < 0.12;   // within first 12% of a bar = "on the bar"

  // ── RISER TRIGGER ──────────────────────────────────────────────────────────
  if (!riserState.active) {
    const barsSince = currentBar - lastCrashBar;
    const tensionRising = smoothedTension > prevSmoothedTension;
    if (
      tensionRising &&
      smoothedTension >= RISER_TENSION_THRESHOLD &&
      barsSince >= MIN_BARS_BETWEEN_RISERS &&
      riserBuffers.some(Boolean)
    ) {
      triggerRiser(nextBarBoundaryTime(1));
    }
  }

  // ── CRASH TRIGGER ──────────────────────────────────────────────────────────
  if (riserState.active && !riserState.releaseQueued) {
    const barsPlaying = currentBar - riserState.startBar;
    const tensionFalling = smoothedTension < prevSmoothedTension;
    const hitCeiling = barsPlaying >= MAX_RISER_BARS;
    const naturalDrop = tensionFalling && smoothedTension <= CRASH_TENSION_THRESHOLD && barsPlaying >= MIN_RISER_BARS;

    if ((naturalDrop || hitCeiling) && nearBarStart) {
      triggerCrash(actx.currentTime + 0.01);   // as close to now as possible (we're on the bar)
    }
  }
}

// ── SCHEDULERS ────────────────────────────────────────────────────────────────

/**
 * Schedules upcoming melody notes by calling tickVoice repeatedly within the lookahead window.
 */
function scheduleMelody() {
  if (!running) return;
  const now = actx.currentTime;
  while (melodyState.nextNoteTime < now + LOOK_AHEAD_SEC) {
    const r = tickVoice(melodyState, 'melody', melodyState.nextNoteTime);
    tensionArc.push(r.tension);
    if (tensionArc.length > 44) tensionArc.shift();
  }
  tickRiserSystem();
  schedulerTimer = setTimeout(scheduleMelody, SCHEDULE_INTERVAL_MS);
}

/**
 * Schedules upcoming harmony notes, referencing the current melody note.
 */
function scheduleHarmony() {
  if (!running) return;
  const now     = actx.currentTime;
  const curMel  = melodyState?.currentNote ?? null;
  while (harmonyState.nextNoteTime < now + LOOK_AHEAD_SEC) {
    tickVoice(harmonyState, 'harmony', harmonyState.nextNoteTime, curMel);
  }
  harmonySchedulerTimer = setTimeout(scheduleHarmony, SCHEDULE_INTERVAL_MS);
}

/**
 * Schedules bar center (long pad) notes on measure boundaries.
 */
function scheduleBar() {
  if (!running) return;
  const now = actx.currentTime;
  while (barState.nextNoteTime < now + LOOK_AHEAD_SEC) {
    const r = tickVoice(barState, 'bar', barState.nextNoteTime);
    barState.nextNoteTime = barState.nextNoteTime + MEASURE_DUR_SEC;
  }
  barSchedulerTimer = setTimeout(scheduleBar, SCHEDULE_INTERVAL_MS);
}

const canvas  = document.getElementById('matrixCanvas');
const ctx2d   = canvas.getContext('2d');
let points    = Array(35).fill(0).map(() => Math.random()*350);
const tensionArc = new Array(44).fill(0);

/**
 * Resizes the visualization canvas to fill its parent container.
 */
function resizeCanvas() {
  const parent = canvas.parentElement;
  canvas.height = Math.min(320, Math.max(200, parent.clientHeight - 60));
  canvas.width  = parent.clientWidth;
}
window.addEventListener('resize', resizeCanvas);

// ── DANCER SPRITE ─────────────────────────────────────────────

const dancerSprite = new Image();
dancerSprite.src = '../static/images/dance.png';

const DANCER_FRAME_COUNT = 13;
const DANCER_FRAME_SIZE = 250;

let dancerFrame = 0;
let dancerLastFrameTime = 0;

let dancerStartTime = 0;

const DANCER_FPS = 9.75; // animation speed

let dancerX = -250;
let dancerDirection = 1;

const dancerTrail = [];
const MAX_TRAIL = 10;

/**
 * Draws the animated dancer sprite on the canvas with trailing motion.
 */
function drawDancer() {
  if (!dancerSprite.complete) return;

  const now = performance.now();

  if (running) {

      const elapsed =
          actx.currentTime - dancerStartTime;

      const frameOffset = 6;

      dancerFrame =
          (Math.floor(elapsed * DANCER_FPS) + frameOffset)
          % DANCER_FRAME_COUNT;
  }


  if (!running) return;

  dancerX += 0.25 * dancerDirection;

  if (dancerX > canvas.width - 140) {
      dancerDirection = -1;
  }

  if (dancerX < -40) {
      dancerDirection = 1;
  }

  const bob =
    Math.sin(now * 0.0025) * 6;

  const drawY =
    canvas.height - 200 + bob;

  const scale = 0.75;

  const drawWidth  = DANCER_FRAME_SIZE * scale;
  const drawHeight = DANCER_FRAME_SIZE * scale;

  // Soft glow
  ctx2d.save();

  ctx2d.globalAlpha = 0.15;

  ctx2d.shadowBlur = 12;
  ctx2d.shadowColor = '#dc4ce8';

  ctx2d.globalAlpha = 0.85;
  dancerTrail.unshift({
    x: dancerX,
    y: drawY,
    frame: dancerFrame
  });

  if (dancerTrail.length > MAX_TRAIL) {
    dancerTrail.pop();
  }

  ctx2d.drawImage(
    dancerSprite,

    dancerFrame * DANCER_FRAME_SIZE,
    0,
    DANCER_FRAME_SIZE,
    DANCER_FRAME_SIZE,

    dancerX,
    drawY,

    drawWidth,
    drawHeight
  );

  ctx2d.restore();
}

/**
 * Renders the full visual layer: grid, dancer, tension waveform, and watermark.
 */
function renderVisuals() {
  if (!canvas || !ctx2d) return;
  ctx2d.fillStyle = 'rgba(23,0,50,0.15)';
  ctx2d.fillRect(0, 0, canvas.width, canvas.height);

  // SUBTLE GRID
  ctx2d.strokeStyle = 'rgba(131,12,222,0.06)';
  ctx2d.lineWidth   = 1;
  const gs = 32;
  for (let x=0; x<canvas.width; x+=gs)  { ctx2d.beginPath(); ctx2d.moveTo(x,0); ctx2d.lineTo(x,canvas.height); ctx2d.stroke(); }
  for (let y=0; y<canvas.height; y+=gs) { ctx2d.beginPath(); ctx2d.moveTo(0,y); ctx2d.lineTo(canvas.width,y); ctx2d.stroke(); }

  drawDancer();

  // TENSION WAVEFORM
  if (tensionArc.length > 1) {
    const segW   = canvas.width / points.length;
    const curT   = tensionArc[tensionArc.length-1] || 0;

    // GLOW — TWO PASSES: WIDE SOFT, NARROW BRIGHT
    for (const [lw, blur, alpha] of [[6, 18, 0.3],[2, 6, 0.9]]) {
      const color = curT > 0.45
        ? `rgba(255,105,180,${alpha})`
        : `rgba(0,255,255,${alpha})`;
      ctx2d.strokeStyle = color;
      ctx2d.lineWidth   = lw;
      ctx2d.shadowBlur  = blur;
      ctx2d.shadowColor = curT > 0.45 ? '#ff69b4' : '#00ffff';
      ctx2d.beginPath();
      for (let i=0; i<points.length; i++) {
        const mappedT  = tensionArc[Math.floor((i/points.length)*tensionArc.length)] || 0;
        const modBias  = mappedT * 40 * Math.sin(Date.now()*0.005 + i);
        points[i]     += (Math.random()*6-3);
        points[i]      = Math.max(100, Math.min(canvas.height-60, points[i]));
        const x = i*segW + segW/2;
        const y = points[i] + modBias;
        i===0 ? ctx2d.moveTo(x,y) : ctx2d.lineTo(x,y);
      }
      ctx2d.stroke();
    }
    ctx2d.shadowBlur = 0;
  }

  // WATERMARK TEXT
  ctx2d.fillStyle = '#67FEBD';
  ctx2d.font      = '9px "Share Tech Mono", monospace';
  ctx2d.fillText('meowRE-MIX', 14, 20);
  ctx2d.fillStyle = 'rgba(103,254,189,0.5)';
  ctx2d.fillText('PROCEDURAL AUDIO ENGINE v6.0', 14, 34);

  requestAnimationFrame(renderVisuals);
}
renderVisuals();

// ── FX HELPERS ───────────────────────────────────────────────────────────────

/**
 * Synthesizes a convolution reverb impulse response with specified decay and pre-delay.
 */
function buildReverbIR(actx, decaySec = 2.8, predelayMs = 18) {
  // Synthesise a plausible convolution reverb impulse response entirely in JS.
  // This avoids needing an external IR file.
  //
  // Algorithm: exponentially-decaying white noise with a short pre-delay.
  // Tuned for a medium room / hall feel that sits under the melody without
  // clouding it — not a huge cathedral, not a tight box.
  //
  // decaySec   — how long the tail rings (2.8s = warm hall)
  // predelayMs — milliseconds before reverb tail starts (adds depth)
  const sampleRate  = actx.sampleRate;
  const length      = Math.ceil(sampleRate * (decaySec + predelayMs / 1000));
  const preSamples  = Math.ceil(sampleRate * predelayMs / 1000);
  const ir          = actx.createBuffer(2, length, sampleRate);

  for (let ch = 0; ch < 2; ch++) {
    const data = ir.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      if (i < preSamples) { data[i] = 0; continue; }
      const t       = (i - preSamples) / sampleRate;
      // Exponential decay envelope
      const decay   = Math.exp(-t * (3.0 / decaySec));
      // Early reflections: slight density boost in first 80ms
      const earlyBoost = t < 0.08 ? 1.4 : 1.0;
      data[i] = (Math.random() * 2 - 1) * decay * earlyBoost;
    }
    // Normalise channel — loop instead of spread to avoid stack overflow on large buffers
    let peak = 0;
    for (let i = 0; i < length; i++) { const a = Math.abs(data[i]); if (a > peak) peak = a; }
    if (peak > 0) for (let i = 0; i < length; i++) data[i] /= peak;
  }
  return ir;
}

// ── ASSET LOADING ─────────────────────────────────────────────────────────────

/**
