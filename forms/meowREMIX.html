<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>meowRE-MIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/static/css/audioStyles.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ── CSS VARIABLES ─────────────────────────────────────────────────────────── */
:root {
  --bg-deep:      #170032;
  --bg-mid:       #37025a;
  --accent-1:     #830cde;
  --accent-2:     #A55AFF;
  --accent-3:     #667eea;
  --neon-cyan:    #00ffff;
  --neon-green:   #67FEBD;
  --neon-pink:    #ff69b4;
  --neon-magenta: #dc4ce8;
  --neon-hot:     #c71585;
  --neon-amber:   #fecd39;
  --neon-orange:  #ff6200;
  --text-dim:     #9090C0;
  --text-bright:  #C4C3D0;
  --glass-bg:     rgba(55, 2, 90, 0.45);
  --glass-border: rgba(165, 90, 255, 0.28);
  --glass-shine:  rgba(196, 181, 253, 0.07);
  --shadow-glow:  0 0 24px rgba(131, 12, 222, 0.35);
}

/* ── RESET & BASE ──────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg-deep);
  color: var(--text-bright);
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  overflow: hidden;
}

/* ANIMATED GRID BACKGROUND */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(131,12,222,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(131,12,222,0.07) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
  animation: gridDrift 60s linear infinite;
}
@keyframes gridDrift {
  from { background-position: 0 0; }
  to   { background-position: 40px 40px; }
}

/* RADIAL NEBULA GLOWS */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 55% 40% at 15% 20%, rgba(131,12,222,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 40% 50% at 85% 75%, rgba(220,76,232,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 30% 30% at 50% 100%, rgba(0,255,255,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── LAYOUT ────────────────────────────────────────────────────────────────── */
.main-grid {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: 100vh;
  height: 100vh;
  gap: 0;
}

/* ── GLASSMORPHISM CARD ─────────────────────────────────────────────────────── */
.glass {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: var(--shadow-glow), inset 0 1px 0 var(--glass-shine);
}

/* ── VISUALIZER PANEL ─────────────────────────────────────────────────────── */
.visualizer-card {
  display: flex;
  flex-direction: column;
  padding: 16px;
  gap: 12px;
  overflow: hidden;
}

#matrixCanvas {
  flex: 1;
  width: 100%;
  border-radius: 8px;
  border: 1px solid rgba(131,12,222,0.25);
  background: rgba(23,0,50,0.7);
  display: block;
}

/* ── CONSOLE LOG ───────────────────────────────────────────────────────────── */
.console-wrapper {
  flex-shrink: 0;
  height: 130px;
}

.console-log {
  height: 108px;
  overflow-y: auto;
  background: rgba(23,0,50,0.8);
  border: 1px solid rgba(131,12,222,0.2);
  border-radius: 6px;
  padding: 8px 10px;
  font-size: 11px;
  color: var(--neon-green);
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-all;
}
.console-log::-webkit-scrollbar { width: 4px; }
.console-log::-webkit-scrollbar-track { background: transparent; }
.console-log::-webkit-scrollbar-thumb { background: var(--accent-1); border-radius: 2px; }

/* ── SIDEBAR ───────────────────────────────────────────────────────────────── */
.controls-sidebar {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 0 12px;
  overflow-y: auto;
  border-left: 1px solid var(--glass-border);
  background: rgba(23, 0, 50, 0.6);
  backdrop-filter: blur(24px);
}
.controls-sidebar::-webkit-scrollbar { width: 3px; }
.controls-sidebar::-webkit-scrollbar-thumb { background: var(--accent-1); border-radius: 2px; }

/* ── PANEL ─────────────────────────────────────────────────────────────────── */
.panel {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  padding: 12px;
  box-shadow: inset 0 1px 0 var(--glass-shine);
}

.panel-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent-2);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(165,90,255,0.2);
}

.btn-primary {
  background: transparent;
  border: none;
  padding: 0;
  width: auto;
  height: auto;
  cursor: pointer;
  box-shadow: none;
}

.btn-primary::before {
  display: none;
}

.btn-primary img {
  width: auto;
  height: auto;
  filter: none;
}

/* ── CONTROL GROUP / SLIDER ────────────────────────────────────────────────── */
.control-group {
  margin-bottom: 9px;
}
.control-group:last-child { margin-bottom: 0; }

.control-group label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: var(--text-dim);
  font-size: 11px;
  margin-bottom: 4px;
}

.val-display {
  color: var(--neon-cyan);
  font-size: 11px;
  min-width: 32px;
  text-align: right;
}

.slider-row input[type="range"] {
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  height: 3px;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--accent-1), var(--neon-magenta));
  outline: none;
  cursor: pointer;
}
.slider-row input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 13px;
  height: 13px;
  border-radius: 50%;
  background: var(--neon-cyan);
  box-shadow: 0 0 8px var(--neon-cyan);
  cursor: pointer;
  transition: box-shadow 0.15s;
}
.slider-row input[type="range"]::-webkit-slider-thumb:hover {
  box-shadow: 0 0 16px var(--neon-cyan);
}

/* BUCKET-COLOURED SLIDER THUMBS */
.slider-long   input[type="range"]::-webkit-slider-thumb { background: var(--neon-cyan);    box-shadow: 0 0 8px var(--neon-cyan); }
.slider-medium input[type="range"]::-webkit-slider-thumb { background: var(--accent-2);     box-shadow: 0 0 8px var(--accent-2); }
.slider-short  input[type="range"]::-webkit-slider-thumb { background: var(--neon-pink);    box-shadow: 0 0 8px var(--neon-pink); }
.slider-amb    input[type="range"]::-webkit-slider-thumb { background: var(--neon-green);   box-shadow: 0 0 8px var(--neon-green); }
.slider-beat   input[type="range"]::-webkit-slider-thumb { background: var(--neon-amber);   box-shadow: 0 0 8px var(--neon-amber); }

/* ── TELEMETRY ─────────────────────────────────────────────────────────────── */
.metric-readouts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.metric-box {
  background: rgba(23,0,50,0.7);
  border: 1px solid rgba(131,12,222,0.25);
  border-radius: 6px;
  padding: 7px 8px;
}
.metric-label {
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 3px;
}
.metric-value {
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  font-weight: 600;
  color: var(--neon-cyan);
  letter-spacing: 0.05em;
}
#telemetryLong   .metric-value { color: var(--neon-cyan); }
#telemetryMedium .metric-value { color: var(--accent-2); }
#telemetryShort  .metric-value { color: var(--neon-pink); }
#telemetryTension .metric-value { color: var(--neon-amber); }
#telemetryKey     .metric-value { color: var(--neon-green); font-size: 11px; letter-spacing: 0.05em; }

/* BUCKET BADGE NEXT TO SLIDER LABELS */
.bucket-badge {
  display: inline-block;
  font-size: 9px;
  letter-spacing: 0.12em;
  padding: 1px 5px;
  border-radius: 3px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 600;
  vertical-align: middle;
}
.badge-long   { background: rgba(0,255,255,0.12);    color: var(--neon-cyan);    border: 1px solid rgba(0,255,255,0.3); }
.badge-medium { background: rgba(165,90,255,0.12);   color: var(--accent-2);     border: 1px solid rgba(165,90,255,0.3); }
.badge-short  { background: rgba(255,105,180,0.12);  color: var(--neon-pink);    border: 1px solid rgba(255,105,180,0.3); }

/* ── DANCE GIF ─────────────────────────────────────────────────────────────── */
.dance {
  position: fixed;
  top: 150px;
  left: 200px;
  height: 150px;
  width: auto;
  z-index: 200;
  opacity: 0.85;
  filter: drop-shadow(0 0 8px var(--neon-magenta));
  pointer-events: none;
}

/* ── CANVAS WATERMARK TEXT ─────────────────────────────────────────────────── */
/* RENDERED BY JS, STYLED HERE FOR REFERENCE ONLY */
</style>
</head>

<!-- ═══════════════════════════════════════════════════════════════════════════
     AUDIO ENGINE
════════════════════════════════════════════════════════════════════════════ -->

<script type="module">
import { musicRules, ruleLibrary, metadata } from '/api/audio/rules.js';


// RULELIBRARY REPLACES THE OLD RULE_LIBRARY.JSON FETCH — IT'S NOW EMBEDDED
// IN RULES.JS AS A NAMED EXPORT BY RULES.PY V6.0
const compRules = ruleLibrary?.rule_library ?? null;
if (!compRules) console.warn('ruleLibrary missing or empty — running without high-level biases.');

// ── CONFIG ────────────────────────────────────────────────────────────────────
const BPM              = 90;
const BEAT_SEC         = 60 / BPM;
const HALF_QUARTER_SEC = BEAT_SEC * 2;       // HALF-NOTE = 1.333S AT 90 BPM
const MEASURE_DUR_SEC  = BEAT_SEC * 4;       // 4/4 BAR  = 2.666S
const LOOK_AHEAD_SEC   = 0.12;
const SCHEDULE_INTERVAL_MS = 50;
const SAMPLE_NAMES     = ["g", "a", "b", "c", "d", "e", "f", "g2"];

// ── NOTE LENGTH BUCKETS ───────────────────────────────────────────────────────
// ALL THREE COME FROM RULES.JS → MUSICRULES.NOTELENGTHBUCKETS
const NLB = musicRules.noteLengthBuckets ?? {};

// BUCKET WEIGHTS — HOW OFTEN EACH BUCKET IS CHOSEN OVERALL
// E.G. { LONG: 0.33, MEDIUM: 0.34, SHORT: 0.33 }
const BUCKET_WEIGHTS = NLB.bucketWeights ?? { long: 0.33, medium: 0.34, short: 0.33 };

// PREFERRED NOTE-NAME PER (PITCH_CLASS, BUCKET)
// E.G. { 'G': { LONG: 'G', MEDIUM: 'G', SHORT: 'G2' }, ... }
const BUCKET_BY_PITCH = NLB.bucketByPitch ?? {};

// AUDIO PATH ROOTS PER BUCKET (RELATIVE TO FORMS/)
// E.G. { LONG: '../PROJECTS/AUDIO/NOTES/LONG', ... }
const AUDIO_PATHS = {
    long:   'https://uknctjnhzxedyxlioloq.supabase.co/storage/v1/object/public/meowREMIX-pad',
    medium: 'https://uknctjnhzxedyxlioloq.supabase.co/storage/v1/object/public/meowREMIX-melody',
    short:  'https://uknctjnhzxedyxlioloq.supabase.co/storage/v1/object/public/meowREMIX-harmony',
};

// BUCKET → [{NEXT, WEIGHT}] — WHICH BUCKET NATURALLY FOLLOWS WHICH
const BUCKET_TRANSITIONS = NLB.bucketTransitions ?? {
  long:   [{next:'long',weight:0.35},{next:'medium',weight:0.50},{next:'short',weight:0.15}],
  medium: [{next:'long',weight:0.20},{next:'medium',weight:0.40},{next:'short',weight:0.40}],
  short:  [{next:'long',weight:0.10},{next:'medium',weight:0.45},{next:'short',weight:0.45}],
};

// PER-BUCKET DURATION-TYPE BIAS (AFFECTS GETRHYTHMSEQUENCE BUCKETED VARIANT)
const BUCKET_RHYTHM_BIAS = NLB.bucketRhythmBias ?? {
  long:   { whole:0.35, 'dotted-half':0.30, half:0.25, 'dotted-quarter':0.10 },
  medium: { half:0.20, 'dotted-quarter':0.30, quarter:0.35, 'dotted-eighth':0.15 },
  short:  { quarter:0.15, 'dotted-eighth':0.20, eighth:0.45, sixteenth:0.20 },
};

// PER-BUCKET TENSION BIAS MULTIPLIERS PER PITCH CLASS
const BUCKET_TENSION_MAP = NLB.bucketTensionMap ?? { avgTensionByBucket:{}, pitchBias:{} };

// ── TENSION + DUR MAPS ────────────────────────────────────────────────────────
const TENSION_MAP = {
  'G':0.0,'A':0.2,'B':0.1,'C':0.3,'D':0.1,
  'E':0.2,'F#':0.5,'G#':0.8,'A#':0.7,'C#':0.9,'D#':0.7,'F':0.6,
};

const DUR_TYPE_TO_MULT = {
  'whole':4,'half':2,'quarter':1,'eighth':0.5,'sixteenth':0.25,'thirty-second':0.125,
  'dotted-half':3,'dotted-quarter':1.5,'dotted-eighth':0.75,'other':1,
};

// ── SMOOTHNESS HELPERS ────────────────────────────────────────────────────────
const smoothnessRules = musicRules.smoothnessRules ?? {
  transitionSmoothness:{}, rhythmFlowRules:[], smoothnessBias:0.85,
};
const SMOOTHNESS_BIAS = smoothnessRules.smoothnessBias ?? 0.85;

// ── RLHF PREFERENCE BOOST ────────────────────────────────────────────────────
const PREF            = musicRules.preferenceSignals ?? {};
const PREF_TOTAL      = PREF.total_ratings ?? 0;
const PREF_BOOST_STRENGTH = 2.5;
const PREF_PEN_STRENGTH   = 0.3;
const LIKED_TRANS_BOOST   = {};
const DISLIKED_TRANS_PEN  = {};

(PREF.note_transition_signals?.top_liked ?? []).forEach(t => {
  const key = `${t.from}->${t.to}`;
  LIKED_TRANS_BOOST[key] = 1 + (PREF_BOOST_STRENGTH - 1) * t.preference_score;
});
(PREF.note_transition_signals?.top_disliked ?? []).forEach(t => {
  const key = `${t.from}->${t.to}`;
  DISLIKED_TRANS_PEN[key] = PREF_PEN_STRENGTH + (1 - PREF_PEN_STRENGTH) * (1 + t.preference_score);
});

/**
 * Applies preference boost or penalty based on liked/disliked pitch transitions.
 */
function preferenceBoost(fromPitch, toPitch) {
  if (!fromPitch || !toPitch || PREF_TOTAL === 0) return 1.0;
  const from = fromPitch.replace(/\d/g, '');
  const to   = toPitch.replace(/\d/g, '');
  const key  = `${from}->${to}`;
  if (LIKED_TRANS_BOOST[key])  return LIKED_TRANS_BOOST[key];
  if (DISLIKED_TRANS_PEN[key]) return DISLIKED_TRANS_PEN[key];
  return 1.0;
}
// ─────────────────────────────────────────────────────────────────────────────

// ── KEY DETECTION (Krumhansl-Schmuckler profiles) ─────────────────────────────
// Major and minor key profiles — how well each pitch class fits the key
const KS_MAJOR = [6.35,2.23,3.48,2.33,4.38,4.09,2.52,5.19,2.39,3.66,2.29,2.88];
const KS_MINOR = [6.33,2.68,3.52,5.38,2.60,3.53,2.54,4.75,3.98,2.69,3.34,3.17];
const PC_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Enharmonic normalizer — maps flat spellings to sharp equivalents for PC lookup
const ENHARMONIC = {
  'Db':'C#','Eb':'D#','Fb':'E','Gb':'F#','Ab':'G#','Bb':'A#','Cb':'B',
  'B#':'C','E#':'F',
  // music21 double-flat/sharp spellings that appear in MXL-derived pitch names
  'B-':'A#','E-':'D#','A-':'G#','D-':'C#','G-':'F#','C-':'B','F-':'E',
  'B--':'A','E--':'D','A--':'G','D--':'C','G--':'F','C--':'B-1','F--':'E-1',
};

/**
 * Converts a pitch name (e.g., 'G4') to its 0-11 pitch class index, normalizing enharmonics.
 */
// Returns 0-11 pitch class, or null if unrecognized
function pitchToPC(pitch) {
  if (!pitch || pitch === 'REST') return null;
  const m = pitch.match(/^([A-Ga-g][#b\-]*)/);
  if (!m) return null;
  let pc = m[1];
  // normalize to sharp spelling
  if (ENHARMONIC[pc] !== undefined) pc = ENHARMONIC[pc];
  const idx = PC_NAMES.indexOf(pc);
  return idx >= 0 ? idx : null;
}

// Rolling note history — last 16 melody notes
const NOTE_HISTORY_SIZE = 16;
const noteHistory = [];

/**
 * Records a pitch in the rolling note history for key detection.
 */
function addToNoteHistory(pitch) {
  if (!pitch || pitch === 'REST') return;
  noteHistory.push(pitch);
  if (noteHistory.length > NOTE_HISTORY_SIZE) noteHistory.shift();
}

// Detect implied key from recent note history using KS correlation
let currentImpliedKey = null;   // { root: 'G', mode: 'major', rootPC: 7 }
let keyUpdateCounter  = 0;
const KEY_UPDATE_EVERY = 4;     // re-detect every 4 melody notes

/**
 * Detects the implied musical key from recent note history using Krumhansl-Schmuckler profiles.
 */
function detectImpliedKey() {
  if (noteHistory.length < 4) return currentImpliedKey;

  // Build pitch class histogram from recent notes
  const hist = new Array(12).fill(0);
  for (const p of noteHistory) {
    const pc = pitchToPC(p);
    if (pc !== null) hist[pc]++;
  }
  const total = hist.reduce((a,b) => a+b, 0) || 1;
  const norm  = hist.map(v => v / total);

  // Score all 24 keys (12 major + 12 minor)
  let bestScore = -Infinity, bestRoot = 0, bestMode = 'major';
  for (let root = 0; root < 12; root++) {
    // Major
    let scoreMaj = 0, scoreMin = 0;
    for (let i = 0; i < 12; i++) {
      scoreMaj += norm[(i + root) % 12] * KS_MAJOR[i];
      scoreMin += norm[(i + root) % 12] * KS_MINOR[i];
    }
    if (scoreMaj > bestScore) { bestScore = scoreMaj; bestRoot = root; bestMode = 'major'; }
    if (scoreMin > bestScore) { bestScore = scoreMin; bestRoot = root; bestMode = 'minor'; }
  }

  currentImpliedKey = { root: PC_NAMES[bestRoot], mode: bestMode, rootPC: bestRoot };
  return currentImpliedKey;
}

/**
 * Returns the set of pitch class indices belonging to a given key (root and mode).
 */
// Scale membership lookup — returns set of pitch class indices in the key
function getScalePCs(rootPC, mode) {
  const MAJOR_INTERVALS = [0,2,4,5,7,9,11];
  const MINOR_INTERVALS = [0,2,3,5,7,8,10];
  const intervals = mode === 'major' ? MAJOR_INTERVALS : MINOR_INTERVALS;
  return new Set(intervals.map(i => (rootPC + i) % 12));
}

// Weight multiplier for a candidate note given current implied key
// In-scale: 1.0 (unchanged), out-of-scale: KEY_OUT_PENALTY
const KEY_STRENGTH    = 0.75;  // 0=ignore key, 1=strongly enforce — tune this!
const KEY_OUT_PENALTY = 0.15;  // out-of-scale notes get this weight multiplier

/**
 * Returns a weight multiplier that penalizes out-of-key notes based on the current implied key.
 */
function keyBias(toPitch) {
  if (!currentImpliedKey) return 1.0;
  const pc = pitchToPC(toPitch);
  if (pc === null) return 1.0;
  const scalePCs = getScalePCs(currentImpliedKey.rootPC, currentImpliedKey.mode);
  const inScale  = scalePCs.has(pc);
  // Blend between no-bias (1.0) and full-bias based on KEY_STRENGTH
  return inScale ? 1.0 : (1.0 - KEY_STRENGTH) + KEY_STRENGTH * KEY_OUT_PENALTY;
}
// ─────────────────────────────────────────────────────────────────────────────

/**
 * Returns the smoothness score (0-1) for a melodic interval between two pitch names.
 */
function getTransitionSmoothness(prev, next) {
  if (!prev || !next) return 0.5;
  const map = smoothnessRules.transitionSmoothness[prev];
  if (map && map[next] !== undefined) return map[next];
  const iv = Math.abs(pitchToMidi(prev) - pitchToMidi(next));
  if (isNaN(iv)) return 0.5;
  if (iv <= 2) return 0.95;
  if (iv <= 4) return 0.70;
  if (iv <= 7) return 0.40;
  return 0.20;
}

/**
 * Returns the smoothness score for transitioning from one rhythm duration type to another.
 */
function getRhythmFlowSmoothness(from, to) {
  if (!from || !to) return 0.5;
  const r = smoothnessRules.rhythmFlowRules.find(r => r.from === from && r.to === to);
  return r ? r.smoothness : 0.6;
}

/**
 * Adjusts a base weight by a smoothness factor using the global smoothness bias.
 */
function applySmoothnessWeight(base, s) {
  return base * Math.pow(0.6 + 0.4 * s, SMOOTHNESS_BIAS);
}

/**
 * Returns the musical tension value (0-1) for a given pitch name.
 */
function getTension(pitch) {
  if (!pitch || pitch === 'REST') return 0;
  return TENSION_MAP[pitch.replace(/\d/g, '')] ?? 0.3;
}

let medBuffers    = {};   // MEDIUM NOTES (MELODIC, HALF-BAR)

let ambienceBuffer = null, beatBuffer = null;

// ── RISER / CRASH BUFFERS ─────────────────────────────────────────────────────
const riserBuffers = [null, null, null, null];   // riser00–03

  startBar:      -1,       // bar number when riser started
