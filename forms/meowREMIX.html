// ── START / STOP ──────────────────────────────────────────────────────────────

/**
 * Initializes audio nodes, starts stem loops, resets state, and begins scheduling.
 */
async function startEngine() {
  if (running) return;
  await actx.resume();
  const rawNow    = actx.currentTime + 0.05;
  engineStartTime = Math.ceil(rawNow / MEASURE_DUR_SEC) * MEASURE_DUR_SEC;

  dancerStartTime = engineStartTime;

  // ── GAIN NODES ──────────────────────────────────────────────────────────────
  longGain     = actx.createGain();
  medGain      = actx.createGain();
  shortGain    = actx.createGain();
  ambienceGain = actx.createGain();
  beatGain     = actx.createGain();
  riserGain    = actx.createGain();
  crashGain    = actx.createGain();
  riserGain.gain.value = 0.3;
  crashGain.gain.value = 0.3;

  // ── FX CHAIN ─────────────────────────────────────────────────────────────────
  // Master output trim
  masterGain = actx.createGain();
  masterGain.gain.value = 0.88;
  masterGain.connect(actx.destination);

  // Reverb (convolver + wet/dry)
  reverbNode           = actx.createConvolver();
  reverbNode.buffer    = buildReverbIR(actx, 2.8, 18);
  reverbReturn         = actx.createGain();
  reverbReturn.gain.value = 0.38;      // reverb return level — how wet the tail is
  reverbNode.connect(reverbReturn);
  reverbReturn.connect(masterGain);

  // FX bus — melody + ambience + risers/crashes feed into this, then → reverb + dry
  fxBus = actx.createGain();
  fxBus.gain.value = 1.0;
  fxBus.connect(masterGain);           // dry path
  reverbSend = actx.createGain();
  reverbSend.gain.value = 0.55;        // how much of the fx bus goes into reverb
  fxBus.connect(reverbSend);
  reverbSend.connect(reverbNode);

  // Melody submix bus (long + medium + short notes)
  melodyBus = actx.createGain();
  melodyBus.gain.value = 1.0;

  // Delay node — dotted-eighth delay synced to BPM (creates that spacious echo)
  // Dotted eighth = 3/4 of a beat = gives rhythmic "slapback" that grooves with 4/4
  const delayTimeSec = BEAT_SEC * 0.75;
  delayNode              = actx.createDelay(2.0);
  delayNode.delayTime.value = delayTimeSec;
  delayFeedback          = actx.createGain();
  delayFeedback.gain.value = 0.28;     // feedback level — how many echoes repeat
  delayWet               = actx.createGain();
  delayWet.gain.value    = 0.22;       // delay send level — subtle, not washy

  // Delay routing: melodyBus → delayWet → delayNode → feedback loop → fxBus
  melodyBus.connect(delayWet);
  delayWet.connect(delayNode);
  delayNode.connect(delayFeedback);
  delayFeedback.connect(delayNode);    // feedback loop
  delayNode.connect(fxBus);           // delay output → reverb + dry
  melodyBus.connect(fxBus);           // dry melody signal also goes direct

  // Wire note buckets → melody submix
  longGain.connect(melodyBus);
  medGain.connect(melodyBus);
  shortGain.connect(melodyBus);

  // Ambience → fx bus (gets reverb but no delay)
  ambienceGain.connect(fxBus);

  // Risers + crashes → fx bus (light reverb tail on crashes sounds great)
  riserGain.connect(fxBus);
  crashGain.connect(fxBus);

  // Beat stays completely dry — it already has its own room treatment
  beatGain.connect(masterGain);

  longGain.gain.value    = parseFloat(document.getElementById('longVol').value);
  medGain.gain.value     = parseFloat(document.getElementById('medVol').value);
  shortGain.gain.value   = parseFloat(document.getElementById('shortVol').value);
  ambienceGain.gain.value = parseFloat(document.getElementById('ambVol').value);
  beatGain.gain.value    = parseFloat(document.getElementById('beatVol').value);

  document.getElementById('longVol').oninput  = e => longGain.gain.value   = e.target.value;
  document.getElementById('medVol').oninput   = e => medGain.gain.value    = e.target.value;
  document.getElementById('shortVol').oninput = e => shortGain.gain.value  = e.target.value;
  document.getElementById('ambVol').oninput   = e => ambienceGain.gain.value = e.target.value;
  document.getElementById('beatVol').oninput  = e => beatGain.gain.value   = e.target.value;

  if (ambienceBuffer) {
    ambienceSource = actx.createBufferSource();
    ambienceSource.buffer = ambienceBuffer; ambienceSource.loop = true;
    ambienceSource.connect(ambienceGain); ambienceSource.start(engineStartTime);
  }
  if (beatBuffer) {
    beatSource = actx.createBufferSource();
    beatSource.buffer   = beatBuffer; beatSource.loop = true;
    beatSource.loopStart = 0; beatSource.loopEnd = beatBuffer.duration;
    beatSource.connect(beatGain); beatSource.start(engineStartTime);
  }

  const firstNote = engineStartTime + MEASURE_DUR_SEC;
  melodyState  = makeVoiceState(); melodyState.nextNoteTime  = firstNote;
  harmonyState = makeVoiceState(); harmonyState.nextNoteTime = firstNote;

  // BAR STATE: INITIAL PITCH FROM BARCENTERRULES (FULL PITCH STRINGS NOW)
  const barKeys = Object.keys(musicRules.barCenterRules ?? {});
  const initBar = barKeys.length
    ? barKeys[Math.floor(Math.random()*barKeys.length)]
    : 'G3';
  barState = { currentNote: initBar, prevNote: null, nextNoteTime: firstNote,
               consecutiveSame: 0, currentBucket: 'long', lastDurationType: null,
               motifQueue: [], rhythmQueue: [], pendingSuspension: null,
               prevNote: null, consecutiveRest: 0, measuresSinceSync: 0 };

  generationState = {
    currentStructuralRole:  'setup',
    measuresSinceRoleChange: 0,
    nextRoleChangeMeasure:   4,
    targetTension:           0.3,
    phraseMeasureCounter:    0,
    destinationChord:        'tonic',
    lastMotifMeasure:        -100,
    expectationDelayActive:  false,
    currentBucket:           'medium',
  };

  dancerX = -250;
  dancerDirection = 1;
  dancerTrail.length = 0;

  running = true;
  scheduleMelody();
  scheduleHarmony();
  scheduleBar();
  playBtnImg.src = '../static/images/pause.png';
  logToConsole(`Engine active — compRules:${compRules ? '✓' : '✗'} · smoothness:${SMOOTHNESS_BIAS} · buckets:[${Object.keys(BUCKET_WEIGHTS).join(',')}]`);
}

/**
 * Stops all scheduling, disconnects audio nodes, and resets the engine to idle.
 */
function stopEngine() {
  running = false;
  [schedulerTimer, harmonySchedulerTimer, barSchedulerTimer].forEach(t => t && clearTimeout(t));
  try {
    if (ambienceSource) { ambienceSource.stop(); ambienceSource.disconnect(); ambienceSource = null; }
    if (beatSource)     { beatSource.stop();     beatSource.disconnect();     beatSource     = null; }
    if (riserState.source) {
      try { riserState.source.stop(); riserState.source.disconnect(); } catch {}
      riserState.source = null; riserState.active = false; riserState.releaseQueued = false;
    }
    if (riserGain)  { riserGain.disconnect();  riserGain  = null; }
    if (crashGain)  { crashGain.disconnect();  crashGain  = null; }
    if (longGain)     { longGain.disconnect();     longGain     = null; }
    if (medGain)      { medGain.disconnect();       medGain      = null; }
    if (shortGain)    { shortGain.disconnect();     shortGain    = null; }
    if (ambienceGain) { ambienceGain.disconnect();  ambienceGain = null; }
    if (beatGain)     { beatGain.disconnect();      beatGain     = null; }
    if (melodyBus)    { melodyBus.disconnect();     melodyBus    = null; }
    if (delayWet)     { delayWet.disconnect();      delayWet     = null; }
    if (delayNode)    { delayNode.disconnect();     delayNode    = null; }
    if (delayFeedback){ delayFeedback.disconnect(); delayFeedback = null; }
    if (fxBus)        { fxBus.disconnect();         fxBus        = null; }
    if (reverbSend)   { reverbSend.disconnect();    reverbSend   = null; }
    if (reverbNode)   { reverbNode.disconnect();    reverbNode   = null; }
    if (reverbReturn) { reverbReturn.disconnect();  reverbReturn = null; }
    if (masterGain)   { masterGain.disconnect();    masterGain   = null; }
  } catch {}
  playBtnImg.src = '../static/images/play.png';
  telemetryLong.innerText    = '—';
  telemetryMedium.innerText  = '—';
  telemetryShort.innerText   = '—';
  telemetryTension.innerText = '0.00';
  const keyEl = document.getElementById('telemetryKeyVal');
  if (keyEl) keyEl.innerText = '—';
  noteHistory.length     = 0;
  melodyNoteLog.length   = 0;
  currentImpliedKey      = null;
  keyUpdateCounter       = 0;
  currentPhraseArc       = null;
  lastPhraseIndex        = -1;
  rhythmMotifState       = { pattern:[], pos:0, barsOnMotif:0, barStartTime:0 };
  phraseSkeletonState    = { skeletonNotes: [], phraseStartBar: -1, stepIndex: 0 };
  staccatoBurstState     = { active:false, notesRemaining:0, pattern:[], patternPos:0, gapBeatsLeft:0, lastBurstBar:-999 };
  logToConsole('Engine halted.');
}

playBtn.addEventListener('click', () => running ? stopEngine() : startEngine());

// ── BACKGROUND RULES REBUILD ──────────────────────────────────────────────
// Fire-and-forget on every page load. Triggers the full pipeline
// (analyze all songs → compile rules → save to Neon) in the background.
// The *current* visit uses whatever rules.js is already cached in Neon.
// The *next* visit will get the freshly compiled rules (~30-60s later).
/**
 * Triggers a background rebuild of the composition rules by calling the analysis and compile endpoints.
 */
(async function pingRebuild() {
  try {
    // Step 1: analyze all songs — waits for response before continuing
    const r = await fetch('/api/audio/rebuild-rules', { method: 'POST' });
    if (!r.ok) return;
    // Step 2: compile fresh rules.js to Neon (~5s, runs after analyze finishes)
    await fetch('/api/audio/compile-rules', { method: 'POST' });
    console.log('[meowREMIX] rules.js rebuilt with latest preferences ✓');
  } catch(e) { /* silent fail — never blocks the engine */ }
})();
