<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Add New Project — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/appStore.css">
</head>
<body>

<div class="scanlines"></div>
<div class="cyber-grid"></div>
<div id="stars"></div>

<div class="page-content">
  <div class="support-container">

    <div class="hero-section">
      <h1>New Project</h1>
      <p>Add an entry to the App Store catalog</p>
    </div>

    <div id="form-alert-slot"></div>

    <form id="new-project-form" class="support-card">

      <div class="form-group">
        <label for="name">App Name<span class="required">*</span></label>
        <input type="text" id="name" name="name" required maxlength="120" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="slug">Slug</label>
        <input type="text" id="slug" name="slug" maxlength="120" autocomplete="off" placeholder="auto-generated from name if left blank">
      </div>

      <div class="form-group">
        <label for="tagline">Tagline</label>
        <input type="text" id="tagline" name="tagline" maxlength="160" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="description">Description</label>
        <textarea id="description" name="description" maxlength="4000"></textarea>
        <div class="char-counter" id="description-counter">0 / 4000</div>
      </div>

      <div class="form-group">
        <label for="hero_image_url">Hero Image URL</label>
        <input type="url" id="hero_image_url" name="hero_image_url" autocomplete="off" placeholder="https://... or upload below">
        <div class="image-upload-row">
          <label class="upload-btn" for="hero_image_file" id="uploadBtnLabel">Upload Image</label>
          <input type="file" id="hero_image_file" accept=".png,.jpg,.jpeg,.webp,.gif" hidden>
          <span class="upload-status" id="uploadStatus"></span>
        </div>
        <div class="image-preview-wrap" id="imagePreviewWrap" hidden>
          <img id="imagePreviewThumb" alt="Hero image preview">
          <button type="button" class="remove-image-btn" id="removeImageBtn" aria-label="Remove image">×</button>
        </div>
      </div>

      <div class="form-group">
        <label for="itch_url">itch.io URL</label>
        <input type="url" id="itch_url" name="itch_url" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="ms_store_url">Microsoft Store URL</label>
        <input type="url" id="ms_store_url" name="ms_store_url" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="other_url">Other URL</label>
        <input type="url" id="other_url" name="other_url" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="youtube_url">Tutorial Video (YouTube URL)</label>
        <input type="url" id="youtube_url" name="youtube_url" autocomplete="off" placeholder="https://www.youtube.com/watch?v=...">
      </div>

      <div class="form-group">
        <label for="tags">Tags</label>
        <input type="text" id="tags" name="tags" autocomplete="off" placeholder="comma-separated, e.g. budgeting, tauri, desktop">
      </div>

      <div class="form-group">
        <label for="sort_order">Sort Order</label>
        <input type="number" id="sort_order" name="sort_order" value="0" step="1">
      </div>

      <div class="form-group">
        <label for="is_featured" style="display:flex; align-items:center; gap:10px; text-transform:none; letter-spacing:normal; font-family:'Inter',sans-serif; font-size:0.95rem; cursor:pointer;">
          <input type="checkbox" id="is_featured" name="is_featured" style="width:auto; accent-color:#00ffff;">
          Featured
        </label>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Add Project</button>
    </form>

  </div>
</div>

<script>
(function () {
  const form = document.getElementById('new-project-form');
  const submitBtn = document.getElementById('submit-btn');
  const alertSlot = document.getElementById('form-alert-slot');
  const nameField = document.getElementById('name');
  const slugField = document.getElementById('slug');
  const descField = document.getElementById('description');
  const descCounter = document.getElementById('description-counter');
  const heroUrlField = document.getElementById('hero_image_url');
  const fileInput = document.getElementById('hero_image_file');
  const uploadBtnLabel = document.getElementById('uploadBtnLabel');
  const uploadStatus = document.getElementById('uploadStatus');
  const previewWrap = document.getElementById('imagePreviewWrap');
  const previewThumb = document.getElementById('imagePreviewThumb');
  const removeImageBtn = document.getElementById('removeImageBtn');

  const MAX_UPLOAD_BYTES = 5 * 1024 * 1024;
  const ALLOWED_EXT = ['.png', '.jpg', '.jpeg', '.webp', '.gif'];

  function setUploadStatus(text, kind) {
    uploadStatus.textContent = text;
    uploadStatus.className = 'upload-status' + (kind ? ` status-${kind}` : '');
  }

  function showPreview(url) {
    previewThumb.src = url;
    previewWrap.hidden = false;
  }

  removeImageBtn.addEventListener('click', () => {
    heroUrlField.value = '';
    previewWrap.hidden = true;
    previewThumb.src = '';
    fileInput.value = '';
    setUploadStatus('', null);
  });

  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;

    const ext = '.' + file.name.split('.').pop().toLowerCase();
    if (!ALLOWED_EXT.includes(ext)) {
      setUploadStatus('Unsupported file type. Use PNG, JPG, WEBP, or GIF.', 'error');
      fileInput.value = '';
      return;
    }
    if (file.size > MAX_UPLOAD_BYTES) {
      setUploadStatus('Image is too large (5MB max).', 'error');
      fileInput.value = '';
      return;
    }

    uploadBtnLabel.classList.add('disabled');
    setUploadStatus('Uploading…', 'uploading');

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/api/appstore/admin/upload-image', {
        method: 'POST',
        body: formData,
      });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || 'Upload failed');
      }

      heroUrlField.value = data.url;
      showPreview(data.url);
      setUploadStatus('Uploaded ✓', 'success');
    } catch (err) {
      setUploadStatus(err.message || 'Upload failed. Try again.', 'error');
    } finally {
      uploadBtnLabel.classList.remove('disabled');
      fileInput.value = '';
    }
  });

  // If a hero_image_url is typed/pasted in manually, show a preview too
  heroUrlField.addEventListener('change', () => {
    const val = heroUrlField.value.trim();
    if (val) {
      showPreview(val);
    } else {
      previewWrap.hidden = true;
    }
  });

  let slugManuallyEdited = false;

  function slugify(text) {
    return text
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '');
  }

  nameField.addEventListener('input', () => {
    if (!slugManuallyEdited) {
      slugField.value = slugify(nameField.value);
    }
  });

  slugField.addEventListener('input', () => {
    slugManuallyEdited = slugField.value.trim().length > 0;
  });

  descField.addEventListener('input', () => {
    const len = descField.value.length;
    descCounter.textContent = `${len} / 4000`;
    descCounter.classList.toggle('warning', len > 3600);
  });

  function showAlert(type, message) {
    const cls = type === 'error' ? 'error-message' : 'success-message';
    const heading = type === 'error' ? 'Error' : 'Success';
    alertSlot.innerHTML = `
      <div class="${cls}">
        <h3>${heading}</h3>
        <p>${message}</p>
      </div>
    `;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    submitBtn.textContent = 'Adding…';
    alertSlot.innerHTML = '';

    const payload = {
          name: nameField.value.trim(),
          slug: slugField.value.trim(),
          tagline: document.getElementById('tagline').value.trim(),
          description: descField.value.trim(),
          hero_image_url: document.getElementById('hero_image_url').value.trim(),
          itch_url: document.getElementById('itch_url').value.trim(),
          ms_store_url: document.getElementById('ms_store_url').value.trim(),
          other_url: document.getElementById('other_url').value.trim(),
          youtube_url: document.getElementById('youtube_url').value.trim(),
          tags: document.getElementById('tags').value.trim(),
          sort_order: document.getElementById('sort_order').value,
          is_featured: document.getElementById('is_featured').checked,
        };

    try {
      const res = await fetch('/api/appstore/admin/projects', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const data = await res.json();

      if (!res.ok) {
        showAlert('error', data.error || 'Something went wrong.');
        return;
      }

      showAlert('success', `"${payload.name}" was added with slug "${data.slug}".`);
      form.reset();
      descCounter.textContent = '0 / 4000';
      slugManuallyEdited = false;
      previewWrap.hidden = true;
      previewThumb.src = '';
      setUploadStatus('', null);
    } catch (err) {
      showAlert('error', 'Network error — the request did not reach the server.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Add Project';
    }
  });
})();
</script>

</body>
</html>
