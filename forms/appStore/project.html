  <div id="helpModal" class="modal">
    <div class="modal-content">

  <main class="narrow">
    <div id="content">

  <div id="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">
    <a href="javascript:void(0);" class="button-container" aria-label="Scroll to top">
      <img src="/static/images/top.png" alt="Scroll to top">
    </a>
  </div>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script src="/static/js/KittyCore.js"></script>

  <script>
    const starsDiv = document.getElementById('stars');
    const colors = ['#00ffff', '#A55AFF', '#FFC7FF'];
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = Math.random() * 2.5 + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.background = colors[Math.floor(Math.random() * colors.length)];
      star.style.animationDelay = Math.random() * 4 + 's';
      starsDiv.appendChild(star);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    function getYouTubeEmbedUrl(url) {
      if (!url) return null;
      const match = url.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
      return match ? `https://www.youtube.com/embed/${match[1]}` : null;
    }

    // Slug comes from the URL path: /appstore/app/<slug>
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const slug = pathParts[pathParts.length - 1];

    const content = document.getElementById('content');
    let currentProject = null;

    // ---------- Toasts ----------
    const toastContainer = document.getElementById('toastContainer');

    function showToast(message, type = 'error', duration = 5000) {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      toast.innerHTML = `
        <span class="toast-icon">${type === 'error' ? '!' : '✓'}</span>
        <span class="toast-message">${escapeHtml(message)}</span>
        <button class="toast-close" aria-label="Dismiss">×</button>
      `;
      toastContainer.appendChild(toast);

      const dismiss = () => {
        toast.classList.add('toast-out');
        toast.addEventListener('animationend', () => toast.remove(), { once: true });
      };

      toast.querySelector('.toast-close').addEventListener('click', dismiss);
      setTimeout(dismiss, duration);
    }

    // ---------- Amount selection panel ----------
    const AMOUNT_OPTIONS = [
      { value: '300', label: '$3' },
      { value: '500', label: '$5' },
      { value: '1000', label: '$10' },
      { value: '2500', label: '$25' },
      { value: 'custom', label: 'Custom amount' }
    ];

    function buildAmountPanel() {
      const optionsHtml = AMOUNT_OPTIONS
        .map(o => `<option value="${o.value}">${o.label}</option>`)
        .join('');

      return `
        <div class="amount-panel" id="amountPanel" hidden>
          <div class="form-group">
            <label for="amountSelect">Choose an amount</label>
            <select id="amountSelect">${optionsHtml}</select>
          </div>
          <div class="form-group custom-amount-group" id="customAmountGroup" hidden>
            <label for="customAmountInput">Custom amount (USD)</label>
            <div class="currency-prefix-wrap">
              <span>$</span>
              <input type="number" id="customAmountInput" min="1" step="1" placeholder="10" />
            </div>
          </div>
          <button class="btn btn-pink submit-btn" id="confirmSupportBtn" type="button">Continue to Checkout</button>
          <button class="cancel-support-btn" id="cancelSupportBtn" type="button">Cancel</button>
        </div>
      `;
    }

    function wireAmountPanel(appId, appName) {
      const toggleBtn = document.getElementById('support-btn');
      const panel = document.getElementById('amountPanel');
      const select = document.getElementById('amountSelect');
      const customGroup = document.getElementById('customAmountGroup');
      const customInput = document.getElementById('customAmountInput');
      const confirmBtn = document.getElementById('confirmSupportBtn');
      const cancelBtn = document.getElementById('cancelSupportBtn');

      toggleBtn.addEventListener('click', () => {
        panel.hidden = !panel.hidden;
        if (!panel.hidden) {
          panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }
      });

      cancelBtn.addEventListener('click', () => {
        panel.hidden = true;
      });

      select.addEventListener('change', () => {
        customGroup.hidden = select.value !== 'custom';
        if (!customGroup.hidden) customInput.focus();
      });

      confirmBtn.addEventListener('click', () => {
        let amountCents;
        if (select.value === 'custom') {
          const dollars = parseFloat(customInput.value);
          if (!dollars || dollars < 1) {
            showToast('Enter a custom amount of at least $1.', 'error');
            customInput.focus();
            return;
          }
          amountCents = Math.round(dollars * 100);
        } else {
          amountCents = parseInt(select.value, 10);
        }
        supportApp(appId, appName, amountCents);
      });
    }

    async function supportApp(appId, appName, amountCents) {
      const confirmBtn = document.getElementById('confirmSupportBtn');
      const cancelBtn = document.getElementById('cancelSupportBtn');
      if (confirmBtn) {
        confirmBtn.disabled = true;
        confirmBtn.textContent = 'Redirecting...';
      }
      if (cancelBtn) cancelBtn.disabled = true;

      try {
        const res = await fetch('/api/appstore/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ app_id: appId, app_name: appName, amount: amountCents })
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          throw new Error(data.error || 'Something went wrong');
        }
      } catch (e) {
        if (confirmBtn) {
          confirmBtn.disabled = false;
          confirmBtn.textContent = 'Continue to Checkout';
        }
        if (cancelBtn) cancelBtn.disabled = false;
        showToast('Could not start checkout right now. Please try again in a moment.', 'error');
      }
    }

      function renderProject(project) {
            const imageHtml = project.hero_image_url
              ? `<img src="${escapeHtml(project.hero_image_url)}" alt="${escapeHtml(project.name)}" />`
              : `<div class="media-fallback">${escapeHtml(project.name)}</div>`;

            const tagsHtml = (project.tags || [])
              .map(t => `<span class="tag">${escapeHtml(t)}</span>`)
              .join('');

            const downloadUrl = project.ms_store_url || project.itch_url || project.other_url;
            const downloadLabel = project.ms_store_url
              ? 'Download from Microsoft Store'
              : project.itch_url
                ? 'Download on itch.io'
                : 'View Project';

            const embedUrl = getYouTubeEmbedUrl(project.youtube_url);
            const videoHtml = embedUrl
              ? `
              <div class="video-section">
                <h2 class="video-heading">Tutorial</h2>
                <div class="video-frame">
                  <iframe
                    src="${embedUrl}"
                    title="${escapeHtml(project.name)} tutorial"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                    allowfullscreen
                    loading="lazy">
                  </iframe>
                </div>
              </div>`
              : '';

            content.innerHTML = `
              <div class="media-frame hero-image">${imageHtml}</div>
              <h1 class="project-title">${escapeHtml(project.name)}</h1>
              <div class="tagline">${escapeHtml(project.tagline)}</div>
              <div class="tags">${tagsHtml}</div>
              <div class="description">${escapeHtml(project.description)}</div>
              ${videoHtml}
              <div class="action-row">
                ${downloadUrl ? `<a class="btn btn-cyan" href="${escapeHtml(downloadUrl)}" target="_blank" rel="noopener">${downloadLabel}</a>` : ''}
                <button class="btn btn-pink" id="support-btn">Support this project</button>
              </div>
              <div class="support-note">100% optional. This app is free forever either way.</div>
              ${buildAmountPanel()}
            `;

            currentProject = project;
            wireAmountPanel(project.slug, project.name);
   

      // Fill in the help modal with this specific app's info
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');
      if (modalTitle) modalTitle.textContent = `ABOUT ${project.name.toUpperCase()}`;
      if (modalBody) {
        modalBody.innerHTML = `
          <h3>${escapeHtml(project.tagline || '')}</h3>
          <p>${escapeHtml(project.description || '')}</p>
          <p>This app is free forever, no strings attached. If it's useful to you, the "Support this project" button on this page is an optional way to send some value back.</p>
        `;
      }
    }

    fetch(`/api/appstore/projects/${slug}`)
      .then(res => res.json())
      .then(project => {
        if (project.error) throw new Error(project.error);
        renderProject(project);
      })
      .catch(() => {
        content.innerHTML = '<div class="state-message">Couldn\'t find that project.</div>';
        const modalBody = document.getElementById('modalBody');
        if (modalBody) modalBody.innerHTML = '<p>Couldn\'t load info for this app.</p>';
      });
  </script>
</body>
