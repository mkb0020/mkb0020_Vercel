<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MK | App</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/appStore.css">
</head>
<body>

  <div class="scanlines"></div>
  <div class="cyber-grid"></div>
  <div id="stars"></div>

  <nav class="navbar">
    <div class="nav-container">
      <div class="left-dropdown">
        <button class="menu-trigger" aria-label="Menu">
          <img src="/static/images/Niels2.png" alt="Menu" class="home-icon">
        </button>
        <div class="left-menu">
          <a href="https://mkb0020.vercel.app/" class="menu-item">Home</a>
          <a href="https://mkb0020.github.io/" class="menu-item">Projects</a>
          <a href="https://mkb0020.github.io/resume.html" class="menu-item">Resume</a>
          <a href="https://mkb0020.vercel.app/comments" class="menu-item">Guestbook</a>
          <div class="social-links">
            <a href="https://www.youtube.com/@mkb0020" target="_blank" aria-label="YouTube">
              <img src="static/images/youtube-icon.png" alt="YouTube" class="social-icon">
            </a>
            <a href="https://www.linkedin.com/in/mkb0020/" target="_blank" aria-label="LinkedIn">
              <img src="static/images/linkedin-icon.png" alt="LinkedIn" class="social-icon">
            </a>
            <a href="https://soundcloud.com/mkb0020" target="_blank" aria-label="Soundcloud">
              <img src="static/images/music-icon.png" alt="Soundcloud" class="social-icon">
            </a>
            <a href="https://github.com/mkb0020" target="_blank" aria-label="GitHub">
              <img src="static/images/github-icon.png" alt="GitHub" class="social-icon">
            </a>
            <a href="https://mkb0020.itch.io" target="_blank" aria-label="Itch.io">
              <img src="static/images/itchio-icon.png" alt="Itch.io" class="social-icon">
            </a>
          </div>
        </div>
      </div>

      <a href="https://mkb0020.github.io">
        <div class="logo">♡ mkb0020</div>
      </a>

      <div class="help-dropdown">
        <button class="help-icon" id="helpBtn" aria-label="Help Menu">
          <div class="question-mark">?</div>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <button id="openMainHelp">About</button>
         <a href="https://mkb0020.vercel.app/support" class="menu-item">Report an Issue</a>
        </div>
      </div>
    </div>
  </nav>

  <div id="helpModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title" id="modalTitle">ABOUT THIS APP</h1>
        <button class="modal-close" id="closeModal">X</button>
      </div>
      <div class="modal-body" id="modalBody">
        Loading...
      </div>
    </div>
  </div>

  <main class="narrow">
    <div id="content">
      <div class="state-message">Loading...</div>
    </div>
  </main>

  <div id="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'});">
    <a href="javascript:void(0);" class="button-container" aria-label="Scroll to top">
      <img src="/static/images/top.png" alt="Scroll to top">
    </a>
  </div>

  <script src="/static/js/KittyCore.js"></script>

  <script>
    const starsDiv = document.getElementById('stars');
    const colors = ['#00ffff', '#A55AFF', '#FFC7FF'];
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.width = star.style.height = Math.random() * 2.5 + 'px';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.background = colors[Math.floor(Math.random() * colors.length)];
      star.style.animationDelay = Math.random() * 4 + 's';
      starsDiv.appendChild(star);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // Slug comes from the URL path: /appstore/app/<slug>
    const pathParts = window.location.pathname.split('/').filter(Boolean);
    const slug = pathParts[pathParts.length - 1];

    const content = document.getElementById('content');

    async function supportApp(appId, appName) {
      const btn = document.getElementById('support-btn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Redirecting...';
      }
      try {
        const res = await fetch('/api/appstore/create-checkout-session', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ app_id: appId, app_name: appName })
        });
        const data = await res.json();
        if (data.url) {
          window.location.href = data.url;
        } else {
          throw new Error(data.error || 'Something went wrong');
        }
      } catch (e) {
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Support this project';
        }
        alert('Could not start checkout right now. Please try again in a moment.');
      }
    }

    function renderProject(project) {
      const imageHtml = project.hero_image_url
        ? `<img src="${escapeHtml(project.hero_image_url)}" alt="${escapeHtml(project.name)}" />`
        : `<div class="media-fallback">${escapeHtml(project.name)}</div>`;

      const tagsHtml = (project.tags || [])
        .map(t => `<span class="tag">${escapeHtml(t)}</span>`)
        .join('');

      const downloadUrl = project.ms_store_url || project.itch_url || project.other_url;
      const downloadLabel = project.ms_store_url
        ? 'Download from Microsoft Store'
        : project.itch_url
          ? 'Download on itch.io'
          : 'View Project';

      content.innerHTML = `
        <div class="media-frame hero-image">${imageHtml}</div>
        <h1 class="project-title">${escapeHtml(project.name)}</h1>
        <div class="tagline">${escapeHtml(project.tagline)}</div>
        <div class="tags">${tagsHtml}</div>
        <div class="description">${escapeHtml(project.description)}</div>
        <div class="action-row">
          ${downloadUrl ? `<a class="btn btn-cyan" href="${escapeHtml(downloadUrl)}" target="_blank" rel="noopener">${downloadLabel}</a>` : ''}
          <button class="btn btn-pink" id="support-btn">Support this project</button>
        </div>
        <div class="support-note">100% optional. This app is free forever either way.</div>
      `;

      document.getElementById('support-btn').addEventListener('click', () => {
        supportApp(project.slug, project.name);
      });

      // Fill in the help modal with this specific app's info
      const modalTitle = document.getElementById('modalTitle');
      const modalBody = document.getElementById('modalBody');
      if (modalTitle) modalTitle.textContent = `ABOUT ${project.name.toUpperCase()}`;
      if (modalBody) {
        modalBody.innerHTML = `
          <h3>${escapeHtml(project.tagline || '')}</h3>
          <p>${escapeHtml(project.description || '')}</p>
          <p>This app is free forever, no strings attached. If it's useful to you, the "Support this project" button on this page is an optional way to send some value back.</p>
        `;
      }
    }

    fetch(`/api/appstore/projects/${slug}`)
      .then(res => res.json())
      .then(project => {
        if (project.error) throw new Error(project.error);
        renderProject(project);
      })
      .catch(() => {
        content.innerHTML = '<div class="state-message">Couldn\'t find that project.</div>';
        const modalBody = document.getElementById('modalBody');
        if (modalBody) modalBody.innerHTML = '<p>Couldn\'t load info for this app.</p>';
      });
  </script>
</body>
</html>
